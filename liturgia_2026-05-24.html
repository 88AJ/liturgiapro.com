<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Liturgia PRO Standalone - 2026-05-24</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
:root {
    --base-size: 15px;

    --bg-dark: #09090b; /* Deep zinc-950 */
    --bg-gradient: radial-gradient(circle at top left, #18181b 0%, #09090b 100%);
    --card-bg: rgba(24, 24, 27, 0.6); /* Translucent zinc-900 */
    --text-primary: #e4e4e7; /* zinc-200 */
    --text-secondary: #a1a1aa; /* zinc-400 */
    --brand-color: #D32F2F; /* Liturgical Crimson */
    --brand-hover: #dc2626; /* Bright red */
    --border-color: rgba(255, 255, 255, 0.08); /* Frosted glass border */
    --sidebar-bg: rgba(9, 9, 11, 0.7); /* Translucent sidebar */
    --gold-accent: #d4af37; /* Clean Gold */
    --gold-hover: #fcd34d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    overflow: hidden;
}

/* Scrollbars sleek */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

.view {
    display: none;
    height: 100vh;
    width: 100vw;
}

.view.active {
    display: flex;
}

/* Landing Page */
#landing-screen {
    position: relative;
    justify-content: center;
    align-items: center;
}

.landing-content {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    padding: 3rem;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    text-align: center;
    max-width: 500px;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
}
.logo span, .logo-small span {
    color: var(--brand-color);
}
.logo { color: #ffffff; font-family: 'Cinzel', serif; }

.landing-content h1 {
    font-size: 2.2rem;
    margin: 0 0 1rem 0;
}

.landing-content p {
    color: var(--text-secondary);
    margin-bottom: 2rem;
    line-height: 1.5;
}

.login-box {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.login-box h3 { margin: 0; font-size: 1.1rem; }
.login-box input {
    padding: 14px;
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    color: white;
    border-radius: 8px;
    font-family: 'Outfit';
}
.login-box input:focus { outline: none; border-color: var(--brand-color); }

.btn-primary {
    background: var(--gold-accent);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.btn-primary:hover { background: #E5C158; }

.signup-link { font-size: 0.9rem; margin-top: 1rem; }
.signup-link a { color: var(--brand-color); text-decoration: none; }

.landing-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    z-index: 1;
}

/* Dashboard */
.saas-sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    z-index: 10;
}

.logo-small {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 3rem;
    color: #ffffff;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
}

.nav-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: #71717a;
    letter-spacing: 0.15em;
    padding: 0 16px;
    margin-bottom: 0.8rem;
    font-family: 'Outfit', sans-serif;
    text-transform: uppercase;
}

.nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.nav-links li {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
}
.nav-links li:hover:not(.active) { 
    background: rgba(255, 255, 255, 0.05); 
    color: #fff;
    transform: translateX(4px);
}
.nav-links li.active { 
    background: linear-gradient(90deg, rgba(178, 0, 0, 0.15) 0%, rgba(178, 0, 0, 0) 100%);
    color: #fff; 
    font-weight: 500; 
    border-left: 3px solid var(--brand-color); 
    box-shadow: inset 2px 0 0px var(--brand-color);
}

/* Capitular Icons */
.icon {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--brand-color);
    font-size: 1.2rem;
    width: 20px;
    text-align: center;
}

.badge {
    background: var(--brand-color);
    color: #000;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 700;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}
.avatar {
    width: 40px; height: 40px;
    background: var(--card-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
}
.user-info strong { display: block; font-size: 0.95rem; }
.user-info span { color: var(--text-secondary); font-size: 0.8rem; }

.btn-upgrade {
    background: transparent;
    border: 1px solid var(--brand-color);
    color: var(--brand-color);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}
.btn-upgrade:hover { background: rgba(245, 158, 11, 0.1); }

/* Main Hub */
.saas-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: transparent; /* lets body gradient show through */
}

.saas-header {
    height: 80px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(9, 9, 11, 0.4);
    backdrop-filter: blur(10px);
    z-index: 5;
}
.saas-header h2 { margin: 0; font-weight: 500; font-size: 1.3rem; font-family: 'Outfit', sans-serif;}

.btn-outline {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif;
}
.btn-outline:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.config-panel {
    width: 380px;
    border-right: 1px solid var(--border-color);
    padding: 2rem;
    overflow-y: auto;
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
}

.config-panel h3 { margin: 0 0 0.5rem 0; font-weight: 600; font-size: 1.25rem; font-family: 'Outfit', sans-serif; color: #fff; }
.subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
.subtitle a { color: var(--gold-accent); text-decoration: none; font-weight: 500; }

.form-grid { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;}

.input-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.input-group select, .input-group input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    color: #fff;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
}
.input-group select:focus, .input-group input:focus {
    border-color: var(--gold-accent);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    background: rgba(0, 0, 0, 0.4);
}

.cantos-section h4 { margin: 0; font-weight: 500;}
.canto-item { margin-bottom: 1rem; border: 1px solid var(--border-color); }
.canto-item input {
    width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'Outfit', sans-serif; margin-bottom: 8px;
}
.canto-item input:focus { border-color: var(--gold-accent); }

.btn-generate {
    width: 100%; 
    background: linear-gradient(135deg, var(--brand-color), #8B0000); 
    color: #fff; 
    font-weight: 600;
    padding: 14px; 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 8px; 
    cursor: pointer; 
    margin-top: 1rem; 
    transition: all 0.3s ease;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 4px 15px rgba(178, 0, 0, 0.3);
}
.btn-generate:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(178, 0, 0, 0.5);
    background: linear-gradient(135deg, #cc0000, #a00000);
}

.preview-panel {
    flex: 1;
    background: transparent;
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.pdf-container {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.4;
    color: #111;
    background: #fff;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
    text-align: justify;
    /* NLM Master Printer Rules */
    column-count: 2;
    column-gap: 8mm;
    column-fill: balance;
    column-rule: 1px solid rgba(153, 0, 0, 0.1); 
    hyphens: auto;
}

/* Configuración de Página para Impresión Doble Cara */
@page {
    size: 8.5in 11in;
    margin-top: 20mm;
    margin-bottom: 20mm;
    bleed: 3mm;
    marks: crop;
}

@page :left {
    margin-left: 22mm; /* Lomo */
    margin-right: 15mm;
}

@page :right {
    margin-left: 15mm;
    margin-right: 22mm; /* Lomo */
}



.empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    text-align: center;
    font-family: 'Cinzel', serif;
    opacity: 0.6;
}

/* --- SUBSIDIO LITÚRGICO STYLES --- */
.pdf-container strong.rubric, .pdf-container .rubrica-sacerdote, .missal-rubric {
    color: var(--brand-color); /* Liturgical red */
    font-style: italic;
    font-weight: normal;
    display: block;
    margin: 4px 0;
    font-size: 0.85em; /* 2pt menor que el texto principal */
}

.pdf-container h2, .pdf-container h3, .pdf-container .titulo-rito, .missal-super-heading, .missal-heading {
    color: var(--brand-color);
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    text-transform: uppercase;
    column-span: all; /* Detiene las columnas para anclar la sección */
    break-after: avoid; /* Previene títulos huerfanos al final de página */
    page-break-after: avoid;
}

.pdf-container .titulo-rito {
    border-bottom: 1px solid var(--brand-color);
    padding-bottom: 8px;
    margin-bottom: 15px;
}

.pdf-container .monicion {
    text-align: justify;
    font-size: 0.95em;
    margin-top: 15px;
    margin-bottom: 15px;
}

.pdf-container .monicion strong {
    font-family: 'Outfit', sans-serif;
    color: #333;
    font-size: 1.1em;
}

.pdf-container .oracion-capitular::first-letter {
    font-family: 'Cinzel', serif;
    font-size: 2.5em;
    float: left;
    line-height: 0.8;
    margin-right: 5px;
    color: var(--brand-color);
}

.pdf-container .asamblea {
    font-weight: bold;
    display: block;
    margin-top: 5px;
    margin-bottom: 10px;
}

.pdf-container .asamblea-rojo {
    color: var(--brand-color);
    font-weight: bold;

.pdf-container blockquote {
    font-style: italic; color: #444; border-left: 3px solid #c90000; padding-left: 15px; margin-left: 20px;
}

/* Modals */
.modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center;
}
.modal.visible { display: flex; }

.modal-content {
    background: var(--card-bg); padding: 3rem; border-radius: 16px; width: 100%; max-width: 500px;
    border: 1px solid var(--border-color); text-align: center; position: relative;
}

.close-btn {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white;
    font-size: 1.5rem; cursor: pointer;
}

.pricing-card {
    background: var(--bg-dark); border: 2px solid var(--brand-color); border-radius: 12px;
    padding: 2rem; margin-top: 2rem;
}
.pricing-card h3 { margin: 0; color: var(--brand-color); }
.price { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
.price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }

.pricing-card ul { text-align: left; margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.95rem;}
.btn-checkout {
    width: 100%; background: #6366f1; color: white; padding: 14px; border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer;
}

/* --- BOLETIN PRO STYLES --- */
.bulletin-wrapper {
    background: white;
    color: #111;
    width: 100%;
    max-width: 210mm;
    min-height: 297mm;
    height: max-content;
    padding: 15mm;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: 'Merriweather', serif;
    position: relative;
    margin: 0 auto;
}

.bul-top-motto {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95; /* Teal color */
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 0;
}

.bul-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 2px solid #333;
    font-family: 'Outfit', sans-serif;
}

.bul-info-col {
    padding: 15px;
    font-size: 0.75rem;
    border-right: 1px solid #999;
}
.bul-info-col:last-child { border-right: none; text-align: center; }

.bul-date h4 {
    color: #6122d6; /* Purple */
    margin: 0 0 5px 0;
    font-size: 1rem;
    text-transform: uppercase;
}
.bul-date p { color: #d97706; font-weight: 600; margin: 0;}

.bul-title-main {
    font-size: 5.5rem;
    font-weight: 900;
    text-align: center;
    margin: 10px 0;
    letter-spacing: -3px;
    line-height: 1;
}

.bul-subtitle {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

.bul-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    height: 350px;
}

.bul-grid-box {
    background: #333;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}
.bul-grid-box.purple { background: #875c8a; color: white; font-family: 'Merriweather'; font-size: 1.1rem; line-height: 1.2; font-weight: 700;}
.bul-bg-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
}

.bul-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    padding-top: 20px;
}

.bul-clergy h3 {
    font-family: 'Style Script', 'Merriweather', cursive; /* Elegant Script fallback */
    font-size: 2.5rem;
    font-style: italic;
    margin: 0 0 10px 0;
}
.bul-clergy p {
    font-family: 'Merriweather'; font-size: 0.8rem; margin: 2px 0; font-weight: 700;
}
.bul-qr {
    width: 100px; height: 100px; background: #eee;
}

/* Gospel Page 2 */
.bul-page-2 {
    margin-top: 15mm;
    border-top: 2px dashed #ccc;
    padding-top: 15mm;
}
.bul-page-2 h2 { text-transform: uppercase; font-size: 1.2rem; color: #c90000; text-align: center; }

/* Premium Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
}
.modal.visible {
    display: flex;
}
.modal-content {
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}
.close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
}
.pricing-card {
    background: var(--card-bg);
    border: 1px solid var(--brand-color);
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
}
.pricing-card .price {
    font-size: 2.5rem;
    color: var(--brand-color);
    font-weight: 700;
    margin: 10px 0;
}
.pricing-card .price span {
    font-size: 1rem; color: var(--text-secondary);
}
.pricing-card ul {
    text-align: left;
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
}
.pricing-card ul li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.pricing-card ul li::before {
    content: '✓ ';
    color: var(--brand-color);
    font-weight: bold;
}
.btn-checkout {
    background: var(--brand-color);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
    font-size: 1rem;
}

/* --- EDITORIAL MISSAL STYLES --- */


.pdf-container h2, .pdf-container h3, .pdf-container hr {
    column-span: all;
}

/* Evitar que se partan los bloques feo pero si permitir partir parrafos para no dejar hojas vacias */
.missal-block {
    margin-bottom: 1.5rem;
}

.missal-super-heading {
    text-transform: uppercase;
    color: var(--brand-color);
    font-size: calc(var(--base-size) * 1.5); /* 18pt basado en raiz 12pt */
    font-weight: 700;
    text-align: center;
    margin: 0 0 1.5cm 0; /* Blueprint param */
    letter-spacing: 1.5px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-heading {
    text-transform: uppercase;
    color: var(--brand-color); /* Carmesi */
    font-size: calc(var(--base-size) * 1.35); /* 14.4pt */
    font-weight: 700; /* Super Bold */
    margin: 0 0 0.5cm 0;
    letter-spacing: 1px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-citation {
    margin: 0 0 12px 0;
    font-size: calc(var(--base-size) * 1.0);
    font-weight: normal;
}

/* Texto Ordinario (Lecturas/Salmos) */
.missal-paragraph, .proclamacion {
    margin: 0;
    margin-bottom: 0.5rem;
    text-align: justify;
    line-height: 1.2;
    font-size: 10.5pt;
    position: relative;
    orphans: 3;
    widows: 3;
}

.missal-paragraph:not(.first-par) {
    text-indent: 1.2em;
}

.punctuation-hang, .smart-punctuation, .puntuacion-inicial {
    float: left;
    font-size: 2em; 
    line-height: 0.8;
    padding-top: 5px;
    margin-right: 2px;
    color: var(--brand-color);
    font-family: 'EB Garamond', serif;
}

.drop-cap {
    float: left;
    font-size: 3.2em; /* Calculado aprox ~3 lineas completas a line-height 1.2 */
    line-height: 0.85;
    padding-top: 5px;
    padding-right: 6px;
    padding-left: 2px;
    font-family: 'Cinzel', 'EB Garamond', serif;
    color: var(--brand-color);
}

/* Voz del Celebrante */
.oracion-presidencial, 
.proclamacion.presidencial {
    line-height: 1.8 !important;
    font-size: 11.5pt !important;
    font-style: italic; /* Opcional: para mayor distinción */
    padding-left: 0;
}
#ritos_iniciales {
    page-break-before: avoid;
    break-before: avoid;
}
/* Columnas para diálogos (Grid) */
.bloque-dialogo.dialogo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

.padre-pro-widget {

window.linkCanto = function(nombre) {
    let html = `<strong>${nombre}</strong>`;
    if (window.cantosDB && window.cantosDB[nombre]) {
        const letraFormat = window.cantosDB[nombre].letra.replace(/\n/g, '<br/>');
        html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;
    }
    return html;
};

    <script>
/* ==========================================
   ANTIGRAVITY - CEREBRO LITÚRGICO UNIFICADO
   ========================================== */

class NodoLiturgico {
    constructor(id, texto, tipo_texto = 'Pronunciado', actor = 'Sacerdote', estado_voz = 'Fuerte', estado_aparicion = 'Obligatorio') {
        this.id = id;
        this.texto = texto;
        this.tipo_texto = tipo_texto; // 'Pronunciado', 'Instruccion', 'Simbolo', 'Titulo'
        this.actor = actor; // 'Sacerdote', 'Asamblea', 'Diacono_Lector', 'Ninguno'
        this.estado_voz = estado_voz; // 'Fuerte', 'Secreta', 'Canto'
        this.estado_aparicion = estado_aparicion;
    }
}

class BloqueLiturgico {
    constructor(id) {
        this.id = id;
        this.nodos = [];
    }
    
    add(nodo) {
        this.nodos.push(nodo);
        return this;
    }
    
    addSuperTitulo(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_suptit', texto, 'SuperTitulo', 'Ninguno', 'Fuerte'));
        return this;
    }
    
    addTitulo(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_titulo', texto, 'Titulo', 'Ninguno', 'Fuerte'));
        return this;
    }
    
    addRubrica(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_rubrica', texto, 'Instruccion', 'Ninguno', 'Fuerte'));
        return this;
    }
    
    addSacerdote(texto, voz = 'Fuerte') {
        this.nodos.push(new NodoLiturgico(this.id + '_sac', texto, 'Pronunciado', 'Sacerdote', voz));
        return this;
    }
    
    addCapitular(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_capitular', texto, 'Capitular', 'Sacerdote', 'Fuerte'));
        return this;
    }
    
    addLectura(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_lect', texto, 'Proclamacion', 'Lector', 'Fuerte'));
        return this;
    }
    
    addMonicion(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_monicion', texto, 'Monicion', 'Monicion', 'Fuerte'));
        return this;
    }
    
    addGuia(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_guia', texto, 'Guia', 'Ninguno', 'Fuerte'));
        return this;
    }
    
    addAsamblea(texto) {
        this.nodos.push(new NodoLiturgico(this.id + '_asam', texto, 'Pronunciado', 'Asamblea', 'Fuerte'));
        return this;
    }
    
    addDialogo(sac, asam) {
        this.addSacerdote(sac);
        this.addAsamblea(asam);
        return this;
    }
}

function SANITIZAR_TEXTO(texto_crudo) {
    if (!texto_crudo) return '';
    let texto_limpio = String(texto_crudo).replace(/\[.*?\]/g, ""); // Elimina metadatos
    texto_limpio = texto_limpio.replace(/ {2,}/g, " "); // espacios multiples
    texto_limpio = texto_limpio.replace(/\n{2,}/g, "\n"); // saltos de linea dobles
    return texto_limpio.trim();
}

function applyLiturgicalColor(colorText) {
    const root = document.documentElement;
    if (!colorText) {
        root.style.setProperty('--brand-color', '#166534'); // Verde Ordinario por defecto
        return;
    }
    const txt = colorText.toLowerCase();
    if (txt.includes('morad') || txt.includes('púrpura') || txt.includes('purple')) {
        root.style.setProperty('--brand-color', '#6B21A8');
    } else if (txt.includes('rojo') || txt.includes('red')) {
        root.style.setProperty('--brand-color', '#B91C1C');
    } else if (txt.includes('blanc') || txt.includes('white') || txt.includes('dorad')) {
        root.style.setProperty('--brand-color', '#B45309'); // Dorado cálido para el impreso sobre fondo blanco
    } else if (txt.includes('rosa')) {
        root.style.setProperty('--brand-color', '#BE185D');
    } else {
        root.style.setProperty('--brand-color', '#166534'); // Verde
    }
}

function RENDERIZAR_NODO(nodo) {
    if (nodo.estado_aparicion === 'Omitido') return '';
    
    nodo.texto = SANITIZAR_TEXTO(nodo.texto);
    
    if (nodo.tipo_texto === 'SuperTitulo') {
        return `<h2 class="titulo-rito">${nodo.texto}</h2>\n`;
    } else if (nodo.tipo_texto === 'Titulo') {
        return `<h3 class="titulo-rito" style="font-size:1.2rem; margin-top:20px;">${nodo.texto}</h3>\n`;
    } else if (nodo.tipo_texto === 'Instruccion' || nodo.tipo_texto === 'Simbolo') {
        return `<strong class="rubrica-sacerdote">${nodo.texto}</strong>\n`;
    } else if (nodo.tipo_texto === 'Monicion') {
        return `<div class="monicion"><strong>MONICIÓN: </strong>${nodo.texto}</div>\n`;
    } else if (nodo.tipo_texto === 'Capitular') {
        // Para la oración Colecta y similares
        return `<div class="oracion-presidencial" style="text-align:justify; margin-bottom: 15px; margin-top: 10px; line-height: 1.8;">${nodo.texto}</div>\n`;
    } else if (nodo.tipo_texto === 'Proclamacion') {
        return window.formatLectura ? window.formatLectura(nodo.texto) : `<div class="oracion-capitular" style="text-align:justify; line-height: 1.5; margin-bottom: 20px;">${nodo.texto}</div>\n`;
    } else {
        let t = nodo.texto.trim();
        let prefix = "";
        
        if (nodo.tipo_texto === 'Pronunciado') {
            if (nodo.actor === 'Sacerdote') {
                if (nodo.estado_voz === 'Secreta') {
                    return `<div style="font-style: italic; color: #444; margin-bottom: 10px; margin-top: 5px;">${t}</div>\n`;
                }
                // Si la oración no tiene prefijo, no lo forzamos. Se asume que el Sacerdote lo lee con voz normal.
                return `<div style="margin-bottom: 15px; text-align: justify; line-height: 1.4;">${t}</div>\n`;
            } else if (nodo.actor === 'Asamblea') {
                if (!t.startsWith("R.") && !t.startsWith("R/") && !t.startsWith("T.") && !t.startsWith("R ")) {
                    prefix = `<span class="asamblea-rojo">R. </span>`;
                } else {
                    // Extraer la R. inicial y colorearla roja
                    t = t.replace(/^(R\.|R\/|T\.|R )\s*/i, "");
                    prefix = `<span class="asamblea-rojo">R. </span>`;
                }
                return `<div class="asamblea">${prefix}<span style="color: black; font-weight: bold;">${t}</span></div>\n`;
            }
        }
        
        return `<div style="margin-bottom: 10px;">${t}</div>\n`;
    }
}

function RENDERIZAR_BLOQUE(bloque) {
    if (bloque.nodos.length === 0) return '';
    let html = `<div class="missal-block" id="${bloque.id}">\n`;
    
    // REGLAS DE PAGINACIÓN LÓGICA (Blueprint)
    let n = bloque.nodos;
    for(let i=0; i<n.length; i++) {
        // Regla: Mantener dialogos juntos
        if (n[i].actor === 'Sacerdote' && (i+1) < n.length && n[i+1].actor === 'Asamblea') {
             html += `<div style="page-break-inside: avoid;">\n`;
             html += RENDERIZAR_NODO(n[i]);
             html += RENDERIZAR_NODO(n[i+1]);
             html += `</div>\n`;
             i++;
        // Regla: Mantener Titulo y su primer parrafo juntos
        } else if (n[i].tipo_texto === 'Titulo' && (i+1) < n.length) {
             html += `<div style="page-break-inside: avoid;">\n`;
             html += RENDERIZAR_NODO(n[i]);
             html += RENDERIZAR_NODO(n[i+1]);
             html += `</div>\n`;
             i++;
        } else {
             // Por defecto permitimos flujo natural para que bloques largos (ej. cantos con muchas estrofas, lecturas) no dejen gaps inmensos
             html += RENDERIZAR_NODO(n[i]) + `\n`;
        }
    }
    
    html += `</div>\n\n`;
    return html;
}

function linkCanto(nombre) {
    if(nombre.includes('Silencio') || nombre.includes('Salida sin canto')) return nombre;
    const query = encodeURIComponent(nombre + ' canto catolico');
    let html = `<a href="https://www.youtube.com/results?search_query=${query}" target="_blank" style="color:#c90000; text-decoration:underline; font-weight:bold;">${nombre}</a>`;
    
    if (window.cantosDB && window.cantosDB[nombre]) {
        const letraFormat = window.cantosDB[nombre].letra.replace(/\n/g, '<br/>');
        html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;
    }
    
    return html;
}

function obtenerCantosPorTiempo(tiempoStr, isEn) {

        return {
            entrada: linkCanto('Here I Am Lord'),

            salida: linkCanto('Demos Gracias al Señor') 
        };
    }
    const t = tiempoStr ? tiempoStr.toLowerCase() : "";
    if (t.includes('cuaresma')) {
        return {
            entrada: linkCanto('Hacia ti morada santa'),
            ofertorio: linkCanto('Te ofrecemos Señor nuestra juventud'),
            comunion: linkCanto('Pequeñas aclaraciones'),
            salida: linkCanto('Silencio')
        };
    } else if (t.includes('pascua')) {
        return {
            entrada: linkCanto('El Señor Resucitó Aleluya'),

            comunion: linkCanto('Pescador de Hombres'),
            salida: linkCanto('Reina del Cielo Aleluya')
        };
    }
    return {
        entrada: linkCanto('Juntos como hermanos'),
        ofertorio: linkCanto('Saber que vendrás'),
        comunion: linkCanto('Pescador de Hombres'),
        salida: linkCanto('Demos Gracias al Señor')
    };
}

    window.formatLectura = function(texto) {
        if (!texto || texto.length < 50) return texto;
        
        let pText = texto;
        if (!texto.includes('\n\n')) {
            let sentences = texto.replace(/([.?!])\s*(?=[A-Z])/g, "$1|").split("|");
            let result = "";
            for(let i = 0; i < sentences.length; i++) {
                result += sentences[i] + " ";
                if (i > 0 && i % 2 === 0) result += "\n\n";
            }
            pText = result.trim();
        }
        
        let parrafos = pText.split(/\n\n+/);
        let blocks = [];
        
        parrafos.forEach((p, idx) => {
             let cleanP = p.trim().replace(/\n/g, ' ');
             if(cleanP === "") return;
             if (idx === 0) {
                 // NLM Drop Caps Regex
                 let punctuation = "";
                 let firstChar = "";
                 let desc = cleanP;
                 const match = cleanP.match(/^([«"¡¿\-_]*)([A-ZÁÉÍÓÚÑa-záéíóúñ])/);
                 if (match) {
                     punctuation = match[1];
                     firstChar = match[2].toUpperCase(); // Enforce uppercase drop cap
                     desc = cleanP.slice(match[0].length);
                 } else {
                     firstChar = cleanP.charAt(0);
                     desc = cleanP.slice(1);
                 }
                 blocks.push(`<p class="missal-paragraph first-par"><span class="smart-punctuation">${punctuation}</span><span class="drop-cap">${firstChar}</span>${desc}</p>`);
             } else {
                 blocks.push(`<p class="missal-paragraph">${cleanP}</p>`);
             }
        });
        
        return blocks.join("");
    };

        if (window.cantosDB && window.cantosDB[nombre]) {

            html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;

    function markdownToHTML(md) {
        let text = md
            .replace(/-----\n\n/g, '')
            .replace(/### (.*?)\n/g, '<p class="missal-heading">$1</p>\n')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/^>[ \t]*(.*$)/gim, '<blockquote>$1</blockquote>')
            .replace(/<\/blockquote>\n<blockquote>/g, '<br>')
            .replace(/<\/blockquote><br><blockquote>/g, '<br>')
            .replace(/>\n+</g, '><') // Removes newlines strictly between HTML tags
            .replace(/\n\n/g, '<br><br>')
            .replace(/\n(?!<)/g, '<br>')
            .replace(/<br><\/div>/g, '</div>')
            .replace(/<br><div/g, '<div');
            
        // Apply rubric class to exact actors
        text = text.replace(/<strong>(Sacerdote:|Priest:|Sacerdote y Asamblea:|Asamblea:|People:|Lector:|Lector 1:|Lector 2:|Antífona:|Antífona 1:|Responsorio Breve:|Oración Final:|Himno:|Lectura Breve|Salmodia:|Examen de Conciencia:|Introducción:|Antífona Mariana:)<\/strong>/g, '<strong class="rubric">$1</strong>');
        return text;
    }

    }
});

// Helper para extraer texto de campos que puedan ser strings o arrays de objetos (para Letanías y Oraciones)
function safeText(field, defaultText) {
    if (!field) return defaultText;
    if (typeof field === "string") return field;
    if (Array.isArray(field)) {
        let text = field.filter(function(x) { return x.tipo !== 'rubrica'; }).map(function(x) { return x.texto || ""; }).join("\n").trim();
        if (!text) text = field.map(function(x) { return x.texto || ""; }).join("\n").trim();
        return text || defaultText;
    }
    if (field.texto) return field.texto;
    return defaultText;
}

    bComunion.addTitulo(isEn ? "Invitation to Communion" : "Invitación a la Comunión");
    bComunion.addDialogo(isEn ? "Behold the Lamb of God..." : "Este es el Cordero de Dios, que quita el pecado del mundo. Dichosos los invitados a la cena del Señor.", isEn ? "Lord, I am not worthy..." : "Señor, no soy digno de que entres en mi casa, pero una palabra tuya bastará para sanarme.");

    let antc = (data.liturgia_eucaristica && data.liturgia_eucaristica.antifona_comunion) ? data.liturgia_eucaristica.antifona_comunion : "Acerca tu mano, trae tu dedo y explora mis llagas...";
    bComunion.addTitulo(isEn ? "Communion Antiphon" : "Antífona de la Comunión");
    bComunion.addSacerdote(antc);
    
    bComunion.addTitulo(isEn ? "Communion Chant" : "Canto de Comunión");
    bComunion.addRubrica(cantos.comunion);



    let despues = safeText((data.liturgia_eucaristica && data.liturgia_eucaristica.oracion_despues_comunion) ? data.liturgia_eucaristica.oracion_despues_comunion : null, (isEn ? "Grant, we pray, almighty God..." : "Concédenos, Dios todopoderoso, que la eficacia de este sacramento..."));
    bComunion.addTitulo(isEn ? "Prayer after Communion" : "Oración después de la Comunión");
    bComunion.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + despues);
    bComunion.addAsamblea("Amén.");
    
    
    
    SECUENCIA_LITURGICA.push(bComunion);

    // BLOQUE E: CONCLUSIÓN
    let bConclusion = new BloqueLiturgico("conclusion");
    bConclusion.addSuperTitulo(isEn ? "CONCLUDING RITES" : "RITO DE CONCLUSIÓN");

    if (Flag_Oracion_Pueblo && data.oracion_sobre_el_pueblo) {
        bConclusion.addTitulo("Oración sobre el Pueblo");
        bConclusion.addRubrica("Sacerdote: Iniclinen la cabeza para recibir la bendición.");
        bConclusion.addSacerdote(safeText(data.oracion_sobre_el_pueblo, ""));
        bConclusion.addAsamblea("Amén.");
    }

    bConclusion.addTitulo(isEn ? "Final Blessing" : "Bendición Final");
    bConclusion.addDialogo(isEn ? "The Lord be with you." : "El Señor esté con ustedes.", isEn ? "And with your spirit." : "Y con tu espíritu.");
    bConclusion.addDialogo(isEn ? "May almighty God bless you, the Father, and the Son, and the Holy Spirit." : "La bendición de Dios todopoderoso, Padre, Hijo y Espíritu Santo, descienda sobre ustedes.", "Amén.");

    if (Flag_DobleAleluya_Despedida) {
        bConclusion.addDialogo(isEn ? "Go in peace, Alleluia, alleluia." : "Pueden ir en paz, Aleluya, aleluya.", isEn ? "Thanks be to God, Alleluia, alleluia." : "Demos gracias a Dios, Aleluya, aleluya.");
    } else {
        bConclusion.addDialogo(isEn ? "Go in peace." : "Pueden ir en paz.", isEn ? "Thanks be to God." : "Demos gracias a Dios.");
    }

    bConclusion.addTitulo(isEn ? "Recessional Chant" : "Canto de Salida");
    bConclusion.addRubrica(cantos.salida);
    SECUENCIA_LITURGICA.push(bConclusion);

    
    // Lectio Divina (Auto-generador si estamos en jornada diaria y es la ultima llamada)
    if (hora === "lectio") {
        let bLectio = new BloqueLiturgico("lectio");
        bLectio.addSuperTitulo("LECTIO DIVINA");
        bLectio.addTitulo("I. LECTIO");
        bLectio.addRubrica("Lectura pausada del Evangelio dominical o del día.");
        bLectio.addSacerdote((data.liturgia_palabra && data.liturgia_palabra.evangelio) ? data.liturgia_palabra.evangelio.texto : "[Texto del Evangelio]");
        bLectio.addTitulo("II. MEDITATIO");
        bLectio.addRubrica("¿Qué me dice a mí el texto?");
        bLectio.addTitulo("III. ORATIO");
        bLectio.addRubrica("¿Qué le digo yo al Señor que me acaba de hablar?");
        bLectio.addTitulo("IV. CONTEMPLATIO");
        bLectio.addRubrica("¿A qué me invita en mi vida concreta como resolución?");
        SECUENCIA_LITURGICA.push(bLectio);
    }

    // EJECUCION MOTOR DE RENDERING
    let htmlOut = '';
    SECUENCIA_LITURGICA.forEach(bloque => htmlOut += RENDERIZAR_BLOQUE(bloque));
    return htmlOut;
}

// -----------------------------------------------------
// NUEVO MOTOR AST (FASE 5)
// -----------------------------------------------------
function generarDocumentoNodos(data, hora, options = {}) {
    if (!data) return '';
    // Híbrido: Si no hay esqueleto canónico del nuevo motor, usamos el sistema viejo procedural 
    if (!data.esqueleto_ordinario || !window.DbOrdinario) {
        return generarDocumentoNodosLegacy(data, hora, options);
    }
    
    let isEn = options.isEn === true;
    let showMoniciones = options.showMoniciones !== false;
    let showHomilia = options.showHomilia !== false;
    let OFICIO = null;
    if (hora) {
        if (hora.includes("laudes")) OFICIO = "Laudes";
        else if (hora.includes("visperas")) OFICIO = "Visperas";
        else if (hora.includes("oficio")) OFICIO = "Oficio";
        else if (hora.includes("intermedia")) OFICIO = "Intermedia";
        else if (hora.includes("completas")) OFICIO = "Completas";
    }
    const IS_MISA = (hora === "misa" || hora === "misa_laudes" || !hora);
    
    let SECUENCIA_LITURGICA = [];
    const cantos = window.obtenerCantosPorTiempo ? window.obtenerCantosPorTiempo(data.tiempo_liturgico || "Ordinario", isEn) : { entrada: "", ofertorio: "", comunion: "", salida: "" };
    const ord = window.DbOrdinario.ordinario;

    const checkAccion = (bloque_id) => {
        let f = data.esqueleto_ordinario.find(x => x.id_bloque === bloque_id);
        return f && f.accion === "incluir";
    };

    // ==========================================
    // BLOQUE A: RITOS INICIALES
    // ==========================================
    let bInicial = new BloqueLiturgico("ritos_iniciales");
    bInicial.addSuperTitulo(isEn ? "INTRODUCTORY RITES" : "RITOS INICIALES");

    if (showMoniciones) {
        bInicial.addTitulo(isEn ? "Entrance Monition" : "Monición de Entrada");
        bInicial.addMonicion(data.monicion_entrada || "Breve introducción a la liturgia del día.");
    }
    
    bInicial.addTitulo(isEn ? "Entrance Chant" : "Canto de Entrada");
    bInicial.addRubrica(cantos.entrada);

    bInicial.addTitulo(isEn ? "Entrance Antiphon" : "Antífona de Entrada");
    bInicial.addSacerdote(data.antifona_entrada || "Antífona según calendario...");

    if (checkAccion("saludo_inicial")) {
        bInicial.addTitulo(isEn ? "Greeting" : "Saludo Inicial");
        let nd = ord.ritos_iniciales.saludo;
        bInicial.addRubrica(nd.rubrica_previa);
        bInicial.addDialogo(nd.formula_principal.celebrante, nd.formula_principal.asamblea);
        bInicial.addDialogo(nd.opciones_saludo[2].celebrante, nd.opciones_saludo[2].asamblea); // Opción C
    }

    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let officeData = data[hora];
        let salmosNombres = OFICIO === "Laudes" ? ["salmo1", "cantico_at", "salmo2"] : ["salmo1", "salmo2", "cantico_nt"];
        let titulosArray = OFICIO === "Laudes" ? ["Salmo 1", "Cántico del Antiguo Testamento", "Salmo 2"] : ["Salmo 1", "Salmo 2", "Cántico del Nuevo Testamento"];

        if (officeData && officeData[salmosNombres[0]]) {
            bInicial.addSuperTitulo(isEn ? ("INTEGRATED PSALMODY (" + OFICIO + ")") : ("SALMODIA INTEGRADA (" + OFICIO.toUpperCase() + ")"));
            
            salmosNombres.forEach((nombre, index) => {
                let s = officeData[nombre];
                if (s) {
                    bInicial.addTitulo(isEn ? ("Psalmody: " + nombre) : titulosArray[index]);
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                    let lines = s.texto.split("\n\n");
                    lines.forEach((line, idx) => {
                        if (idx % 2 === 0) bInicial.addSacerdote(line, 'Normal');
                        else bInicial.addAsamblea(line);
                    });
                    bInicial.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
                    bInicial.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                }
            });
        }
    } else {
        if (checkAccion("acto_penitencial")) {
            bInicial.addTitulo(isEn ? "Penitential Act" : "Acto Penitencial");
            let nd = ord.ritos_iniciales.acto_penitencial;
            bInicial.addRubrica(nd.rubrica_previa);
            bInicial.addMonicion(nd.monicion_invitatoria);
            bInicial.addRubrica(nd.rubrica_silencio);
            
            let opt = nd.opciones_formula.find(x => x.id === "confiteor");
            if(opt) {
                bInicial.addAsamblea(opt.texto_conjunto);
                bInicial.addSacerdote(opt.absolucion_celebrante);
                bInicial.addAsamblea(opt.respuesta_absolucion);
            }
        }

        if (checkAccion("kyrie")) {
            let nd = ord.ritos_iniciales.kyrie;
            bInicial.addRubrica(nd.rubrica_previa);
            nd.invocaciones.forEach(i => bInicial.addDialogo(i.invocacion, i.respuesta));
        }
    }

    if (checkAccion("gloria")) {
        let nd = ord.ritos_iniciales.gloria;
        bInicial.addTitulo("Gloria");
        bInicial.addRubrica(nd.rubrica_previa);
        bInicial.addAsamblea(nd.texto);
    }

    bInicial.addTitulo(isEn ? "Collect" : "Oración Colecta");
    bInicial.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + safeText(data.oracion_colecta, ""));
    bInicial.addAsamblea("Amén.");
    SECUENCIA_LITURGICA.push(bInicial);


    // ==========================================
    // BLOQUE B: LITURGIA DE LA PALABRA
    // ==========================================
    let bPalabra = new BloqueLiturgico("liturgia_palabra");
    bPalabra.addSuperTitulo(isEn ? "LITURGY OF THE WORD" : "LITURGIA DE LA PALABRA");
    
    let lp = data.liturgia_palabra || {};

    if (lp.primera_lectura) {
        bPalabra.addTitulo(isEn ? "First Reading" : "Primera Lectura");
        bPalabra.addRubrica(lp.primera_lectura.cita || "");
        bPalabra.addLectura(lp.primera_lectura.texto || "");
        bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");
    }

    if (lp.salmo_responsorial) {
        bPalabra.addTitulo(isEn ? "Responsorial Psalm" : "Salmo Responsorial");
        bPalabra.addRubrica(lp.salmo_responsorial.cita || "");
        bPalabra.addAsamblea("R. " + (lp.salmo_responsorial.respuesta || ""));
        bPalabra.addSacerdote(lp.salmo_responsorial.texto || "");
    }

    if (lp.segunda_lectura) {
        bPalabra.addTitulo(isEn ? "Second Reading" : "Segunda Lectura");
        bPalabra.addRubrica(lp.segunda_lectura.cita || "");
        bPalabra.addLectura(lp.segunda_lectura.texto || "");
        bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");
    }

    if (lp.secuencia) {
        bPalabra.addTitulo(isEn ? "Sequence" : "Secuencia");
        if (lp.secuencia.nodos) {
            // Placeholder for native AST appending
        } else if (lp.secuencia.texto) {
            bPalabra.addLectura(lp.secuencia.texto);
        }
    }

    bPalabra.addTitulo(isEn ? "Gospel Acclamation" : "Aclamación antes del Evangelio");
    bPalabra.addAsamblea(lp.aclamacion_evangelio || "Aleluya, aleluya.");

    if (lp.evangelio) {
        bPalabra.addTitulo(isEn ? "Gospel" : "Evangelio");
        bPalabra.addRubrica("<span class='cross-mark'>✠</span> " + (lp.evangelio.cita || ""));
        bPalabra.addLectura(lp.evangelio.texto || "");
        bPalabra.addDialogo(isEn ? "The Gospel of the Lord." : "Palabra del Señor.", isEn ? "Praise to you, Lord Jesus Christ." : "Gloria a ti, Señor Jesús.");
    }

    bPalabra.addTitulo(isEn ? "Homily" : "Homilía");
    if (showHomilia && data.guia_reflexion) bPalabra.addGuia(data.guia_reflexion);
    else bPalabra.addRubrica(isEn ? "The priest or deacon delivers the homily." : "El sacerdote o diácono pronuncia la homilía.");
    SECUENCIA_LITURGICA.push(bPalabra);

    if (checkAccion("credo")) {
        let bCredo = new BloqueLiturgico("credo");
        bCredo.addTitulo(isEn ? "Profession of Faith" : "Profesión de Fe");
        bCredo.addAsamblea("Creo en un solo Dios, Padre todopoderoso, Creador del cielo y de la tierra, de todo lo visible y lo invisible...\n\nCreo en un solo Señor, Jesucristo, Hijo único de Dios, nacido del Padre antes de todos los siglos...\n\nCreo en el Espíritu Santo, Señor y dador de vida..."); 
        SECUENCIA_LITURGICA.push(bCredo);
    }
    
    let bPreces = new BloqueLiturgico("preces");
    
    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let officeData = data[hora];
        if (officeData && officeData.cantico_evangelico) {
            let canticoName = OFICIO === "Laudes" ? "Cántico de Zacarías (Benedictus)" : "Cántico de María (Magnificat)";
            bPreces.addSuperTitulo(isEn ? "GOSPEL CANTICLE" : "CÁNTICO EVANGÉLICO (" + OFICIO.toUpperCase() + ")");
            bPreces.addTitulo(isEn ? "Gospel Canticle" : canticoName);
            bPreces.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + officeData.cantico_evangelico.antifona);
            
            let lines = [];
            if (Array.isArray(officeData.cantico_evangelico.texto)) {
                lines = officeData.cantico_evangelico.texto;
            } else if (typeof officeData.cantico_evangelico.texto === 'string') {
                lines = officeData.cantico_evangelico.texto.split(/\n+/).filter(l => l.trim().length > 1);
            }
            
            lines.forEach((line, idx) => {
                if (idx % 2 === 0) bPreces.addSacerdote(line, 'Normal');
                else bPreces.addAsamblea(line);
            });
            
            bPreces.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
            bPreces.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
            bPreces.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + officeData.cantico_evangelico.antifona);
        }
    }
    if ((OFICIO === "Laudes" || OFICIO === "Visperas") && data[hora] && data[hora].preces) {
        bPreces.addTitulo(isEn ? "Prayers / Intercessions (" + OFICIO + ")" : "Preces (" + OFICIO + ")");
        bPreces.addRubrica(isEn ? "The Universal Prayer is substituted by the Intercessions of the Liturgy of the Hours." : "Se sustituye la Oración de los Fieles por las preces del Oficio divino.");
        let ptxt = data[hora].preces;
        ptxt.split('\n').filter(x=>x.trim()).forEach(l => {
            if(l.startsWith("-") || l.startsWith("—")) bPreces.addMonicion(l);
            else if(l.includes("Te rogamos") || l.includes("Escúchanos")) bPreces.addAsamblea("R. " + l);
            else bPreces.addSacerdote(l, 'Normal');
        });
    } else {
        bPreces.addTitulo(isEn ? "Universal Prayer" : "Oración de los Fieles");
        let ptxt = lp.preces || "Lector: Te rogamos, óyenos.";
        ptxt.split('\n').filter(x=>x.trim()).forEach(l => bPreces.addMonicion(l.replace(/•/g, '').trim()));
    }
    SECUENCIA_LITURGICA.push(bPreces);

    // ==========================================
    // BLOQUE C: LITURGIA EUCARÍSTICA
    // ==========================================
    let bEuca = new BloqueLiturgico("liturgia_eucaristica");
    bEuca.addSuperTitulo(isEn ? "LITURGY OF THE EUCHARIST" : "LITURGIA EUCARÍSTICA");
    bEuca.addTitulo(isEn ? "Offertory Chant" : "Canto de Ofertorio");
    bEuca.addRubrica(cantos.ofertorio);

    if (checkAccion("preparacion_dones")) {
        let nd = ord.liturgia_eucaristica.preparacion_dones;
        bEuca.addTitulo(isEn ? "Preparation of the Gifts" : "Preparación de los Dones");
        bEuca.addRubrica(nd.rubrica_previa);
        bEuca.addDialogo(nd.bendicion_pan.celebrante, nd.bendicion_pan.asamblea);
        bEuca.addRubrica(nd.bendicion_vino.rubrica_previa);
        bEuca.addDialogo(nd.bendicion_vino.celebrante, nd.bendicion_vino.asamblea);
        bEuca.addRubrica(nd.orate_fratres.rubrica_previa);
        bEuca.addDialogo(nd.orate_fratres.celebrante, nd.orate_fratres.asamblea);
    }

    bEuca.addTitulo(isEn ? "Prayer over the Offerings" : "Oración sobre las Ofrendas");
    bEuca.addCapitular(safeText(data.liturgia_eucaristica ? data.liturgia_eucaristica.oracion_ofrendas : null, ""));
    bEuca.addAsamblea("Amén.");
    
    if (checkAccion("plegaria_eucaristica_II")) {
        let nd = ord.liturgia_eucaristica.plegaria_eucaristica_II;
        bEuca.addTitulo(isEn ? "Preface Dialogue" : "Diálogo del Prefacio");
        bEuca.addDialogo(nd.dialogo_prefacio.v1, nd.dialogo_prefacio.r1);
        bEuca.addDialogo(nd.dialogo_prefacio.v2, nd.dialogo_prefacio.r2);
        bEuca.addDialogo(nd.dialogo_prefacio.v3, nd.dialogo_prefacio.r3);
        
        bEuca.addTitulo(isEn ? "Sanctus" : "Santo");
        bEuca.addAsamblea(nd.santo.texto);

        bEuca.addTitulo(isEn ? "Eucharistic Prayer" : "Plegaria Eucarística");
        bEuca.addRubrica("El sacerdote pronuncia la Plegaria Eucarística elegida.");
        bEuca.addSacerdote(nd.consagracion.pan);
        bEuca.addSacerdote(nd.consagracion.vino);
        bEuca.addDialogo(nd.aclamacion_misterio.celebrante, nd.aclamacion_misterio.asamblea);
        bEuca.addDialogo(nd.doxologia.celebrante, nd.doxologia.asamblea);
    }
    SECUENCIA_LITURGICA.push(bEuca);

    // ==========================================
    // BLOQUE D: COMUNIÓN
    // ==========================================
    let bComunion = new BloqueLiturgico("rito_comunion");
    bComunion.addSuperTitulo(isEn ? "COMMUNION RITE" : "RITO DE LA COMUNIÓN");

    if (checkAccion("padre_nuestro")) {
        let nd = ord.rito_comunion.padre_nuestro;
        bComunion.addTitulo("Padre Nuestro");
        bComunion.addMonicion(nd.monicion);
        bComunion.addAsamblea(nd.oracion);
        bComunion.addDialogo(nd.embolismo_y_doxologia.celebrante, nd.embolismo_y_doxologia.asamblea);
    }

    if (checkAccion("rito_paz")) {
        let nd = ord.rito_comunion.rito_paz;
        bComunion.addTitulo("Rito de la Paz");
        bComunion.addDialogo(nd.oracion_paz.celebrante, nd.oracion_paz.asamblea);
        bComunion.addDialogo(nd.dialogo_paz.celebrante, nd.dialogo_paz.asamblea);
    }

    if (checkAccion("fraccion_pan_y_comunion")) {
        let nd = ord.rito_comunion.fraccion_pan_y_comunion;
        bComunion.addTitulo("Fracción del Pan");
        bComunion.addAsamblea(nd.cordero_dios);
        bComunion.addTitulo("Invitación a la Comunión");
        bComunion.addDialogo(nd.invitacion.celebrante, nd.invitacion.asamblea);
    }

    bComunion.addTitulo(isEn ? "Communion Antiphon" : "Antífona de Comunión");
    bComunion.addSacerdote(data.liturgia_eucaristica ? data.liturgia_eucaristica.antifona_comunion : "");
    bComunion.addTitulo(isEn ? "Communion Chant" : "Canto de Comunión");
    bComunion.addRubrica(cantos.comunion);



    bComunion.addTitulo(isEn ? "Prayer after Communion" : "Oración después de la Comunión");
    bComunion.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + safeText(data.liturgia_eucaristica ? data.liturgia_eucaristica.oracion_despues_comunion : null, ""));
    bComunion.addAsamblea("Amén.");
    SECUENCIA_LITURGICA.push(bComunion);

    // ==========================================
    // BLOQUE E: CONCLUSIÓN
    // ==========================================
    let bConclusion = new BloqueLiturgico("conclusion");
    bConclusion.addSuperTitulo(isEn ? "CONCLUDING RITES" : "RITOS DE CONCLUSIÓN");

    if (checkAccion("bendicion_despedida")) {
        let nd = ord.ritos_conclusion.bendicion_despedida;
        bConclusion.addTitulo(isEn ? "Final Blessing" : "Bendición Final");
        bConclusion.addDialogo(nd.dialogo_bendicion.celebrante_v, nd.dialogo_bendicion.asamblea_r);
        bConclusion.addDialogo(nd.dialogo_bendicion.celebrante_b, nd.dialogo_bendicion.asamblea_b);
        bConclusion.addDialogo(nd.despedida.diacono, nd.despedida.asamblea);
    } else {
        // Fallback for testing
        bConclusion.addDialogo("El Señor esté con ustedes", "Y con tu espíritu");
        bConclusion.addDialogo("Pueden ir en paz.", "Demos gracias a Dios.");
    }

    bConclusion.addTitulo(isEn ? "Recessional Chant" : "Canto de Salida");
    bConclusion.addRubrica(cantos.salida);
    SECUENCIA_LITURGICA.push(bConclusion);

    // ==========================================
    // EJECUCIÓN DEL RENDERIZADO AST
    // ==========================================
    let htmlOut = '';
    SECUENCIA_LITURGICA.forEach(bloque => htmlOut += RENDERIZAR_BLOQUE(bloque));
    return htmlOut;
}

// ==========================================
// MÓDULO DE PRUEBA AST (ANTIGRAVITY PURO)
// ==========================================
function procesarProclamacion(block) {
  const { texto, subtipo } = block;
  if (!texto) return '';

  // REGLA ANTIGRAVITY: Si es oración presidencial, omitir capitular.
  if (subtipo === "oracion_presidencial") {
    return `<div class="proclamacion presidencial">${texto}</div>`;
  }

  // Regex para detectar signos iniciales opcionales y la primera letra
  const regex = /^([«¿¡"“]*)([a-zA-ZÁÉÍÓÚÑ])/;
  const match = texto.match(regex);

  if (match) {
    const signos = match[1];
    const letra = match[2];
    const resto = texto.replace(regex, '');
    
    return `
      <div class="proclamacion">
        <span class="punctuation-hang">${signos}</span>
        <span class="drop-cap">${letra}</span>
        <span class="cuerpo-texto">${resto}</span>
      </div>`;
  }

  return `<div class="proclamacion">${texto}</div>`;
}

function RENDERIZAR_NODO_AST(block) {
  if (block.tipo === "titulo_dia") return `<h2 class="missal-super-heading">${block.contenido}</h2>`;
  if (block.tipo === "titulo_misa") return `<p class="missal-heading">${block.contenido}</p>`;
  if (block.tipo === "seccion") return `<h3 class="titulo-rito">${block.contenido}</h3>`;
  if (block.tipo === "rubrica") return `<p class="missal-rubric">${block.contenido}</p>`;
  if (block.tipo === "monicion") return `<div class="monicion"><strong>MONICIÓN: </strong>${block.contenido}</div>`;
  if (block.tipo === "canto") return `<div class="rubrica-sacerdote" style="margin-bottom: 10px;">${block.titulo}: ${block.letra}</div>`;
  
  if (block.tipo === "dialogo") {
    const hasBoth = block.v && block.r;
    const layoutClass = hasBoth ? "dialogo-grid" : "dialogo-lineal";
    return `
      <div class="bloque-dialogo ${layoutClass}">
        <div class="v-part"><span class="sigla-roja">V/.</span> ${block.v}</div>
        ${hasBoth ? `<div class="r-part"><span class="sigla-roja">R/.</span> ${block.r}</div>` : ''}
      </div>`;
  }

  if (block.tipo === "proclamacion") return procesarProclamacion(block);

  return `<div>${block.contenido}</div>`;
}

// Simulador de entrada y volcado de resultados
window.RenderizarTestAST = function(astJsonArray) {
    let htmlOut = '';
    astJsonArray.forEach(bloque => {
        htmlOut += RENDERIZAR_NODO_AST(bloque) + '\\n';
    });
    return htmlOut;
};

/**
 * MOTOR DE RENDERIZADO ANTIGRAVITY v2.0
 * Sustituye el antiguo bucle procedimental por un intérprete de AST determinista.
 */
window.RenderizarSaaS = function(jsonAST) {
    const contenedor = document.getElementById('pdf-view') || document.querySelector('.pdf-container');
    if (!contenedor || !Array.isArray(jsonAST)) return;

    contenedor.innerHTML = ''; // Limpieza de nodos legacy
    const fragmento = document.createDocumentFragment();

    jsonAST.forEach((bloque) => {
        const div = document.createElement('div');
        div.className = `missal-block`; // Clase de contención básica NLM
        div.innerHTML = RENDERIZAR_NODO_AST(bloque);
        fragmento.appendChild(div);
    });

    contenedor.appendChild(fragmento);
    console.log("SaaS Refactorizado: Misal renderizado bajo estándar NLM y Motor AST.");
};
