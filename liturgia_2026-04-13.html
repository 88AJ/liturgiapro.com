<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Liturgia PRO Standalone - 2026-04-13</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
:root {
    --base-size: 15px;

    --bg-dark: #09090b; /* Deep zinc-950 */
    --bg-gradient: radial-gradient(circle at top left, #18181b 0%, #09090b 100%);
    --card-bg: rgba(24, 24, 27, 0.6); /* Translucent zinc-900 */
    --text-primary: #e4e4e7; /* zinc-200 */
    --text-secondary: #a1a1aa; /* zinc-400 */
    --brand-color: #D32F2F; /* Liturgical Crimson */
    --brand-hover: #dc2626; /* Bright red */
    --border-color: rgba(255, 255, 255, 0.08); /* Frosted glass border */
    --sidebar-bg: rgba(9, 9, 11, 0.7); /* Translucent sidebar */
    --gold-accent: #d4af37; /* Clean Gold */
    --gold-hover: #fcd34d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    overflow: hidden;
}

/* Scrollbars sleek */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

.view {
    display: none;
    height: 100vh;
    width: 100vw;
}

.view.active {
    display: flex;
}

/* Landing Page */
#landing-screen {
    position: relative;
    justify-content: center;
    align-items: center;
}

.landing-content {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    padding: 3rem;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    text-align: center;
    max-width: 500px;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
}
.logo span, .logo-small span {
    color: var(--brand-color);
}
.logo { color: #ffffff; font-family: 'Cinzel', serif; }

.landing-content h1 {
    font-size: 2.2rem;
    margin: 0 0 1rem 0;
}

.landing-content p {
    color: var(--text-secondary);
    margin-bottom: 2rem;
    line-height: 1.5;
}

.login-box {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.login-box h3 { margin: 0; font-size: 1.1rem; }
.login-box input {
    padding: 14px;
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    color: white;
    border-radius: 8px;
    font-family: 'Outfit';
}
.login-box input:focus { outline: none; border-color: var(--brand-color); }

.btn-primary {
    background: var(--gold-accent);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.btn-primary:hover { background: #E5C158; }

.signup-link { font-size: 0.9rem; margin-top: 1rem; }
.signup-link a { color: var(--brand-color); text-decoration: none; }

.landing-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    z-index: 1;
}

/* Dashboard */
.saas-sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    z-index: 10;
}

.logo-small {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 3rem;
    color: #ffffff;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
}

.nav-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: #71717a;
    letter-spacing: 0.15em;
    padding: 0 16px;
    margin-bottom: 0.8rem;
    font-family: 'Outfit', sans-serif;
    text-transform: uppercase;
}

.nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.nav-links li {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
}
.nav-links li:hover:not(.active) { 
    background: rgba(255, 255, 255, 0.05); 
    color: #fff;
    transform: translateX(4px);
}
.nav-links li.active { 
    background: linear-gradient(90deg, rgba(178, 0, 0, 0.15) 0%, rgba(178, 0, 0, 0) 100%);
    color: #fff; 
    font-weight: 500; 
    border-left: 3px solid var(--brand-color); 
    box-shadow: inset 2px 0 0px var(--brand-color);
}

/* Capitular Icons */
.icon {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--brand-color);
    font-size: 1.2rem;
    width: 20px;
    text-align: center;
}

.badge {
    background: var(--brand-color);
    color: #000;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 700;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}
.avatar {
    width: 40px; height: 40px;
    background: var(--card-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
}
.user-info strong { display: block; font-size: 0.95rem; }
.user-info span { color: var(--text-secondary); font-size: 0.8rem; }

.btn-upgrade {
    background: transparent;
    border: 1px solid var(--brand-color);
    color: var(--brand-color);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}
.btn-upgrade:hover { background: rgba(245, 158, 11, 0.1); }

/* Main Hub */
.saas-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: transparent; /* lets body gradient show through */
}

.saas-header {
    height: 80px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(9, 9, 11, 0.4);
    backdrop-filter: blur(10px);
    z-index: 5;
}
.saas-header h2 { margin: 0; font-weight: 500; font-size: 1.3rem; font-family: 'Outfit', sans-serif;}

.btn-outline {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif;
}
.btn-outline:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.config-panel {
    width: 380px;
    border-right: 1px solid var(--border-color);
    padding: 2rem;
    overflow-y: auto;
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
}

.config-panel h3 { margin: 0 0 0.5rem 0; font-weight: 600; font-size: 1.25rem; font-family: 'Outfit', sans-serif; color: #fff; }
.subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
.subtitle a { color: var(--gold-accent); text-decoration: none; font-weight: 500; }

.form-grid { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;}

.input-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.input-group select, .input-group input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    color: #fff;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
}
.input-group select:focus, .input-group input:focus {
    border-color: var(--gold-accent);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    background: rgba(0, 0, 0, 0.4);
}

.cantos-section h4 { margin: 0; font-weight: 500;}
.canto-item { margin-bottom: 1rem; border: 1px solid var(--border-color); }
.canto-item input {
    width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'Outfit', sans-serif; margin-bottom: 8px;
}
.canto-item input:focus { border-color: var(--gold-accent); }

.btn-generate {
    width: 100%; 
    background: linear-gradient(135deg, var(--brand-color), #8B0000); 
    color: #fff; 
    font-weight: 600;
    padding: 14px; 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 8px; 
    cursor: pointer; 
    margin-top: 1rem; 
    transition: all 0.3s ease;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 4px 15px rgba(178, 0, 0, 0.3);
}
.btn-generate:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(178, 0, 0, 0.5);
    background: linear-gradient(135deg, #cc0000, #a00000);
}

.preview-panel {
    flex: 1;
    background: transparent;
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.pdf-container {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.4;
    color: #111;
    background: #fff;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
    text-align: justify;
    /* NLM Master Printer Rules */
    column-count: 2;
    column-gap: 8mm;
    column-fill: balance;
    column-rule: 1px solid rgba(153, 0, 0, 0.1); 
    hyphens: auto;
}

/* Configuración de Página para Impresión Doble Cara */
@page {
    size: 8.5in 11in;
    margin-top: 20mm;
    margin-bottom: 20mm;
    bleed: 3mm;
    marks: crop;
}

@page :left {
    margin-left: 22mm; /* Lomo */
    margin-right: 15mm;
}

@page :right {
    margin-left: 15mm;
    margin-right: 22mm; /* Lomo */
}



.empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    text-align: center;
    font-family: 'Cinzel', serif;
    opacity: 0.6;
}

/* --- SUBSIDIO LITÚRGICO STYLES --- */
.pdf-container strong.rubric, .pdf-container .rubrica-sacerdote, .missal-rubric {
    color: var(--brand-color); /* Liturgical red */
    font-style: italic;
    font-weight: normal;
    display: block;
    margin: 4px 0;
    font-size: 0.85em; /* 2pt menor que el texto principal */
}

.pdf-container h2, .pdf-container h3, .pdf-container .titulo-rito, .missal-super-heading, .missal-heading {
    color: var(--brand-color);
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    text-transform: uppercase;
    column-span: all; /* Detiene las columnas para anclar la sección */
    break-after: avoid; /* Previene títulos huerfanos al final de página */
    page-break-after: avoid;
}

.pdf-container .titulo-rito {
    border-bottom: 1px solid var(--brand-color);
    padding-bottom: 8px;
    margin-bottom: 15px;
}

.pdf-container .monicion {
    text-align: justify;
    font-size: 0.95em;
    margin-top: 15px;
    margin-bottom: 15px;
}

.pdf-container .monicion strong {
    font-family: 'Outfit', sans-serif;
    color: #333;
    font-size: 1.1em;
}

.pdf-container .oracion-capitular::first-letter {
    font-family: 'Cinzel', serif;
    font-size: 2.5em;
    float: left;
    line-height: 0.8;
    margin-right: 5px;
    color: var(--brand-color);
}

.pdf-container .asamblea {
    font-weight: bold;
    display: block;
    margin-top: 5px;
    margin-bottom: 10px;
}

.pdf-container .asamblea-rojo {
    color: var(--brand-color);
    font-weight: bold;

.pdf-container blockquote {
    font-style: italic; color: #444; border-left: 3px solid #c90000; padding-left: 15px; margin-left: 20px;
}

/* Modals */
.modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center;
}
.modal.visible { display: flex; }

.modal-content {
    background: var(--card-bg); padding: 3rem; border-radius: 16px; width: 100%; max-width: 500px;
    border: 1px solid var(--border-color); text-align: center; position: relative;
}

.close-btn {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white;
    font-size: 1.5rem; cursor: pointer;
}

.pricing-card {
    background: var(--bg-dark); border: 2px solid var(--brand-color); border-radius: 12px;
    padding: 2rem; margin-top: 2rem;
}
.pricing-card h3 { margin: 0; color: var(--brand-color); }
.price { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
.price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }

.pricing-card ul { text-align: left; margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.95rem;}
.btn-checkout {
    width: 100%; background: #6366f1; color: white; padding: 14px; border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer;
}

/* --- BOLETIN PRO STYLES --- */
.bulletin-wrapper {
    background: white;
    color: #111;
    width: 100%;
    max-width: 210mm;
    min-height: 297mm;
    height: max-content;
    padding: 15mm;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: 'Merriweather', serif;
    position: relative;
    margin: 0 auto;
}

.bul-top-motto {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95; /* Teal color */
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 0;
}

.bul-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 2px solid #333;
    font-family: 'Outfit', sans-serif;
}

.bul-info-col {
    padding: 15px;
    font-size: 0.75rem;
    border-right: 1px solid #999;
}
.bul-info-col:last-child { border-right: none; text-align: center; }

.bul-date h4 {
    color: #6122d6; /* Purple */
    margin: 0 0 5px 0;
    font-size: 1rem;
    text-transform: uppercase;
}
.bul-date p { color: #d97706; font-weight: 600; margin: 0;}

.bul-title-main {
    font-size: 5.5rem;
    font-weight: 900;
    text-align: center;
    margin: 10px 0;
    letter-spacing: -3px;
    line-height: 1;
}

.bul-subtitle {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

.bul-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    height: 350px;
}

.bul-grid-box {
    background: #333;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}
.bul-grid-box.purple { background: #875c8a; color: white; font-family: 'Merriweather'; font-size: 1.1rem; line-height: 1.2; font-weight: 700;}
.bul-bg-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
}

.bul-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    padding-top: 20px;
}

.bul-clergy h3 {
    font-family: 'Style Script', 'Merriweather', cursive; /* Elegant Script fallback */
    font-size: 2.5rem;
    font-style: italic;
    margin: 0 0 10px 0;
}
.bul-clergy p {
    font-family: 'Merriweather'; font-size: 0.8rem; margin: 2px 0; font-weight: 700;
}
.bul-qr {
    width: 100px; height: 100px; background: #eee;
}

/* Gospel Page 2 */
.bul-page-2 {
    margin-top: 15mm;
    border-top: 2px dashed #ccc;
    padding-top: 15mm;
}
.bul-page-2 h2 { text-transform: uppercase; font-size: 1.2rem; color: #c90000; text-align: center; }

/* Premium Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
}
.modal.visible {
    display: flex;
}
.modal-content {
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}
.close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
}
.pricing-card {
    background: var(--card-bg);
    border: 1px solid var(--brand-color);
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
}
.pricing-card .price {
    font-size: 2.5rem;
    color: var(--brand-color);
    font-weight: 700;
    margin: 10px 0;
}
.pricing-card .price span {
    font-size: 1rem; color: var(--text-secondary);
}
.pricing-card ul {
    text-align: left;
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
}
.pricing-card ul li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.pricing-card ul li::before {
    content: '✓ ';
    color: var(--brand-color);
    font-weight: bold;
}
.btn-checkout {
    background: var(--brand-color);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
    font-size: 1rem;
}

/* --- EDITORIAL MISSAL STYLES --- */


.pdf-container h2, .pdf-container h3, .pdf-container hr {
    column-span: all;
}

/* Evitar que se partan los bloques feo pero si permitir partir parrafos para no dejar hojas vacias */
.missal-block {
    margin-bottom: 1.5rem;
}

.missal-super-heading {
    text-transform: uppercase;
    color: var(--brand-color);
    font-size: calc(var(--base-size) * 1.5); /* 18pt basado en raiz 12pt */
    font-weight: 700;
    text-align: center;
    margin: 0 0 1.5cm 0; /* Blueprint param */
    letter-spacing: 1.5px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-heading {
    text-transform: uppercase;
    color: var(--brand-color); /* Carmesi */
    font-size: calc(var(--base-size) * 1.35); /* 14.4pt */
    font-weight: 700; /* Super Bold */
    margin: 0 0 0.5cm 0;
    letter-spacing: 1px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-citation {
    margin: 0 0 12px 0;
    font-size: calc(var(--base-size) * 1.0);
    font-weight: normal;
}

/* Texto Ordinario (Lecturas/Salmos) */
.missal-paragraph, .proclamacion {
    margin: 0;
    margin-bottom: 0.5rem;
    text-align: justify;
    line-height: 1.2;
    font-size: 10.5pt;
    position: relative;
    orphans: 3;
    widows: 3;
}

.missal-paragraph:not(.first-par) {
    text-indent: 1.2em;
}

.punctuation-hang, .smart-punctuation, .puntuacion-inicial {
    float: left;
    font-size: 2em; 
    line-height: 0.8;
    padding-top: 5px;
    margin-right: 2px;
    color: var(--brand-color);
    font-family: 'EB Garamond', serif;
}

.drop-cap {
    float: left;
    font-size: 3.2em; /* Calculado aprox ~3 lineas completas a line-height 1.2 */
    line-height: 0.85;
    padding-top: 5px;
    padding-right: 6px;
    padding-left: 2px;
    font-family: 'Cinzel', 'EB Garamond', serif;
    color: var(--brand-color);
}

/* Voz del Celebrante */
.oracion-presidencial, 
.proclamacion.presidencial {
    line-height: 1.8 !important;
    font-size: 11.5pt !important;
    font-style: italic; /* Opcional: para mayor distinción */
    padding-left: 0;
}
#ritos_iniciales {
    page-break-before: avoid;
    break-before: avoid;
}
/* Columnas para diálogos (Grid) */
.bloque-dialogo.dialogo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

window.linkCanto = function(nombre) {
    let html = `<strong>${nombre}</strong>`;
    if (window.cantosDB && window.cantosDB[nombre]) {
        const letraFormat = window.cantosDB[nombre].letra.replace(/\n/g, '<br/>');
        html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;
    }
    return html;
};

window.obtenerCantosPorTiempo = function(tiempoStr, isEn) {
    if (isEn) {
        return {
            entrada: window.linkCanto('Here I Am Lord'),
            ofertorio: window.linkCanto('Saber que vendrás'),
            comunion: window.linkCanto('On Eagles Wings'),
            salida: window.linkCanto('Demos Gracias al Señor') 
        };
    }
    const t = tiempoStr ? tiempoStr.toLowerCase() : "";
    if (t.includes('cuaresma')) {
        return {
            entrada: window.linkCanto('Hacia ti morada santa'),
            ofertorio: window.linkCanto('Te ofrecemos Señor nuestra juventud'),
            comunion: window.linkCanto('Pequeñas aclaraciones'),
            salida: window.linkCanto('Silencio')
        };
    } else if (t.includes('pascua')) {

        };

    return {

        ofertorio: window.linkCanto('Saber que vendrás'),
        comunion: window.linkCanto('Pescador de Hombres'),
        salida: window.linkCanto('Demos Gracias al Señor')
    };
};

    <script>
    window.liturgiaDB = {"2026-04-13": {"fecha": "2026-04-13", "liturgia_palabra": {"primera_lectura": {"cita": "Del libro de los Hechos de los apóstoles Hechos 4, 23-31", "cita_formula": "Del libro de los Hechos de los apóstoles", "cita_versiculos": "Hechos 4, 23-31", "texto": "En aquellos días, tan pronto como Pedro y Juan quedaron en libertad, volvieron a donde estaban sus compañeros y les contaron lo que les habían dicho los sumos sacerdotes y los ancianos. Al oír esto, todos juntos clamaron a Dios, diciendo:\n \n \"Señor, tú has creado el cielo y la tierra, el mar y todo cuanto contiene; por medio del Espíritu Santo y por boca de tu siervo David, nuestro padre, dijiste: ¿Por qué se amotinan las naciones y los pueblos hacen planes torpes? Se sublevaron los reyes de la tierra y los príncipes se aliaron contra el Señor y contra su Mesías. \n Esto fue lo que sucedió, cuando en esta ciudad se aliaron Herodes y Poncio Pilato con los paganos y el pueblo de Israel, contra tu santo siervo Jesús, tu ungido, para que así se cumpliera lo que tu poder y tu providencia habían determinado que sucediera.\nY ahora, Señor, mira sus amenazas y concede a tus siervos anunciar tu palabra con toda valentía. Extiende tu mano para realizar curaciones, señales y prodigios en el nombre de tu santo siervo, Jesús\".\nAl terminar la oración tembló el lugar donde estaban reunidos, los llenó a todos el Espíritu Santo y comenzaron a anunciar la palabra de Dios con valentía.", "cita_en": "Acts 4:23-31", "texto_en": "After their release Peter and John went back to their own people\n\nand reported what the chief priests and elders had told them.\n\nAnd when they heard it,\n\nthey raised their voices to God with one accord\n\nand said, \"Sovereign Lord, maker of heaven and earth\n\nand the sea and all that is in them,\n\nyou said by the Holy Spirit\n\nthrough the mouth of our father David, your servant:\n\n\n\n\nWhy did the Gentiles rage\n\nand the peoples entertain folly?\n\nThe kings of the earth took their stand\n\nand the princes gathered together\n\nagainst the Lord and against his anointed.\n\n\n\nIndeed they gathered in this city\n\nagainst your holy servant Jesus whom you anointed,\n\nHerod and Pontius Pilate,\n\ntogether with the Gentiles and the peoples of Israel,\n\nto do what your hand and your will\n\nhad long ago planned to take place.\n\nAnd now, Lord, take note of their threats,\n\nand enable your servants to speak your word\n\nwith all boldness, as you stretch forth your hand to heal,\n\nand signs and wonders are done\n\nthrough the name of your holy servant Jesus.\"\n\nAs they prayed, the place where they were gathered shook,\n\nand they were all filled with the Holy Spirit\n\nand continued to speak the word of God with boldness."}, "salmo_responsorial": {"cita": "Salmo 2", "respuesta": "R.", "texto": "", "cita_en": "Psalm 2:1-3, 4-7a, 7b-9", "respuesta_en": "(see 11d)", "texto_en": "Blessed are all who take refuge in the Lord.\n\nor:\n\nR. \nAlleluia.\n\nWhy do the nations rage\n\nand the peoples utter folly?\n\nThe kings of the earth rise up,\n\nand the princes conspire together\n\nagainst the LORD and against his anointed:\n\n\"Let us break their fetters\n\nand cast their bonds from us!\"\n\nR. \nBlessed are all who take refuge in the Lord.\n\nor:\n\nR. \nAlleluia.\n\nHe who is throned in heaven laughs;\n\nthe LORD derides them.\n\nThen in anger he speaks to them;\n\nhe terrifies them in his wrath:\n\n\"I myself have set up my king\n\non Zion, my holy mountain.\"\n\nI will proclaim the decree of the LORD.\n\nR. \nBlessed are all who take refuge in the Lord.\n\nor:\n\nR. \nAlleluia.\n\nThe LORD said to me, \"You are my Son;\n\nthis day I have begotten you.\n\nAsk of me and I will give you\n\nthe nations for an inheritance\n\nand the ends of the earth for your possession.\n\nYou shall rule them with an iron rod;\n\nyou shall shatter them like an earthen dish.\"\n\nR. \nBlessed are all who take refuge in the Lord.\n\nor:\n\nR. \nAlleluia."}, "segunda_lectura": {"cita": "Lectura del libro de Juan Juan 3, 1-8", "cita_formula": "Lectura del libro de Juan", "cita_versiculos": "Juan 3, 1-8", "texto": "Había un fariseo llamado Nicodemo, hombre principal entre los judíos, que fue de noche a ver a Jesús y le dijo: \"Maestro, sabemos que has venido de parte de Dios, como maestro; porque nadie puede hacer las señales milagrosas que tú haces, si Dios no está con él\".\nJesús le contestó: \"Yo te aseguro que quien no renace de lo alto, no puede ver el Reino de Dios\". Nicodemo le pregunto: \"¿Cómo puede nacer un hombre siendo ya viejo? ¿Acaso puede, por segunda vez, entrar en el vientre de su madre y volver a nacer?\" \nLe respondió Jesús: \"Yo te aseguro que el que no nace del agua y del Espíritu, no puede entrar en el Reino de Dios. Lo que nace de la carne, es carne; lo que nace del Espíritu, es espíritu. No te extrañes de que te haya dicho: 'Tienen que renacer de lo alto'. El viento sopla donde quiere y oyes su ruido, pero no sabes de dónde viene ni a dónde va. Así pasa con quien ha nacido del Espíritu\"."}, "evangelio": {"cita": "Del santo Evangelio según San Juan Juan 3, 1-8", "cita_formula": "Del santo Evangelio según San Juan", "cita_versiculos": "Juan 3, 1-8", "texto": "Había un fariseo llamado Nicodemo, hombre principal entre los judíos, que fue de noche a ver a Jesús y le dijo: \"Maestro, sabemos que has venido de parte de Dios, como maestro; porque nadie puede hacer las señales milagrosas que tú haces, si Dios no está con él\".\nJesús le contestó: \"Yo te aseguro que quien no renace de lo alto, no puede ver el Reino de Dios\". Nicodemo le pregunto: \"¿Cómo puede nacer un hombre siendo ya viejo? ¿Acaso puede, por segunda vez, entrar en el vientre de su madre y volver a nacer?\" \nLe respondió Jesús: \"Yo te aseguro que el que no nace del agua y del Espíritu, no puede entrar en el Reino de Dios. Lo que nace de la carne, es carne; lo que nace del Espíritu, es espíritu. No te extrañes de que te haya dicho: 'Tienen que renacer de lo alto'. El viento sopla donde quiere y oyes su ruido, pero no sabes de dónde viene ni a dónde va. Así pasa con quien ha nacido del Espíritu\".", "cita_en": "John 3:1-8", "texto_en": "There was a Pharisee named Nicodemus, a ruler of the Jews.\n\nHe came to Jesus at night and said to him,\n\n\"Rabbi, we know that you are a teacher who has come from God,\n\nfor no one can do these signs that you are doing\n\nunless God is with him.\"\n\nJesus answered and said to him,\n\n\"Amen, amen, I say to you,\n\nunless one is born from above, he cannot see the Kingdom of God.\"\n\nNicodemus said to him,\n\n\"How can a man once grown old be born again?\n\nSurely he cannot reenter his mother's womb and be born again, can he?\"\n\nJesus answered,\n\n\"Amen, amen, I say to you,\n\nunless one is born of water and Spirit\n\nhe cannot enter the Kingdom of God.\n\nWhat is born of flesh is flesh\n\nand what is born of spirit is spirit.\n\nDo not be amazed that I told you,\n\n'You must be born from above.'\n\nThe wind blows where it wills,\n\nand you can hear the sound it makes,\n\nbut you do not know where it comes from or where it goes;\n\nso it is with everyone who is born of the Spirit.\""}}, "liturgia_eucaristica": {"oracion_ofrendas": "Recibe, Señor, las ofrendas sagradas que te presentamos, para que, purificados de nuestra antigua condición pecadora, seamos renovados al participar en los sacramentos de salvación. Por Jesucristo, nuestro Señor.", "antifona_comunion": "Jesús se acercó, tomó el pan y se lo dio a sus discípulos... Aleluya.", "oracion_despues_comunion": "Te rogamos, Padre misericordioso, que por la fuerza salvadora de este sacramento aumentes nuestra fe y nos fortalezcas en la caridad. Por Jesucristo, nuestro Señor."}, "laudes": {"salmo1": {"antifona": "Como busca la cierva corrientes de agua, así mi alma te busca a ti, Dios mío. Aleluya.", "texto": "Salmo 41\n\nDESEO DEL SEÑOR Y ANSIAS DE CONTEMPLAR EL TEMPLO\n\nComo busca la cierva\n\ncorrientes de agua,\n\nasí mi alma te busca\n\na ti, Dios mío;\n\ntiene sed de Dios,\n\ndel Dios vivo:\n\n¿cuándo entraré a ver\n\nel rostro de Dios?\n\nLas lágrimas son mi pan\n\nnoche y día,\n\nmientras todo el día me repiten:\n\n«¿Dónde está tu Dios?»\n\nRecuerdo otros tiempos,\n\ny mi alma desfallece de tristeza:\n\ncómo marchaba a la cabeza del grupo,\n\nhacia la casa de Dios,\n\nentre cantos de júbilo y alabanza,\n\nen el bullicio de la fiesta.\n\n¿Por qué te acongojas, alma mía,\n\npor qué te me turbas?\n\nEspera en Dios, que volverás a alabarlo:\n\n«Salud de mi rostro, Dios mío.»\n\nCuando mi alma se acongoja,\n\nte recuerdo,\n\ndesde el Jordán y el Hermón\n\ny el Monte Menor.\n\nUna sima grita a otra sima\n\ncon voz de cascadas:\n\ntus torrentes y tus olas\n\nme han arrollado.\n\nDe día el Señor\n\nme hará misericordia,\n\nde noche cantaré la alabanza\n\ndel Dios de mi vida.\n\nDiré a Dios: Roca mía,\n\n¿por qué me olvidas?\n\n¿Por qué voy andando sombrío,\n\nhostigado por mi enemigo?\n\nSe me rompen los huesos\n\npor las burlas del adversario;\n\ntodo el día me preguntan:\n\n«¿Dónde está tu Dios?»\n\n¿Por qué te acongojas, alma mía,\n\npor qué te me turbas?\n\nEspera en Dios, que volverás a alabarlo:\n\n«Salud de mi rostro, Dios mío.»\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nComo busca la cierva corrientes de agua, así mi alma te busca a ti, Dios mío. Aleluya."}, "cantico_at": {"antifona": "Llena, Señor, a Sión de tu majestad y al templo de tu gloria. Aleluya.", "texto": "Cántico\n\nSir 36, 1-7. 13-16\n\nSÚPLICA EN FAVOR DE LA CIUDAD SANTA DE JERUSALÉN\n\nSálvanos, Dios del universo,\n\ninfunde tu terror a todas las naciones;\n\namenaza con tu mano al pueblo extranjero,\n\npara que sienta tu poder.\n\nComo les mostraste tu santidad al castigarnos,\n\nmuéstranos así tu gloria castigándolos a ellos:\n\npara que sepan, como nosotros lo sabemos,\n\nque no hay Dios fuera de ti.\n\nRenueva los prodigios, repite los portentos,\n\nexalta tu mano, robustece tu brazo.\n\nReúne a todas las tribus de Jacob\n\ny dales su heredad como antiguamente.\n\nTen compasión del pueblo que lleva tu nombre,\n\nde Israel, a quien nombraste tu primogénito.\n\nTen compasión de tu ciudad santa,\n\nde Jerusalén, lugar de tu reposo.\n\nLlena a Sión de tu majestad\n\ny al templo de tu gloria.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nLlena, Señor, a Sión de tu majestad y al templo de tu gloria. Aleluya."}, "salmo2": {"antifona": "La gloria de Dios ilumina la ciudad santa y el Cordero es su sol. Aleluya.", "texto": "Salmo 18 A\n\nALABANZA A DIOS CREADOR DEL UNIVERSO\n\nEl cielo proclama la gloria de Dios,\n\nel firmamento pregona la obra de sus manos:\n\nel día al día le pasa el mensaje,\n\nla noche a la noche se lo murmura.\n\nSin que hablen, sin que pronuncien,\n\nsin que resuene su voz,\n\na toda la tierra alcanza su pregón\n\ny hasta los límites del orbe su lenguaje.\n\nAllí la ha puesto su tienda al sol:\n\nél sale como el esposo de su alcoba,\n\ncontento como un héroe, a recorrer su camino.\n\nAsoma por un extremo del cielo,\n\ny su órbita llega al otro extremo:\n\nnada se libra de su calor.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nLa gloria de Dios ilumina la ciudad santa y el Cordero es su sol. Aleluya."}, "lectura_breve": {"cita": "Juan 3, 1-8", "texto": "Había un fariseo llamado Nicodemo, hombre principal entre los judíos, que fue de noche a ver a Jesús y le dijo: \"Maestro, sabemos que has venido de parte de Dios, como maestro; porque nadie puede hacer las señales milagrosas que tú haces, si Dios no está con él\".\n\nJesús le contestó: \"Yo te aseguro que quien no renace de lo alto, no puede ver el Reino de Dios\". Nicodemo le pregunto: \"¿Cómo puede nacer un hombre siendo ya viejo? ¿Acaso puede, por segunda vez, entrar en el vientre de su madre y volver a nacer?\"\n\nLe respondió Jesús: \"Yo te aseguro que el que no nace del agua y del Espíritu, no puede entrar en el Reino de Dios. Lo que nace de la carne, es carne; lo que nace del Espíritu, es espíritu. No te extrañes de que te haya dicho: 'Tienen que renacer de lo alto'. El viento sopla donde quiere y oyes su ruido, pero no sabes de dónde viene ni a dónde va. Así pasa con quien ha nacido del Espíritu\"."}, "responsorio_breve": "V. El Señor ha resucitado del sepulcro. Aleluya, aleluya.\nR. El Señor ha resucitado del sepulcro. Aleluya, aleluya.\nV. El que por nosotros colgó del madero.\nR. Aleluya, aleluya.\nV. Gloria al Padre, y al Hijo, y al Espíritu Santo.\nR. El Señor ha resucitado del sepulcro. Aleluya, aleluya.", "cantico_evangelico": {"antifona": "Os digo con toda verdad: el que no nace de arriba no podrá entrar en el reino de Dios. Aleluya.", "texto": "Bendito sea el Señor, Dios de Israel,\n\nporque ha visitado y redimido a su pueblo,\n\nsuscitándonos una fuerza de salvación\n\nen la casa de David, su siervo,\n\nsegún lo había predicho desde antiguo\n\npor boca de sus santos profetas.\n\nEs la salvación que nos libra de nuestros enemigos\n\ny de la mano de todos los que nos odian;\n\nha realizado así la misericordia que tuvo con\n\nnuestros padres,\n\nrecordando su santa alianza\n\ny el juramento que juró a nuestro padre Abraham.\n\nPara concedernos que, libres de temor,\n\narrancados de la mano de los enemigos,\n\nle sirvamos con santidad y justicia,\n\nen su presencia, todos nuestros días.\n\nY a ti, niño, te llamarán profeta del Altísimo,\n\nporque irás delante del Señor\n\na preparar sus caminos,\n\nanunciando a su pueblo la salvación,\n\nel perdón de sus pecados.\n\nPor la entrañable misericordia de nuestro Dios,\n\nnos visitará el sol que nace de lo alto,\n\npara iluminar a los que viven en tiniebla\n\ny en sombra de muerte,\n\npara guiar nuestros pasos\n\npor el camino de la paz.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nOs digo con toda verdad: el que no nace de arriba no podrá entrar en el reino de Dios. Aleluya."}, "preces": "Oremos a Dios Padre todopoderoso, glorificado por la muerte y resurrección de Cristo, y digámosle confiados:\nR.\nIlumina, Señor, nuestras mentes.\nPadre, fuente de toda luz, que has querido iluminar el mundo con la gloria de Cristo resucitado,\nR.\nilumina, desde el principio de este día, nuestras almas con la luz de la fe.\nTú que por medio de tu Hijo, resucitado de entre los muertos, has abierto a los hombres las puertas de la salvación,\nR.\nhaz  que,  a  través  de  los  trabajos  de  este  día,  se  acreciente nuestra esperanza.\nTú  que  por  medio  de  tu  Hijo  resucitado  has  derramado  sobre  el mundo tu Espíritu Santo,\nR.\nenciende nuestros corazones con el fuego de este mismo Espíritu.\nTú que para librarnos entregaste a tu Hijo  la muerte,\nR.\nhaz que él sea hoy para nosotros salvación y redención.\nSe pueden añadir algunas intenciones libres\nTerminemos  nuestra oración con la plegaria que Cristo nos enseñó:\nPadre nuestro..."}, "visperas": {"salmo1": {"antifona": "Bendito el que viene en nombre del Señor. Aleluya.", "texto": "Salmo 44 I\n\nLAS NUPCIAS DEL REY\n\nMe brota del corazón un poema bello,\n\nrecito mis versos a un rey;\n\nmi lengua es ágil pluma de escribano.\n\nEres el más bello de los hombres,\n\nen tus labios se derrama la gracia,\n\nel Señor te bendice eternamente.\n\nCíñete al flanco la espada, valiente:\n\nes tu gala y tu orgullo;\n\ncabalga victorioso por la verdad y la justicia,\n\ntu diestra te enseñe a realizar proezas.\n\nTus flechas son agudas, los pueblos se te rinden,\n\nse acobardan los enemigos del rey.\n\nTu trono, ¡oh dios!, permanece para siempre;\n\ncetro de rectitud es tu cetro real;\n\nhas amado la justicia y odiado la impiedad:\n\npor eso el Señor, tu Dios, te ha ungido\n\ncon aceite de júbilo entre todos tus compañeros.\n\nA mirra, áloe y acacia huelen tus vestidos,\n\ndesde los palacios de marfiles te deleitan las arpas.\n\nHijas de reyes salen a tu encuentro,\n\nde pie a tu derecha está la reina\n\nenjoyada con oro de Ofir.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nBendito el que viene en nombre del Señor. Aleluya."}, "salmo2": {"antifona": "Dichosos los invitados a la cena del Señor. Aleluya.", "texto": "Salmo 44 II\n\nEscucha, hija, mira: inclina el oído,\n\nolvida tu pueblo y la casa paterna:\n\nprendado está el rey de tu belleza,\n\npóstrate ante él, que él es tu señor.\n\nLa ciudad de Tiro viene con regalos,\n\nlos pueblos más ricos buscan tu favor.\n\nYa entra la princesa, bellísima,\n\nvestida de perlas y brocado;\n\nla llevan ante el rey, con séquito de vírgenes,\n\nla siguen sus compañeras:\n\nlas traen entre alegría y algazara,\n\nvan entrando en el palacio real.\n\n«A cambio de tus padres tendrás hijos,\n\nque nombrarás príncipes por toda la tierra.»\n\nQuiero hacer memorable tu nombre\n\npor generaciones y generaciones,\n\ny los pueblos te alabarán\n\npor los siglos de los siglos.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nDichosos los invitados a la cena del Señor. Aleluya."}, "cantico_nt": {"antifona": "De su plenitud todos hemos recibido gracia tras gracia. Aleluya.", "texto": "Cántico\n\nEf 1, 3-10\n\nEL PLAN DIVINO DE LA SALVACIÓN\n\nBendito sea Dios,\n\nPadre de nuestro Señor Jesucristo,\n\nque nos ha bendecido en la persona de Cristo\n\ncon toda clase de bienes espirituales y celestiales.\n\nÉl nos eligió en la persona de Cristo,\n\nantes de crear el mundo,\n\npara que fuésemos consagrados\n\ne irreprochables ante él por el amor.\n\nÉl nos ha destinado en la persona de Cristo,\n\npor pura iniciativa suya,\n\na ser sus hijos,\n\npara que la gloria de su gracia,\n\nque tan generosamente nos ha concedido\n\nen su querido Hijo,\n\nredunde en alabanza suya.\n\nPor este Hijo, por su sangre,\n\nhemos recibido la redención,\n\nel perdón de los pecados.\n\nEl tesoro de su gracia, sabiduría y prudencia\n\nha sido un derroche para con nosotros,\n\ndándonos a conocer el misterio de su voluntad.\n\nÉste es el plan\n\nque había proyectado realizar por Cristo\n\ncuando llegase el momento culminante:\n\nhacer que todas las cosas\n\ntuviesen a Cristo por cabeza,\n\nlas del cielo y las de la tierra.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nDe su plenitud todos hemos recibido gracia tras gracia. Aleluya."}, "lectura_breve": {"cita": "Juan 3, 1-8", "texto": "Había un fariseo llamado Nicodemo, hombre principal entre los judíos, que fue de noche a ver a Jesús y le dijo: \"Maestro, sabemos que has venido de parte de Dios, como maestro; porque nadie puede hacer las señales milagrosas que tú haces, si Dios no está con él\".\n\nJesús le contestó: \"Yo te aseguro que quien no renace de lo alto, no puede ver el Reino de Dios\". Nicodemo le pregunto: \"¿Cómo puede nacer un hombre siendo ya viejo? ¿Acaso puede, por segunda vez, entrar en el vientre de su madre y volver a nacer?\"\n\nLe respondió Jesús: \"Yo te aseguro que el que no nace del agua y del Espíritu, no puede entrar en el Reino de Dios. Lo que nace de la carne, es carne; lo que nace del Espíritu, es espíritu. No te extrañes de que te haya dicho: 'Tienen que renacer de lo alto'. El viento sopla donde quiere y oyes su ruido, pero no sabes de dónde viene ni a dónde va. Así pasa con quien ha nacido del Espíritu\"."}, "responsorio_breve": "V. Los discípulos se llenaron de alegría. Aleluya, aleluya.\nR. Los discípulos se llenaron de alegría. Aleluya, aleluya.\nV. Al ver al Señor.\nR. Aleluya, aleluya.\nV. Gloria al Padre, y al Hijo, y al Espíritu Santo.\nR. Los discípulos se llenaron de alegría. Aleluya, aleluya.", "cantico_evangelico": {"antifona": "Lo que de la carne nace carne es, y lo que nace del Espíritu espíritu es. Aleluya.\nProclama mi alma la grandeza del Señor,\nse alegra mi espíritu en Dios mi salvador;\nporque ha mirado la humillación de su esclava.\nDesde ahora me felicitarán todas las generaciones,\nporque el Poderoso ha hecho obras grandes por mí:\nsu nombre es santo\ny su misericordia llega a sus fieles\nde generación en generación.\nÉl hace proezas con su brazo:\ndispersa a los soberbios de corazón,\nderriba del trono a los poderosos\ny enaltece a los humildes,\na los hambrientos los colma de bienes\ny a los ricos los despide vacíos.\nAuxilia a Israel, su siervo,\nacordándose de su misericordia\n—como lo había prometido a nuestros padres—\nen favor de Abraham y su descendencia por siempre.\nSe dice:\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\nSe puede repetir la antífona:\nLo que de la carne nace carne es, y lo que nace del Espíritu espíritu es. Aleluya.\nLlenos de gozo, oremos a Cristo, el Señor, que con su resurrección ha iluminado el mundo entero, y digámosle:\nR.\nCristo, vida nuestra, escúchanos.\nSeñor Jesús, que te hiciste compañero de camino de los discípulos que dudaban de ti,\nR.\nacompaña también a tu Iglesia peregrina entre las dificultades e incertidumbres de esta vida.\nNo permitas que tus fieles sean tardos y necios para creer,\nR.\ny aumenta su fe para que te proclamen vencedor de  la muerte.\nMira, Señor, con bondad a cuantos no te reconocieron en su camino,\nR.\ny manifiéstate a ellos para que te confiesen como salvador suyo.\nTú q     <script>
// ANTIGRAVITY - CEREBRO LITÚRGICO UNIFICADO (NODOS)

function generarDocumentoNodosLegacy(data, hora, options = {}) {
    if (!data) return '';
    let isEn = options.isEn === true;
    let showMoniciones = options.showMoniciones !== false;
    let showHomilia = options.showHomilia !== false;

    let SECUENCIA_LITURGICA = [];
    
    // VARIABLES
    const fechaElegida = document.getElementById('date-select') ? document.getElementById('date-select').value : null;
    const calDay = (fechaElegida && window.calendarioDB) ? window.calendarioDB[fechaElegida] : null;

    const DIA_TRIDUO = calDay ? (calDay.dia_triduo || null) : null;

    }

    const isAdviento = upperTiempo.includes("ADVIENTO");
    const ES_PASCUA_PENTECOSTES = upperTiempo.includes("PASCUA") || upperTiempo.includes("PENTECOSTÉS");
    const ES_OCTAVA_PASCUA = upperTiempo.includes("PASCUA") && calDay && calDay.titulo && calDay.titulo.toLowerCase().includes("octava");

    // COMPUERTA DE ABORTO
    if (DIA_TRIDUO) {
        if (DIA_TRIDUO === "Jueves_Santo" && OFICIO === "Visperas") {
            return RENDERIZAR_BLOQUE(new BloqueLiturgico('abort').addSuperTitulo("Misa de la Cena del Señor.").addRubrica("Unión con Vísperas = Bloqueado."));
        }
        if (DIA_TRIDUO === "Viernes_Santo") {
            return RENDERIZAR_BLOQUE(new BloqueLiturgico('abort').addSuperTitulo("Viernes Santo.").addRubrica("Prohibido celebrar Misa. Solo liturgia de la Pasión."));
        }
        if (DIA_TRIDUO === "Sabado_Santo") {
            return RENDERIZAR_BLOQUE(new BloqueLiturgico('abort').addSuperTitulo("Sábado Santo.").addRubrica("Prohibido celebrar Misa diurna. Esperar a Vigilia Pascual."));
        }
    }

    // BANDERAS LOGICAS
    let Flag_Gloria = (GRADO.includes("solemnidad") || GRADO.includes("fiesta") || (GRADO.includes("domingo") && !isAdviento && !isCuaresma));
    if (data.gloria !== undefined) Flag_Gloria = data.gloria; 
    let Flag_Credo = (GRADO.includes("domingo") || GRADO.includes("solemnidad"));

    let Flag_DobleAleluya_Despedida = (ES_PASCUA_PENTECOSTES || ES_OCTAVA_PASCUA);

    const cantos = window.obtenerCantosPorTiempo ? window.obtenerCantosPorTiempo(TIEMPO_LIT, isEn) : { entrada: "", ofertorio: "", comunion: "", salida: "" };

    // BLOQUE A: RITOS INICIALES
    let bInicial = new BloqueLiturgico("ritos_iniciales");

    if (showMoniciones) {
        bInicial.addTitulo(isEn ? "Entrance Monition" : "Monición de Entrada");
        if (data.monicion_entrada) {
            bInicial.addMonicion(data.monicion_entrada);
        } else {
            bInicial.addMonicion(isEn ? "A brief introduction to the day's liturgy." : "Breve introducción a la liturgia del día.");

    }

    bInicial.addSuperTitulo(isEn ? "INTRODUCTORY RITES" : "RITOS INICIALES");
    
    bInicial.addTitulo(isEn ? "Entrance Chant" : "Canto de Entrada");
    bInicial.addRubrica(cantos.entrada);

    let antEnt = data.antifona_entrada || (isEn ? "Entrance Antiphon details..." : "Antífona según calendario...");

    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let officeData = data[hora];
        // OGLH 94: La salmodia incluye salmos y el cantico del testamento respectivo
        let salmosNombres = OFICIO === "Laudes" ? ["salmo1", "cantico_at", "salmo2"] : ["salmo1", "salmo2", "cantico_nt"];

        if (officeData && officeData[salmosNombres[0]]) {
            bInicial.addSuperTitulo(isEn ? ("INTEGRATED PSALMODY (" + OFICIO + ")") : ("SALMODIA INTEGRADA (" + OFICIO.toUpperCase() + ")"));

                    let lines = s.texto.split("\n\n");

                        if (idx % 2 === 0) bInicial.addSacerdote(line, 'Normal');
                        else bInicial.addAsamblea(line);
                    });
                    
                    bInicial.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
                    bInicial.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                }
            });
        } else {
            bInicial.addRubrica("[Error: No se encontró la salmodia del Oficio para " + OFICIO + "]");

            bInicial.addTitulo(isEn ? "Rite of Blessing and Sprinkling Holy Water" : "Rito de Aspersión (Agua Bendita)");
            bInicial.addMonicion(isEn ? "The penitential act is omitted. The priest blesses the water and sprinkles the faithful." : "Se omite el Acto Penitencial rutinario. El Sacerdote bendice el agua y la rocía sobre el pueblo como memorial del bautismo.");
            bInicial.addSacerdote(isEn ? "Dear brethren (brothers and sisters), let us humbly beseech the Lord our God to bless this water he has created..." : "Hermanos: invoquemos a Dios, nuestro Señor, para que se digne bendecir este agua creada por Él, que va a ser rociada sobre nosotros como recuerdo de nuestro bautismo...");
            bInicial.addAsamblea("Amén.");
            bInicial.addRubrica(isEn ? "The priest sprinkles the congregation while an appropriate chant is sung." : "El sacerdote recorre la nave aspergando a la asamblea mientras se canta un canto bautismal (Ej. 'Vi el agua salir').");
            bInicial.addSacerdote(isEn ? "May almighty God cleanse us of our sins, and through the celebration of this Eucharist make us worthy to share at the table of his Kingdom." : "Que Dios todopoderoso nos purifique de nuestros pecados y, por la celebración de esta Eucaristía, nos haga dignos de participar de la mesa de su reino.");
            bInicial.addAsamblea("Amén.");
        } else {
            bInicial.addTitulo(isEn ? "Penitential Act" : "Rito Penitencial");
            bInicial.addSacerdote(isEn ? "Brethren (brothers and sisters), let us acknowledge our sins..." : "Hermanos: reconozcamos nuestros pecados para celebrar dignamente estos sagrados misterios.");
            bInicial.addAsamblea(data.rito_penitencial || "Yo confieso ante Dios todopoderoso...");
            bInicial.addSacerdote(isEn ? "May almighty God have mercy on us..." : "Dios todopoderoso tenga misericordia de nosotros, perdone nuestros pecados y nos lleve a la vida eterna.");
            bInicial.addAsamblea("Amén.");
            bInicial.addDialogo(isEn ? "Lord, have mercy." : "Señor, ten piedad.", isEn ? "Lord, have mercy." : "Señor, ten piedad.");
            bInicial.addDialogo(isEn ? "Christ, have mercy." : "Cristo, ten piedad.", isEn ? "Christ, have mercy." : "Cristo, ten piedad.");
            bInicial.addDialogo(isEn ? "Lord, have mercy." : "Señor, ten piedad.", isEn ? "Lord, have mercy." : "Señor, ten piedad.");
        }
    }

    SECUENCIA_LITURGICA.push(bInicial);

    let bGloriaColecta = new BloqueLiturgico("gloria");
    bGloriaColecta.addTitulo("Gloria");
    if (Flag_Gloria) {
        bGloriaColecta.addAsamblea(isEn ? "Glory to God in the highest..." : "Gloria a Dios en el cielo, y en la tierra paz a los hombres que ama el Señor. Por tu inmensa gloria te alabamos, te bendecimos, te adoramos, te glorificamos, te damos gracias, Señor Dios, Rey celestial, Dios Padre todopoderoso. Señor, Hijo único, Jesucristo. Señor Dios, Cordero de Dios, Hijo del Padre; tú que quitas el pecado del mundo, ten piedad de nosotros; tú que quitas el pecado del mundo, atiende nuestra súplica; tú que estás sentado a la derecha del Padre, ten piedad de nosotros; porque sólo tú eres Santo, sólo tú Señor, sólo tú Altísimo, Jesucristo, con el Espíritu Santo en la gloria de Dios Padre. Amén.");
    } else {
        bGloriaColecta.addRubrica(isEn ? "[The Gloria is omitted today]" : "[Hoy se omite el Gloria]");
    }
    
    bGloriaColecta.addTitulo(isEn ? "Collect" : "Oración Colecta");
    bGloriaColecta.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + (data.oracion_colecta || "Dios todopoderoso y eterno..."));
    bGloriaColecta.addAsamblea("Amén.");
    SECUENCIA_LITURGICA.push(bGloriaColecta);

    // BLOQUE B: LITURGIA DE LA PALABRA
    let bPalabra = new BloqueLiturgico("liturgia_palabra");
    bPalabra.addSuperTitulo(isEn ? "LITURGY OF THE WORD" : "LITURGIA DE LA PALABRA");
    
    if (showMoniciones) {
        bPalabra.addTitulo(isEn ? "Monition" : "Monición a las Lecturas");
        if (data.monicion_lecturas) {
            bPalabra.addMonicion(data.monicion_lecturas);
        } else {
            bPalabra.addMonicion(isEn ? "Introduction to the Liturgy of the Word." : "Introducción a la Liturgia de la Palabra.");
        }
    }

    let lp = data.liturgia_palabra || {};
    let r1 = lp.primera_lectura || { cita: "Primera Lectura", texto: "[No disponible]" };
    bPalabra.addTitulo(isEn ? "First Reading" : "Primera Lectura");
    bPalabra.addRubrica(r1.cita);
    bPalabra.addSacerdote(r1.texto);
    bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");

    let sr = lp.salmo_responsorial || { cita: "Salmo", respuesta: "R.", texto: "..." };
    bPalabra.addTitulo(isEn ? "Responsorial Psalm" : "Salmo Responsorial");
    bPalabra.addRubrica(sr.cita);
    bPalabra.addAsamblea("R. " + sr.respuesta);
    bPalabra.addSacerdote(sr.texto);

    if (lp.segunda_lectura) {

    if (lp.secuencia) {

        bPalabra.addSacerdote(lp.secuencia);
    }

    bPalabra.addTitulo(isEn ? "Gospel Acclamation" : "Aclamación antes del Evangelio");
    if (Flag_Aleluya) {
        bPalabra.addAsamblea(lp.aclamacion_evangelio || "Aleluya, aleluya.");
    } else {
        let aclv = lp.aclamacion_evangelio || "Honor y gloria a ti, Señor Jesús.";
        bPalabra.addAsamblea(aclv.replace(/Aleluya/ig, "Honor y gloria a ti, Señor Jesús"));
    }

    let ev = lp.evangelio || { cita: "Evangelio", texto: "[Evangelio no disponible]" };
    bPalabra.addTitulo(isEn ? "Gospel" : "Evangelio");
    bPalabra.addRubrica("<span class=\"cross-mark\">☩</span> " + ev.cita);
    bPalabra.addSacerdote(ev.texto);
    bPalabra.addDialogo(isEn ? "The Gospel of the Lord." : "Palabra del Señor.", isEn ? "Praise to you, Lord Jesus Christ." : "Gloria a ti, Señor Jesús.");
    
    bPalabra.addTitulo(isEn ? "Homily" : "Homilía");
    if (showHomilia) {
        bPalabra.addGuia(data.guia_reflexion || (isEn ? "[Homily Reflection Guide]" : "[Guía de Reflexión Sacerdotal]"));
    } else {
        bPalabra.addRubrica(isEn ? "The priest or deacon delivers the homily." : "El sacerdote o diácono pronuncia la homilía.");
    }
    SECUENCIA_LITURGICA.push(bPalabra);

    if (Flag_Credo) {
        let bCredo = new BloqueLiturgico("credo");
        bCredo.addTitulo(isEn ? "Profession of Faith" : "Profesión de Fe");
        bCredo.addAsamblea(isEn ? "I believe in God, the Father almighty..." : "Creo en Dios, Padre todopoderoso, Creador del cielo y de la tierra. Creo en Jesucristo, su único Hijo, nuestro Señor, que fue concebido por obra y gracia del Espíritu Santo, nació de santa María Virgen, padeció bajo el poder de Poncio Pilato, fue crucificado, muerto y sepultado, descendió a los infiernos, al tercer día resucitó de entre los muertos, subió a los cielos y está sentado a la derecha de Dios, Padre todopoderoso. Desde allí ha de venir a juzgar a vivos y muertos. Creo en el Espíritu Santo, la santa Iglesia católica, la comunión de los santos, el perdón de los pecados, la resurrección de la carne y la vida eterna. Amén.");
        SECUENCIA_LITURGICA.push(bCredo);
    }

    
    let bPreces = new BloqueLiturgico("preces");
    
    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let title = (OFICIO === "Laudes") ? "CÁNTICO EVANGÉLICO (Benedictus)" : "CÁNTICO EVANGÉLICO (Magnificat)";
        let officeData = data[hora];
        if (officeData && officeData.cantico_evangelico) {
            let ce = officeData.cantico_evangelico;
            bPreces.addTitulo(title);
            bPreces.addRubrica("Antífona: " + ce.antifona);
            
            if (ce.texto) {
                let lines = [];
                if (Array.isArray(ce.texto)) {
                    lines = ce.texto;
                } else if (typeof ce.texto === 'string') {
                    lines = ce.texto.split(/\n+/).filter(l => l.trim().length > 1);
                }
                
                lines.forEach((line, idx) => {
                    if (idx % 2 === 0) bPreces.addSacerdote(line, 'Normal');
                    else bPreces.addAsamblea(line);
                });
            }
            
            bPreces.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
            bPreces.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
            bPreces.addRubrica("Antífona: " + ce.antifona);
        }
    }

    bPreces.addTitulo(isEn ? "Universal Prayer" : "Oración de los Fieles");
    
    let precesText = "[Oración de los Fieles Omitida / No Definida]";
    if ((OFICIO === "Laudes" || OFICIO === "Visperas") && data[hora] && data[hora].preces) {

        bPreces.addRubrica(isEn ? "Intercessions from the Divine Office." : "Preces propias del Oficio Divino.");
    } else if (Flag_Oracion_Pueblo) {
        precesText = data.liturgia_palabra ? data.liturgia_palabra.preces : "P. Fieles extraídas del tiempo...";
