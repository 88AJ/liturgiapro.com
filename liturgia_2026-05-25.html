<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Liturgia PRO Standalone - 2026-05-25</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
:root {
    --base-size: 15px;

    --bg-dark: #09090b; /* Deep zinc-950 */
    --bg-gradient: radial-gradient(circle at top left, #18181b 0%, #09090b 100%);
    --card-bg: rgba(24, 24, 27, 0.6); /* Translucent zinc-900 */
    --text-primary: #e4e4e7; /* zinc-200 */
    --text-secondary: #a1a1aa; /* zinc-400 */
    --brand-color: #D32F2F; /* Liturgical Crimson */
    --brand-hover: #dc2626; /* Bright red */
    --border-color: rgba(255, 255, 255, 0.08); /* Frosted glass border */
    --sidebar-bg: rgba(9, 9, 11, 0.7); /* Translucent sidebar */
    --gold-accent: #d4af37; /* Clean Gold */
    --gold-hover: #fcd34d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    overflow: hidden;
}

/* Scrollbars sleek */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

.view {
    display: none;
    height: 100vh;
    width: 100vw;
}

.view.active {
    display: flex;
}

/* Landing Page */
#landing-screen {
    position: relative;
    justify-content: center;
    align-items: center;
}

.landing-content {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    padding: 3rem;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    text-align: center;
    max-width: 500px;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
}
.logo span, .logo-small span {
    color: var(--brand-color);
}
.logo { color: #ffffff; font-family: 'Cinzel', serif; }

.landing-content h1 {
    font-size: 2.2rem;
    margin: 0 0 1rem 0;
}

.landing-content p {
    color: var(--text-secondary);
    margin-bottom: 2rem;
    line-height: 1.5;
}

.login-box {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.login-box h3 { margin: 0; font-size: 1.1rem; }
.login-box input {
    padding: 14px;
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    color: white;
    border-radius: 8px;
    font-family: 'Outfit';
}
.login-box input:focus { outline: none; border-color: var(--brand-color); }

.btn-primary {
    background: var(--gold-accent);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.btn-primary:hover { background: #E5C158; }

.signup-link { font-size: 0.9rem; margin-top: 1rem; }
.signup-link a { color: var(--brand-color); text-decoration: none; }

.landing-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    z-index: 1;
}

/* Dashboard */
.saas-sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    z-index: 10;
}

.logo-small {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 3rem;
    color: #ffffff;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
}

.nav-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: #71717a;
    letter-spacing: 0.15em;
    padding: 0 16px;
    margin-bottom: 0.8rem;
    font-family: 'Outfit', sans-serif;
    text-transform: uppercase;
}

.nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.nav-links li {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
}
.nav-links li:hover:not(.active) { 
    background: rgba(255, 255, 255, 0.05); 
    color: #fff;
    transform: translateX(4px);
}
.nav-links li.active { 
    background: linear-gradient(90deg, rgba(178, 0, 0, 0.15) 0%, rgba(178, 0, 0, 0) 100%);
    color: #fff; 
    font-weight: 500; 
    border-left: 3px solid var(--brand-color); 
    box-shadow: inset 2px 0 0px var(--brand-color);
}

/* Capitular Icons */
.icon {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--brand-color);
    font-size: 1.2rem;
    width: 20px;
    text-align: center;
}

.badge {
    background: var(--brand-color);
    color: #000;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 700;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}
.avatar {
    width: 40px; height: 40px;
    background: var(--card-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
}
.user-info strong { display: block; font-size: 0.95rem; }
.user-info span { color: var(--text-secondary); font-size: 0.8rem; }

.btn-upgrade {
    background: transparent;
    border: 1px solid var(--brand-color);
    color: var(--brand-color);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}
.btn-upgrade:hover { background: rgba(245, 158, 11, 0.1); }

/* Main Hub */
.saas-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: transparent; /* lets body gradient show through */
}

.saas-header {
    height: 80px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(9, 9, 11, 0.4);
    backdrop-filter: blur(10px);
    z-index: 5;
}
.saas-header h2 { margin: 0; font-weight: 500; font-size: 1.3rem; font-family: 'Outfit', sans-serif;}

.btn-outline {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif;
}
.btn-outline:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.config-panel {
    width: 380px;
    border-right: 1px solid var(--border-color);
    padding: 2rem;
    overflow-y: auto;
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
}

.config-panel h3 { margin: 0 0 0.5rem 0; font-weight: 600; font-size: 1.25rem; font-family: 'Outfit', sans-serif; color: #fff; }
.subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
.subtitle a { color: var(--gold-accent); text-decoration: none; font-weight: 500; }

.form-grid { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;}

.input-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.input-group select, .input-group input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    color: #fff;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
}
.input-group select:focus, .input-group input:focus {
    border-color: var(--gold-accent);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    background: rgba(0, 0, 0, 0.4);
}

.cantos-section h4 { margin: 0; font-weight: 500;}
.canto-item { margin-bottom: 1rem; border: 1px solid var(--border-color); }
.canto-item input {
    width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'Outfit', sans-serif; margin-bottom: 8px;
}
.canto-item input:focus { border-color: var(--gold-accent); }

.btn-generate {
    width: 100%; 
    background: linear-gradient(135deg, var(--brand-color), #8B0000); 
    color: #fff; 
    font-weight: 600;
    padding: 14px; 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 8px; 
    cursor: pointer; 
    margin-top: 1rem; 
    transition: all 0.3s ease;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 4px 15px rgba(178, 0, 0, 0.3);
}
.btn-generate:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(178, 0, 0, 0.5);
    background: linear-gradient(135deg, #cc0000, #a00000);
}

.preview-panel {
    flex: 1;
    background: transparent;
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.pdf-container {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.4;
    color: #111;
    background: #fff;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
    text-align: justify;
    /* NLM Master Printer Rules */
    column-count: 2;
    column-gap: 8mm;
    column-fill: balance;
    column-rule: 1px solid rgba(153, 0, 0, 0.1); 
    hyphens: auto;
}

/* Configuración de Página para Impresión Doble Cara */
@page {
    size: 8.5in 11in;
    margin-top: 20mm;
    margin-bottom: 20mm;
    bleed: 3mm;
    marks: crop;
}

@page :left {
    margin-left: 22mm; /* Lomo */
    margin-right: 15mm;
}

@page :right {
    margin-left: 15mm;
    margin-right: 22mm; /* Lomo */
}



.empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    text-align: center;
    font-family: 'Cinzel', serif;
    opacity: 0.6;
}

/* --- SUBSIDIO LITÚRGICO STYLES --- */
.pdf-container strong.rubric, .pdf-container .rubrica-sacerdote, .missal-rubric {
    color: var(--brand-color); /* Liturgical red */
    font-style: italic;
    font-weight: normal;
    display: block;
    margin: 4px 0;
    font-size: 0.85em; /* 2pt menor que el texto principal */
}

.pdf-container h2, .pdf-container h3, .pdf-container .titulo-rito, .missal-super-heading, .missal-heading {
    color: var(--brand-color);
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    text-transform: uppercase;
    column-span: all; /* Detiene las columnas para anclar la sección */
    break-after: avoid; /* Previene títulos huerfanos al final de página */
    page-break-after: avoid;
}

.pdf-container .titulo-rito {
    border-bottom: 1px solid var(--brand-color);
    padding-bottom: 8px;
    margin-bottom: 15px;
}

.pdf-container .monicion {
    text-align: justify;
    font-size: 0.95em;
    margin-top: 15px;
    margin-bottom: 15px;
}

.pdf-container .monicion strong {
    font-family: 'Outfit', sans-serif;
    color: #333;
    font-size: 1.1em;
}

.pdf-container .oracion-capitular::first-letter {
    font-family: 'Cinzel', serif;
    font-size: 2.5em;
    float: left;
    line-height: 0.8;
    margin-right: 5px;
    color: var(--brand-color);
}

.pdf-container .asamblea {
    font-weight: bold;
    display: block;
    margin-top: 5px;
    margin-bottom: 10px;
}

.pdf-container .asamblea-rojo {
    color: var(--brand-color);
    font-weight: bold;

.pdf-container blockquote {
    font-style: italic; color: #444; border-left: 3px solid #c90000; padding-left: 15px; margin-left: 20px;
}

/* Modals */
.modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center;
}
.modal.visible { display: flex; }

.modal-content {
    background: var(--card-bg); padding: 3rem; border-radius: 16px; width: 100%; max-width: 500px;
    border: 1px solid var(--border-color); text-align: center; position: relative;
}

.close-btn {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white;
    font-size: 1.5rem; cursor: pointer;
}

.pricing-card {
    background: var(--bg-dark); border: 2px solid var(--brand-color); border-radius: 12px;
    padding: 2rem; margin-top: 2rem;
}
.pricing-card h3 { margin: 0; color: var(--brand-color); }
.price { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
.price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }

.pricing-card ul { text-align: left; margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.95rem;}
.btn-checkout {
    width: 100%; background: #6366f1; color: white; padding: 14px; border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer;
}

/* --- BOLETIN PRO STYLES --- */
.bulletin-wrapper {
    background: white;
    color: #111;
    width: 100%;
    max-width: 210mm;
    min-height: 297mm;
    height: max-content;
    padding: 15mm;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: 'Merriweather', serif;
    position: relative;
    margin: 0 auto;
}

.bul-top-motto {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95; /* Teal color */
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 0;
}

.bul-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 2px solid #333;
    font-family: 'Outfit', sans-serif;
}

.bul-info-col {
    padding: 15px;
    font-size: 0.75rem;
    border-right: 1px solid #999;
}
.bul-info-col:last-child { border-right: none; text-align: center; }

.bul-date h4 {
    color: #6122d6; /* Purple */
    margin: 0 0 5px 0;
    font-size: 1rem;
    text-transform: uppercase;
}
.bul-date p { color: #d97706; font-weight: 600; margin: 0;}

.bul-title-main {
    font-size: 5.5rem;
    font-weight: 900;
    text-align: center;
    margin: 10px 0;
    letter-spacing: -3px;
    line-height: 1;
}

.bul-subtitle {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

.bul-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    height: 350px;
}

.bul-grid-box {
    background: #333;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}
.bul-grid-box.purple { background: #875c8a; color: white; font-family: 'Merriweather'; font-size: 1.1rem; line-height: 1.2; font-weight: 700;}
.bul-bg-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
}

.bul-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    padding-top: 20px;
}

.bul-clergy h3 {
    font-family: 'Style Script', 'Merriweather', cursive; /* Elegant Script fallback */
    font-size: 2.5rem;
    font-style: italic;
    margin: 0 0 10px 0;
}
.bul-clergy p {
    font-family: 'Merriweather'; font-size: 0.8rem; margin: 2px 0; font-weight: 700;
}
.bul-qr {
    width: 100px; height: 100px; background: #eee;
}

/* Gospel Page 2 */
.bul-page-2 {
    margin-top: 15mm;
    border-top: 2px dashed #ccc;
    padding-top: 15mm;
}
.bul-page-2 h2 { text-transform: uppercase; font-size: 1.2rem; color: #c90000; text-align: center; }

/* Premium Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
}
.modal.visible {
    display: flex;
}
.modal-content {
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}
.close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
}
.pricing-card {
    background: var(--card-bg);
    border: 1px solid var(--brand-color);
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
}
.pricing-card .price {
    font-size: 2.5rem;
    color: var(--brand-color);
    font-weight: 700;
    margin: 10px 0;
}
.pricing-card .price span {
    font-size: 1rem; color: var(--text-secondary);
}
.pricing-card ul {
    text-align: left;
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
}
.pricing-card ul li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.pricing-card ul li::before {
    content: '✓ ';
    color: var(--brand-color);
    font-weight: bold;
}
.btn-checkout {
    background: var(--brand-color);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
    font-size: 1rem;
}

/* --- EDITORIAL MISSAL STYLES --- */


.pdf-container h2, .pdf-container h3, .pdf-container hr {
    column-span: all;
}

/* Evitar que se partan los bloques feo pero si permitir partir parrafos para no dejar hojas vacias */
.missal-block {
    margin-bottom: 1.5rem;
}

.missal-super-heading {
    text-transform: uppercase;
    color: var(--brand-color);
    font-size: calc(var(--base-size) * 1.5); /* 18pt basado en raiz 12pt */
    font-weight: 700;
    text-align: center;
    margin: 0 0 1.5cm 0; /* Blueprint param */
    letter-spacing: 1.5px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-heading {
    text-transform: uppercase;
    color: var(--brand-color); /* Carmesi */
    font-size: calc(var(--base-size) * 1.35); /* 14.4pt */
    font-weight: 700; /* Super Bold */
    margin: 0 0 0.5cm 0;
    letter-spacing: 1px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-citation {
    margin: 0 0 12px 0;
    font-size: calc(var(--base-size) * 1.0);
    font-weight: normal;
}

/* Texto Ordinario (Lecturas/Salmos) */
.missal-paragraph, .proclamacion {
    margin: 0;
    margin-bottom: 0.5rem;
    text-align: justify;
    line-height: 1.2;
    font-size: 10.5pt;
    position: relative;
    orphans: 3;
    widows: 3;
}

.missal-paragraph:not(.first-par) {
    text-indent: 1.2em;
}

.punctuation-hang, .smart-punctuation, .puntuacion-inicial {
    float: left;
    font-size: 2em; 
    line-height: 0.8;
    padding-top: 5px;
    margin-right: 2px;
    color: var(--brand-color);
    font-family: 'EB Garamond', serif;
}

.drop-cap {
    float: left;
    font-size: 3.2em; /* Calculado aprox ~3 lineas completas a line-height 1.2 */
    line-height: 0.85;
    padding-top: 5px;
    padding-right: 6px;
    padding-left: 2px;
    font-family: 'Cinzel', 'EB Garamond', serif;
    color: var(--brand-color);
}

/* Voz del Celebrante */
.oracion-presidencial, 
.proclamacion.presidencial {
    line-height: 1.8 !important;
    font-size: 11.5pt !important;
    font-style: italic; /* Opcional: para mayor distinción */
    padding-left: 0;
}
#ritos_iniciales {
    page-break-before: avoid;
    break-before: avoid;
}
/* Columnas para diálogos (Grid) */
.bloque-dialogo.dialogo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

window.linkCanto = function(nombre) {
    let html = `<strong>${nombre}</strong>`;
    if (window.cantosDB && window.cantosDB[nombre]) {
        const letraFormat = window.cantosDB[nombre].letra.replace(/\n/g, '<br/>');
        html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;
    }
    return html;
};

window.obtenerCantosPorTiempo = function(tiempoStr, isEn) {
    if (isEn) {
        return {
            entrada: window.linkCanto('Here I Am Lord'),
            ofertorio: window.linkCanto('Saber que vendrás'),
            comunion: window.linkCanto('On Eagles Wings'),
            salida: window.linkCanto('Demos Gracias al Señor') 
        };
    }
    const t = tiempoStr ? tiempoStr.toLowerCase() : "";
    if (t.includes('cuaresma')) {
        return {
            entrada: window.linkCanto('Hacia ti morada santa'),
            ofertorio: window.linkCanto('Te ofrecemos Señor nuestra juventud'),
            comunion: window.linkCanto('Pequeñas aclaraciones'),
            salida: window.linkCanto('Silencio')
        };
    } else if (t.includes('pascua')) {

        };

    return {

        ofertorio: window.linkCanto('Saber que vendrás'),
        comunion: window.linkCanto('Pescador de Hombres'),
        salida: window.linkCanto('Demos Gracias al Señor')
    };
};

    <script>
    window.liturgiaDB = {"2026-05-25": {"fecha": "2026-05-25", "liturgia_palabra": {"primera_lectura": {"cita": "Del libro de los Hechos de los apóstoles Hechos 1, 12-14", "cita_formula": "Del libro de los Hechos de los apóstoles", "cita_versiculos": "Hechos 1, 12-14", "texto": "Después de la ascensión de Jesús a los cielos, los apóstoles regresaron a Jerusalén desde el monte de los Olivos, que dista de la ciudad lo que se permite caminar en sábado. \nCuando llgaron a la ciudad, subieron al piso alto de la casa donde se alojaban, Pedro y Juan, Santiago y Andrés, Felipe y Tomás, Bartolomé y Mateo, Santiago (el hijo del Alfeo), Simón el cananeo y Judas, el hijo de Santiago. \nTodos ellos perseveraban unánimes en la oración, junto\n\ncon María, la madre de Jesús, con los parientes de Jesús y algunas mujeres.", "cita_en": "Genesis 3:9-15, 20", "texto_en": "After Adam had eaten of the tree,\n            the LORD God called to him and asked him, “Where are you?”\nHe answered, “I heard you in the garden;\n            but I was afraid, because I was naked,\n            so I hid myself.”\nThen he asked, “Who told you that you were naked?\nYou have eaten, then,\n            from the tree of which I had forbidden you to eat!”\nThe man replied, “The woman whom you put here with me—\n            she gave me fruit from the tree, and so I ate it.”\nThe LORD God then asked the woman,\n            “Why did you do such a thing?”\nThe woman answered, “The serpent tricked me into it, so I ate it.”\nThen the LORD God said to the serpent:\n            “Because you have done this, you shall be banned\n                        from all the animals\n                        and from all the wild creatures;\n            On your belly shall you crawl,\n                        and dirt shall you eat\n                        all the days of your life.\n            I will put enmity between you and the woman,\n                        and between your offspring and hers;\n            He will strike at your head,\n                        while you strike at his heel.”\nThe man called his wife Eve,\n            because she became the mother of all the living.\nOR:\nActs 1:12-14\nAfter Jesus had been taken up to heaven,\n            the Apostles \nreturned to Jerusalem\n            from the mount called Olivet, which is near Jerusalem,\n            a sabbath day’s journey away.\nWhen they entered the city\n            they went to the upper room where they were staying,\n            Peter and John and James and Andrew,\n            Philip and Thomas, Bartholomew and Matthew,\n            James son of Alphaeus, Simon the Zealot,\n            and Judas son of James.\nAll these devoted themselves with one accord to prayer,\n            together with some women,\n            and Mary the mother of Jesus, and his brothers."}, "salmo_responsorial": {"cita": "Salmo 86", "respuesta": "R.", "texto": "Alaben al Señor todos los pueblos. Aleluya.\nJerusalén gloriosa,\nel Señor ha puesto en ti su templo.\nTú eres más  querida para Dios\nque todos los santuarios de Israel.\nDe ti, Jerusalén, ciudad del Señor,\nse dirán maravillas.\nR.\nEgipto y Babilonia adorarán al Señor;\nlos filisteos, con Tiro y Etiopía,\nserán como tus hijos.\nY de ti, Jerusalén, afirmarán:\n«Todos los pueblos han nacido en ti\ny el Altísimo es tu fortaleza».\nR.\nEl Señor registrará en el libro de la vida\na cada pueblo, convertido en ciudadano tuyo;\ny todos los pueblos te cantarán, bailando:\n«Tú eres la fuente de  nuestra salvación».\nR.", "cita_en": "Psalm 87:1-2, 3 and 5, 6-7", "respuesta_en": "(3)", "texto_en": "Glorious things are said of you, O city of God!\n\nHis foundation upon the holy mountains\n\n            the \nLORD\n \nloves:\n\nThe gates of Zion,\n\n            more than any dwelling of Jacob.\n\nR. \nGlorious things are said of you, O city of God!\n\nGlorious things are said of you,\n\n            O city of God!\n\nAnd of Zion they shall say:\n\n            “One and all were born in her;\n\nAnd he who has established her\n\n            is the Most High \nLORD\n.”\n\n\nR. \nGlorious things are said of you, O city of God!\n\n\nThey shall note, when the peoples are enrolled:\n\n            “This man was born there.”\n\nAnd all shall sing, in their festive dance:\n\n            “My home is within you.”\n\n\nR. \nGlorious things are said of you, O city of God!"}, "segunda_lectura": {"cita": "Lectura del libro de Juan Juan 19, 25-34", "cita_formula": "Lectura del libro de Juan", "cita_versiculos": "Juan 19, 25-34", "texto": "En aquel tiempo, estaban junto a la cruz de Jesús, su madre, la hermana de su madre, María la de Cleofás, y María Magdalena. Al ver a su madre y junto a ella al discípulo que tanto quería, Jesús dijo a su madre: \"Mujer, ahí está tu hijo\". Luego dijo al discípulo: ''Ahí está tu madre\". Y desde entonces el discípulo se la llevó a vivir con él. \n\nDespués de esto, sabiendo Jesús que todo había llegado a su término, para que se cumpliera la escritura dijo: \"Tengo sed\". Había allí un jarro lleno de vinagre. Los soldados sujetaron una esponja empapada en vinagre a una caña de hisopo y se la acercaron a la boca. Jesús probó el vinagre y dijo \"Todo está cumplido\", e inclinando la cabeza, entregó el espíritu. \n\nEntonces, los judíos, como era el día de preparación para la Pascua, para que los cuerpos de los ajusticiados no se quedaran en la cruz el sábado, porque aquel sábado era un día muy solemne, pidieron a Pilato que les quebraran las piernas y los quitaran de la cruz. Fueron los soldados, le quebraron las piernas a uno y luego al otro de los que habían sido crucificados con Jesús. Pero al llegar a él, viendo que ya había muerto, no le quebraron las piernas, sino que uno de los soldados le traspasó el costado con una lanza e inmediatamente salió sangre y agua."}, "secuencia": {}, "evangelio": {"cita": "Del santo Evangelio según San Juan Juan 19, 25-34", "cita_formula": "Del santo Evangelio según San Juan", "cita_versiculos": "Juan 19, 25-34", "texto": "En aquel tiempo, estaban junto a la cruz de Jesús, su madre, la hermana de su madre, María la de Cleofás, y María Magdalena. Al ver a su madre y junto a ella al discípulo que tanto quería, Jesús dijo a su madre: \"Mujer, ahí está tu hijo\". Luego dijo al discípulo: ''Ahí está tu madre\". Y desde entonces el discípulo se la llevó a vivir con él. \n\nDespués de esto, sabiendo Jesús que todo había llegado a su término, para que se cumpliera la escritura dijo: \"Tengo sed\". Había allí un jarro lleno de vinagre. Los soldados sujetaron una esponja empapada en vinagre a una caña de hisopo y se la acercaron a la boca. Jesús probó el vinagre y dijo \"Todo está cumplido\", e inclinando la cabeza, entregó el espíritu. \n\nEntonces, los judíos, como era el día de preparación para la Pascua, para que los cuerpos de los ajusticiados no se quedaran en la cruz el sábado, porque aquel sábado era un día muy solemne, pidieron a Pilato que les quebraran las piernas y los quitaran de la cruz. Fueron los soldados, le quebraron las piernas a uno y luego al otro de los que habían sido crucificados con Jesús. Pero al llegar a él, viendo que ya había muerto, no le quebraron las piernas, sino que uno de los soldados le traspasó el costado con una lanza e inmediatamente salió sangre y agua.", "cita_en": "John 19:25-34", "texto_en": "Standing by the cross of Jesus were his mother\n\n            and his mother’s sister, Mary the wife of Clopas,\n\n            and Mary of Magdala.\n\nWhen Jesus saw his mother and the disciple there whom he loved,\n\n            he said to his mother, “Woman, behold, your son.”\n\nThen he said to the disciple,\n\n            “Behold, your mother.”\n\nAnd from that hour the disciple took her into his home.\n\nAfter this, aware that everything was now finished,\n\n            in order that the Scripture might be fulfilled,\n\n            Jesus said, “I thirst.”\n\nThere was a vessel filled with common wine.\n\nSo they put a sponge soaked in wine on a sprig of hyssop\n\n            and put it up to his mouth.\n\nWhen Jesus had taken the wine, he said,\n\n            “It is finished.”\n\nAnd bowing his head, he handed over the spirit.\n\n\n\nNow since it was preparation day,\n\n            in order that the bodies might not remain on the cross on the sabbath,\n\n            for the sabbath day of that week was a solemn one,\n\n            the Jews asked Pilate that their legs be broken\n\n            and they be taken down.\n\nSo the soldiers came and broke the legs of the first\n\n            and then of the other one who was crucified with Jesus.\n\nBut when they came to Jesus and saw that he was already dead,\n\n            they did not break his legs,\n\n            but one soldier thrust his lance into his side,\n\n            and immediately Blood and water flowed out."}}, "liturgia_eucaristica": {}, "laudes": {"salmo1": {"antifona": "Por la mañana, sácianos de tu misericordia, Señor.", "texto": "Salmo 89\n\nBAJE A NOSOTROS LA BONDAD DEL SEÑOR\n\nSeñor, tú has sido nuestro refugio\n\nde generación en generación.\n\nAntes que naciesen los montes\n\no fuera engendrado el orbe de la tierra,\n\ndesde siempre y por siempre tú eres Dios.\n\nTú reduces el hombre a polvo,\n\ndiciendo: «Retornad, hijos de Adán.»\n\nMil años en tu presencia\n\nson un ayer, que pasó;\n\nuna vigilia nocturna.\n\nLos siembras año por año,\n\ncomo hierba que se renueva:\n\nque florece y se renueva por la mañana,\n\ny por la tarde la siegan y se seca.\n\n¡Cómo nos ha consumido tu cólera\n\ny nos ha trastornado tu indignación!\n\nPusiste nuestras culpas ante ti,\n\nnuestros secretos ante la luz de tu mirada:\n\ny todos nuestros días pasaron bajo tu cólera,\n\ny nuestros años se acabaron como un suspiro.\n\nAunque uno viva setenta años,\n\ny el más robusto hasta ochenta,\n\nla mayor parte son fatiga inútil,\n\nporque pasan aprisa y vuelan.\n\n¿Quién conoce la vehemencia de tu ira,\n\nquién ha sentido el peso de tu cólera?\n\nEnséñanos a calcular nuestros años,\n\npara que adquiramos un corazón sensato.\n\nVuélvete, Señor, ¿hasta cuándo?\n\nTen compasión de tus siervos;\n\npor la mañana sácianos de tu misericordia,\n\ny toda nuestra vida será alegría y júbilo.\n\nDanos alegría, por los días en que nos afligiste,\n\npor los años en que sufrimos desdichas.\n\nQue tus siervos vean tu acción,\n\ny sus hijos tu gloria.\n\nBaje a nosotros la bondad del Señor\n\ny haga prósperas las obras de nuestras manos.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nPor la mañana, sácianos de tu misericordia, Señor."}, "cantico_at": {"antifona": "Llegue la alabanza del Señor hasta el confín de la tierra.", "texto": "Cántico\n\nIs 42, 10-16\n\nCÁNTICO NUEVO AL DIOS VENCEDOR Y SALVADOR\n\nCantad al Señor un cántico nuevo,\n\nllegue su alabanza hasta el confín de la tierra.\n\nmuja el mar y lo que contiene,\n\nlas islas y sus habitantes;\n\nalégrese el desierto con sus tiendas,\n\nlos cercados que habita Cadar;\n\nexulten los habitantes de Petra,\n\nclamen desde la cumbre de las montañas;\n\nden gloria al Señor,\n\nanuncien su alabanza en las islas.\n\nEl Señor sale como un héroe,\n\nexcita su ardor como un guerrero,\n\nlanza el alarido,\n\nmostrándose valiente frente al enemigo.\n\n«Desde antiguo guardé silencio,\n\nme callaba y aguantaba;\n\nmas ahora grito como la mujer cuando da a luz,\n\njadeo y resuello.\n\nAgostaré montes y collados,\n\nsecaré toda su hierba,\n\nconvertiré los ríos en yermo,\n\ndesecaré los estanques;\n\nconduciré a los ciegos\n\npor el camino que no conocen,\n\nlos guiaré por senderos que ignoran.\n\nAnte ellos convertiré la tiniebla en luz,\n\nlo escabroso en llano.»\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nLlegue la alabanza del Señor hasta el confín de la tierra."}, "salmo2": {"antifona": "Alabad el nombre del Señor, los que estáis en la casa del Señor.", "texto": "Salmo 134, 1-12\n\nHIMNO A DIOS POR SUS MARAVILLAS\n\nAlabad el nombre del Señor,\n\nalabadlo, siervos del Señor,\n\nque estáis en la casa del Señor,\n\nen los atrios de la casa de nuestro Dios.\n\nAlabad al Señor porque es bueno,\n\ntañed para su nombre, que es amable.\n\nPorque él se escogió a Jacob,\n\na Israel en posesión suya.\n\nYo sé que el Señor es grande,\n\nnuestro dueño más que todos los dioses.\n\nEl Señor todo lo que quiere lo hace:\n\nen el cielo y en la tierra,\n\nen los mares y en los océanos.\n\nHace subir las nubes desde el horizonte,\n\ncon los relámpagos desata la lluvia,\n\nsuelta a los vientos de sus silos.\n\nÉl hirió a los primogénitos de Egipto,\n\ndesde los hombres hasta los animales.\n\nEnvió signos y prodigios\n\n—en medio de ti, Egipto—\n\ncontra el Faraón y sus ministros.\n\nHirió de muerte a pueblos numerosos,\n\nmató a reyes poderosos:\n\na Sijón, rey de los amorreos;\n\na Hog, rey de Basán,\n\ny a todos los reyes de Canaán.\n\nY dio su tierra en heredad,\n\nen heredad a Israel, su pueblo.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nAlabad el nombre del Señor, los que estáis en la casa del Señor."}, "lectura_breve": {"cita": "Marcos 10, 17-27", "texto": "En aquel tiempo, cuando salía Jesús al camino, se le acercó corriendo un hombre, se arrodilló ante él y le preguntó: \"Maestro bueno, ¿qué debo hacer para alcanzar la vida eterna?\" Jesús le contestó: \"¿Por qué me llamas bueno? Nadie es bueno sino sólo Dios. Ya sabes los mandamientos:\n\nNo matarás, no cometerás adulterio, no robarás, no levantarás falso testimonio, no cometerás fraudes, honrarás a tu padre y a tu madre\".\n\nEntonces él le contestó: \"Maestro todo eso lo he cumplido desde muy joven\". Jesús lo miró con amor y le dijo: \"Sólo una cosa te falta: Ve y vende lo que tienes, da el dinero a los pobres y así tendrás un tesoro en los cielos. Después, ven y sígueme\". Pero al oír estas palabras, el hombre se entristeció y se fue apesadumbrado, porque tenía muchos bienes.\n\nJesús, mirando a su alrededor, dijo entonces a sus discípulos: \"¡Qué difícil les va a ser a los ricos entrar en el Reino de Dios!\" Los discípulos quedaron sorprendidos ante estas palabras; pero Jesús insistió: \"Hijitos, ¡qué difícil es para los que confían en las riquezas, entrar en el Reino de Dios! Más fácil le es a un camello pasar por el ojo de una aguja, que a un rico entrar en el Reino de Dios\".\n\nEllos se asombraron todavía más y comentaban entre sí: \"Entonces, ¿quién puede salvarse?\" Jesús, mirándolos fijamente, les dijo: \"Es imposible para los hombres, mas no para Dios. Para Dios todo es posible\"."}, "responsorio_breve": "V. Aclamad, justos, al Señor, que merece la alabanza de los buenos.\nR. Aclamad, justos, al Señor, que merece la alabanza de los buenos.\nV. Cantadle un cántico nuevo.\nR. Que merece la alabanza de los buenos.\nV. Gloria al Padre, y al Hijo, y al Espíritu Santo.\nR. Aclamad, justos, al Señor, que merece la alabanza de los buenos.", "cantico_evangelico": {"antifona": "Bendito sea el Señor, Dios de Israel, porque ha visitado y redimido a su pueblo.", "texto": "Bendito sea el Señor, Dios de Israel,\n\nporque ha visitado y redimido a su pueblo,\n\nsuscitándonos una fuerza de salvación\n\nen la casa de David, su siervo,\n\nsegún lo había predicho desde antiguo\n\npor boca de sus santos profetas.\n\nEs la salvación que nos libra de nuestros enemigos\n\ny de la mano de todos los que nos odian;\n\nha realizado así la misericordia que tuvo con\n\nnuestros padres,\n\nrecordando su santa alianza\n\ny el juramento que juró a nuestro padre Abraham.\n\nPara concedernos que, libres de temor,\n\narrancados de la mano de los enemigos,\n\nle sirvamos con santidad y justicia,\n\nen su presencia, todos nuestros días.\n\nY a ti, niño, te llamarán profeta del Altísimo,\n\nporque irás delante del Señor\n\na preparar sus caminos,\n\nanunciando a su pueblo la salvación,\n\nel perdón de sus pecados.\n\nPor la entrañable misericordia de nuestro Dios,\n\nnos visitará el sol que nace de lo alto,\n\npara iluminar a los que viven en tiniebla\n\ny en sombra de muerte,\n\npara guiar nuestros pasos\n\npor el camino de la paz.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nBendito sea el Señor, Dios de Israel, porque ha visitado y redimido a su pueblo."}, "preces": "Ya que Cristo escucha y salva a cuantos en él se refugian acudamos a él diciendo:\nR.\nEscúchanos Señor.\nTe damos gracias Señor por el gran amor con que nos amaste;\n- continúa mostrándote con nosotros rico en misericordia.\nTú que con el Padre sigues actuando siempre en el mundo\n- renueva todas  las cosas con la fuerza de tu Espíritu.\nAbre nuestros ojos y los de  nuestros hermanos\n- para que podamos contemplar hoy tus maravillas.\nYa que nos llamas hoy a tu servicio\n- haz que seamos buenos  administradores de tu multiforme gracia a favor de nuestros hermanos.\nSe pueden añadir algunas intenciones libres\nAcudamos a Dios Padre tal como nos enseñó Jesucristo:\nPadre nuestro..."}, "visperas": {"salmo1": {"antifona": "Nuestros ojos están fijos en el Señor, esperando su misericordia.", "texto": "Salmo 122\n\nEL SEÑOR, ESPERANZA DEL PUEBLO\n\nA ti levanto mis ojos,\n\na ti que habitas en el cielo.\n\nComo están los ojos de los esclavos\n\nfijos en las manos de sus señores,\n\ncomo están los ojos de la esclava\n\nfijos en las manos de su señora,\n\nasí están nuestros ojos\n\nen el Señor, Dios nuestro,\n\nesperando su misericordia.\n\nMisericordia, Señor, misericordia,\n\nque estamos saciados de desprecios;\n\nnuestra alma está saciada\n\ndel sarcasmo de los satisfechos,\n\ndel desprecio de los orgullosos.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nNuestros ojos están fijos en el Señor, esperando su misericordia."}, "salmo2": {"antifona": "Nuestro auxilio es el nombre del Señor, que hizo el cielo y la tierra.", "texto": "Salmo 123\n\nNUESTRO AUXILIO ES EL NOMBRE DEL SEÑOR\n\nSi el Señor no hubiera estado de nuestra parte\n\n—que lo diga Israel—,\n\nsi el Señor no hubiera estado de nuestra parte,\n\ncuando nos asaltaban los hombres,\n\nnos habrían tragado vivos:\n\ntanto ardía su ira contra nosotros.\n\nNos habrían arrollado las aguas,\n\nllegándonos el torrente hasta el cuello;\n\nnos habrían llegado hasta el cuello\n\nlas aguas espumantes.\n\nBendito el Señor, que no nos entregó\n\ncomo presa a sus dientes;\n\nhemos salvado la vida como un pájaro\n\nde la trampa del cazador:\n\nla trampa se rompió y escapamos.\n\nNuestro auxilio es el nombre del Señor,\n\nque hizo el cielo y la tierra.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nNuestro auxilio es el nombre del Señor, que hizo el cielo y la tierra."}, "cantico_nt": {"antifona": "Dios nos ha destinado en la persona de Cristo a ser sus hijos.", "texto": "Cántico\n\nEf 1 3-10\n\nEL PLAN DIVINO DE LA SALVACIÓN\n\nBendito sea Dios,\n\nPadre de nuestro Señor Jesucristo,\n\nque nos ha bendecido en la persona de Cristo\n\ncon toda clase de bienes espirituales y celestiales.\n\nÉl nos eligió en la persona de Cristo,\n\nantes de crear el mundo,\n\npara que fuésemos consagrados\n\ne irreprochables ante él por el amor.\n\nÉl nos ha destinado en la persona de Cristo,\n\npor pura iniciativa suya,\n\na ser sus hijos,\n\npara que la gloria de su gracia,\n\nque tan generosamente nos ha concedido\n\nen su querido Hijo,\n\nredunde en alabanza suya.\n\nPor este Hijo, por su sangre,\n\nhemos recibido la redención,\n\nel perdón de los pecados.\n\nEl tesoro de su gracia, sabiduría y prudencia\n\nha sido un derroche para con nosotros,\n\ndándonos a conocer el misterio de su voluntad.\n\nÉste es el plan\n\nque había proyectado realizar por Cristo\n\ncuando llegase el momento culminante:\n\nhacer que todas las cosas\n\ntuviesen a Cristo por cabeza,\n\nlas del cielo y las de la tierra.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nDios nos ha destinado en la persona de Cristo a ser sus hijos."}, "lectura_breve": {"cita": "Juan 19, 25-34", "texto": "En aquel tiempo, estaban junto a la cruz de Jesús, su madre, la hermana de su madre, María la de Cleofás, y María Magdalena. Al ver a su madre y junto a ella al discípulo que tanto quería, Jesús dijo a su madre: \"Mujer, ahí está tu hijo\". Luego dijo al discípulo: ''Ahí está tu madre\". Y desde entonces el discípulo se la llevó a vivir con él.\n\nDespués de esto, sabiendo Jesús que todo había llegado a su término, para que se cumpliera la escritura dijo: \"Tengo sed\". Había allí un jarro lleno de vinagre. Los soldados sujetaron una esponja empapada en vinagre a una caña de hisopo y se la acercaron a la boca. Jesús probó el vinagre y dijo \"Todo está cumplido\", e inclinando la cabeza, entregó el espíritu.\n\nEntonces, los judíos, como era el día de preparación para la Pascua, para que los cuerpos de los ajusticiados no se quedaran en la cruz el sábado, porque aquel sábado era un día muy solemne, pidieron a Pilato que les quebraran las piernas y los quitaran de la cruz. Fueron los soldados, le quebraron las piernas a uno y luego al otro de los que habían sido crucificados con Jesús. Pero al llegar a él, viendo que ya había muerto, no le quebraron las piernas, sino que uno de los soldados le traspasó el costado con una lanza e inmediatamente sa
