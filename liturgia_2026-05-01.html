<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Liturgia PRO Standalone - 2026-05-01</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
:root {
    --base-size: 15px;

    --bg-dark: #09090b; /* Deep zinc-950 */
    --bg-gradient: radial-gradient(circle at top left, #18181b 0%, #09090b 100%);
    --card-bg: rgba(24, 24, 27, 0.6); /* Translucent zinc-900 */
    --text-primary: #e4e4e7; /* zinc-200 */
    --text-secondary: #a1a1aa; /* zinc-400 */
    --brand-color: #D32F2F; /* Liturgical Crimson */
    --brand-hover: #dc2626; /* Bright red */
    --border-color: rgba(255, 255, 255, 0.08); /* Frosted glass border */
    --sidebar-bg: rgba(9, 9, 11, 0.7); /* Translucent sidebar */
    --gold-accent: #d4af37; /* Clean Gold */
    --gold-hover: #fcd34d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    overflow: hidden;
}

/* Scrollbars sleek */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

.view {
    display: none;
    height: 100vh;
    width: 100vw;
}

.view.active {
    display: flex;
}

/* Landing Page */
#landing-screen {
    position: relative;
    justify-content: center;
    align-items: center;
}

.landing-content {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    padding: 3rem;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    text-align: center;
    max-width: 500px;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
}
.logo span, .logo-small span {
    color: var(--brand-color);
}
.logo { color: #ffffff; font-family: 'Cinzel', serif; }

.landing-content h1 {
    font-size: 2.2rem;
    margin: 0 0 1rem 0;
}

.landing-content p {
    color: var(--text-secondary);
    margin-bottom: 2rem;
    line-height: 1.5;
}

.login-box {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.login-box h3 { margin: 0; font-size: 1.1rem; }
.login-box input {
    padding: 14px;
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    color: white;
    border-radius: 8px;
    font-family: 'Outfit';
}
.login-box input:focus { outline: none; border-color: var(--brand-color); }

.btn-primary {
    background: var(--gold-accent);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.btn-primary:hover { background: #E5C158; }

.signup-link { font-size: 0.9rem; margin-top: 1rem; }
.signup-link a { color: var(--brand-color); text-decoration: none; }

.landing-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    z-index: 1;
}

/* Dashboard */
.saas-sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    z-index: 10;
}

.logo-small {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 3rem;
    color: #ffffff;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
}

.nav-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: #71717a;
    letter-spacing: 0.15em;
    padding: 0 16px;
    margin-bottom: 0.8rem;
    font-family: 'Outfit', sans-serif;
    text-transform: uppercase;
}

.nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.nav-links li {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
}
.nav-links li:hover:not(.active) { 
    background: rgba(255, 255, 255, 0.05); 
    color: #fff;
    transform: translateX(4px);
}
.nav-links li.active { 
    background: linear-gradient(90deg, rgba(178, 0, 0, 0.15) 0%, rgba(178, 0, 0, 0) 100%);
    color: #fff; 
    font-weight: 500; 
    border-left: 3px solid var(--brand-color); 
    box-shadow: inset 2px 0 0px var(--brand-color);
}

/* Capitular Icons */
.icon {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--brand-color);
    font-size: 1.2rem;
    width: 20px;
    text-align: center;
}

.badge {
    background: var(--brand-color);
    color: #000;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 700;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}
.avatar {
    width: 40px; height: 40px;
    background: var(--card-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
}
.user-info strong { display: block; font-size: 0.95rem; }
.user-info span { color: var(--text-secondary); font-size: 0.8rem; }

.btn-upgrade {
    background: transparent;
    border: 1px solid var(--brand-color);
    color: var(--brand-color);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}
.btn-upgrade:hover { background: rgba(245, 158, 11, 0.1); }

/* Main Hub */
.saas-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: transparent; /* lets body gradient show through */
}

.saas-header {
    height: 80px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(9, 9, 11, 0.4);
    backdrop-filter: blur(10px);
    z-index: 5;
}
.saas-header h2 { margin: 0; font-weight: 500; font-size: 1.3rem; font-family: 'Outfit', sans-serif;}

.btn-outline {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif;
}
.btn-outline:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.config-panel {
    width: 380px;
    border-right: 1px solid var(--border-color);
    padding: 2rem;
    overflow-y: auto;
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
}

.config-panel h3 { margin: 0 0 0.5rem 0; font-weight: 600; font-size: 1.25rem; font-family: 'Outfit', sans-serif; color: #fff; }
.subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
.subtitle a { color: var(--gold-accent); text-decoration: none; font-weight: 500; }

.form-grid { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;}

.input-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.input-group select, .input-group input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    color: #fff;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
}
.input-group select:focus, .input-group input:focus {
    border-color: var(--gold-accent);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    background: rgba(0, 0, 0, 0.4);
}

.cantos-section h4 { margin: 0; font-weight: 500;}
.canto-item { margin-bottom: 1rem; border: 1px solid var(--border-color); }
.canto-item input {
    width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'Outfit', sans-serif; margin-bottom: 8px;
}
.canto-item input:focus { border-color: var(--gold-accent); }

.btn-generate {
    width: 100%; 
    background: linear-gradient(135deg, var(--brand-color), #8B0000); 
    color: #fff; 
    font-weight: 600;
    padding: 14px; 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 8px; 
    cursor: pointer; 
    margin-top: 1rem; 
    transition: all 0.3s ease;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 4px 15px rgba(178, 0, 0, 0.3);
}
.btn-generate:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(178, 0, 0, 0.5);
    background: linear-gradient(135deg, #cc0000, #a00000);
}

.preview-panel {
    flex: 1;
    background: transparent;
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.pdf-container {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.4;
    color: #111;
    background: #fff;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
    text-align: justify;
    /* NLM Master Printer Rules */
    column-count: 2;
    column-gap: 8mm;
    column-fill: balance;
    column-rule: 1px solid rgba(153, 0, 0, 0.1); 
    hyphens: auto;
}

/* Configuración de Página para Impresión Doble Cara */
@page {
    size: 8.5in 11in;
    margin-top: 20mm;
    margin-bottom: 20mm;
    bleed: 3mm;
    marks: crop;
}

@page :left {
    margin-left: 22mm; /* Lomo */
    margin-right: 15mm;
}

@page :right {
    margin-left: 15mm;
    margin-right: 22mm; /* Lomo */
}



.empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    text-align: center;
    font-family: 'Cinzel', serif;
    opacity: 0.6;
}

/* --- SUBSIDIO LITÚRGICO STYLES --- */
.pdf-container strong.rubric, .pdf-container .rubrica-sacerdote, .missal-rubric {
    color: var(--brand-color); /* Liturgical red */
    font-style: italic;
    font-weight: normal;
    display: block;
    margin: 4px 0;
    font-size: 0.85em; /* 2pt menor que el texto principal */
}

.pdf-container h2, .pdf-container h3, .pdf-container .titulo-rito, .missal-super-heading, .missal-heading {
    color: var(--brand-color);
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    text-transform: uppercase;
    column-span: all; /* Detiene las columnas para anclar la sección */
    break-after: avoid; /* Previene títulos huerfanos al final de página */
    page-break-after: avoid;
}

.pdf-container .titulo-rito {
    border-bottom: 1px solid var(--brand-color);
    padding-bottom: 8px;
    margin-bottom: 15px;
}

.pdf-container .monicion {
    text-align: justify;
    font-size: 0.95em;
    margin-top: 15px;
    margin-bottom: 15px;
}

.pdf-container .monicion strong {
    font-family: 'Outfit', sans-serif;
    color: #333;
    font-size: 1.1em;
}

.pdf-container .oracion-capitular::first-letter {
    font-family: 'Cinzel', serif;
    font-size: 2.5em;
    float: left;
    line-height: 0.8;
    margin-right: 5px;
    color: var(--brand-color);
}

.pdf-container .asamblea {
    font-weight: bold;
    display: block;
    margin-top: 5px;
    margin-bottom: 10px;
}

.pdf-container .asamblea-rojo {
    color: var(--brand-color);
    font-weight: bold;

.pdf-container blockquote {
    font-style: italic; color: #444; border-left: 3px solid #c90000; padding-left: 15px; margin-left: 20px;
}

/* Modals */
.modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center;
}
.modal.visible { display: flex; }

.modal-content {
    background: var(--card-bg); padding: 3rem; border-radius: 16px; width: 100%; max-width: 500px;
    border: 1px solid var(--border-color); text-align: center; position: relative;
}

.close-btn {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white;
    font-size: 1.5rem; cursor: pointer;
}

.pricing-card {
    background: var(--bg-dark); border: 2px solid var(--brand-color); border-radius: 12px;
    padding: 2rem; margin-top: 2rem;
}
.pricing-card h3 { margin: 0; color: var(--brand-color); }
.price { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
.price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }

.pricing-card ul { text-align: left; margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.95rem;}
.btn-checkout {
    width: 100%; background: #6366f1; color: white; padding: 14px; border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer;
}

/* --- BOLETIN PRO STYLES --- */
.bulletin-wrapper {
    background: white;
    color: #111;
    width: 100%;
    max-width: 210mm;
    min-height: 297mm;
    height: max-content;
    padding: 15mm;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: 'Merriweather', serif;
    position: relative;
    margin: 0 auto;
}

.bul-top-motto {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95; /* Teal color */
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 0;
}

.bul-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 2px solid #333;
    font-family: 'Outfit', sans-serif;
}

.bul-info-col {
    padding: 15px;
    font-size: 0.75rem;
    border-right: 1px solid #999;
}
.bul-info-col:last-child { border-right: none; text-align: center; }

.bul-date h4 {
    color: #6122d6; /* Purple */
    margin: 0 0 5px 0;
    font-size: 1rem;
    text-transform: uppercase;
}
.bul-date p { color: #d97706; font-weight: 600; margin: 0;}

.bul-title-main {
    font-size: 5.5rem;
    font-weight: 900;
    text-align: center;
    margin: 10px 0;
    letter-spacing: -3px;
    line-height: 1;
}

.bul-subtitle {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

.bul-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    height: 350px;
}

.bul-grid-box {
    background: #333;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}
.bul-grid-box.purple { background: #875c8a; color: white; font-family: 'Merriweather'; font-size: 1.1rem; line-height: 1.2; font-weight: 700;}
.bul-bg-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
}

.bul-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    padding-top: 20px;
}

.bul-clergy h3 {
    font-family: 'Style Script', 'Merriweather', cursive; /* Elegant Script fallback */
    font-size: 2.5rem;
    font-style: italic;
    margin: 0 0 10px 0;
}
.bul-clergy p {
    font-family: 'Merriweather'; font-size: 0.8rem; margin: 2px 0; font-weight: 700;
}
.bul-qr {
    width: 100px; height: 100px; background: #eee;
}

/* Gospel Page 2 */
.bul-page-2 {
    margin-top: 15mm;
    border-top: 2px dashed #ccc;
    padding-top: 15mm;
}
.bul-page-2 h2 { text-transform: uppercase; font-size: 1.2rem; color: #c90000; text-align: center; }

/* Premium Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
}
.modal.visible {
    display: flex;
}
.modal-content {
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}
.close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
}
.pricing-card {
    background: var(--card-bg);
    border: 1px solid var(--brand-color);
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
}
.pricing-card .price {
    font-size: 2.5rem;
    color: var(--brand-color);
    font-weight: 700;
    margin: 10px 0;
}
.pricing-card .price span {
    font-size: 1rem; color: var(--text-secondary);
}
.pricing-card ul {
    text-align: left;
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
}
.pricing-card ul li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.pricing-card ul li::before {
    content: '✓ ';
    color: var(--brand-color);
    font-weight: bold;
}
.btn-checkout {
    background: var(--brand-color);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
    font-size: 1rem;
}

/* --- EDITORIAL MISSAL STYLES --- */


.pdf-container h2, .pdf-container h3, .pdf-container hr {
    column-span: all;
}

/* Evitar que se partan los bloques feo pero si permitir partir parrafos para no dejar hojas vacias */
.missal-block {
    margin-bottom: 1.5rem;
}

.missal-super-heading {
    text-transform: uppercase;
    color: var(--brand-color);
    font-size: calc(var(--base-size) * 1.5); /* 18pt basado en raiz 12pt */
    font-weight: 700;
    text-align: center;
    margin: 0 0 1.5cm 0; /* Blueprint param */
    letter-spacing: 1.5px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-heading {
    text-transform: uppercase;
    color: var(--brand-color); /* Carmesi */
    font-size: calc(var(--base-size) * 1.35); /* 14.4pt */
    font-weight: 700; /* Super Bold */
    margin: 0 0 0.5cm 0;
    letter-spacing: 1px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-citation {
    margin: 0 0 12px 0;
    font-size: calc(var(--base-size) * 1.0);
    font-weight: normal;
}

/* Texto Ordinario (Lecturas/Salmos) */
.missal-paragraph, .proclamacion {
    margin: 0;
    margin-bottom: 0.5rem;
    text-align: justify;
    line-height: 1.2;
    font-size: 10.5pt;
    position: relative;
    orphans: 3;
    widows: 3;
}

.missal-paragraph:not(.first-par) {
    text-indent: 1.2em;
}

.punctuation-hang, .smart-punctuation, .puntuacion-inicial {
    float: left;
    font-size: 2em; 
    line-height: 0.8;
    padding-top: 5px;
    margin-right: 2px;
    color: var(--brand-color);
    font-family: 'EB Garamond', serif;
}

.drop-cap {
    float: left;
    font-size: 3.2em; /* Calculado aprox ~3 lineas completas a line-height 1.2 */
    line-height: 0.85;
    padding-top: 5px;
    padding-right: 6px;
    padding-left: 2px;
    font-family: 'Cinzel', 'EB Garamond', serif;
    color: var(--brand-color);
}

/* Voz del Celebrante */
.oracion-presidencial, 
.proclamacion.presidencial {
    line-height: 1.8 !important;
    font-size: 11.5pt !important;
    font-style: italic; /* Opcional: para mayor distinción */
    padding-left: 0;
}
#ritos_iniciales {
    page-break-before: avoid;
    break-before: avoid;
}
/* Columnas para diálogos (Grid) */
.bloque-dialogo.dialogo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

window.linkCanto = function(nombre) {
    let html = `<strong>${nombre}</strong>`;
    if (window.cantosDB && window.cantosDB[nombre]) {
        const letraFormat = window.cantosDB[nombre].letra.replace(/\n/g, '<br/>');
        html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;
    }
    return html;
};

window.obtenerCantosPorTiempo = function(tiempoStr, isEn) {
    if (isEn) {
        return {
            entrada: window.linkCanto('Here I Am Lord'),
            ofertorio: window.linkCanto('Saber que vendrás'),
            comunion: window.linkCanto('On Eagles Wings'),
            salida: window.linkCanto('Demos Gracias al Señor') 
        };
    }
    const t = tiempoStr ? tiempoStr.toLowerCase() : "";
    if (t.includes('cuaresma')) {
        return {
            entrada: window.linkCanto('Hacia ti morada santa'),
            ofertorio: window.linkCanto('Te ofrecemos Señor nuestra juventud'),
            comunion: window.linkCanto('Pequeñas aclaraciones'),
            salida: window.linkCanto('Silencio')
        };
    } else if (t.includes('pascua')) {

        };

    return {

        ofertorio: window.linkCanto('Saber que vendrás'),
        comunion: window.linkCanto('Pescador de Hombres'),
        salida: window.linkCanto('Demos Gracias al Señor')
    };
};
