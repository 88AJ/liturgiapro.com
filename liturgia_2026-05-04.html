<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Liturgia PRO Standalone - 2026-05-04</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
:root {
    --base-size: 15px;

    --bg-dark: #09090b; /* Deep zinc-950 */
    --bg-gradient: radial-gradient(circle at top left, #18181b 0%, #09090b 100%);
    --card-bg: rgba(24, 24, 27, 0.6); /* Translucent zinc-900 */
    --text-primary: #e4e4e7; /* zinc-200 */
    --text-secondary: #a1a1aa; /* zinc-400 */
    --brand-color: #D32F2F; /* Liturgical Crimson */
    --brand-hover: #dc2626; /* Bright red */
    --border-color: rgba(255, 255, 255, 0.08); /* Frosted glass border */
    --sidebar-bg: rgba(9, 9, 11, 0.7); /* Translucent sidebar */
    --gold-accent: #d4af37; /* Clean Gold */
    --gold-hover: #fcd34d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    overflow: hidden;
}

/* Scrollbars sleek */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

.view {
    display: none;
    height: 100vh;
    width: 100vw;
}

.view.active {
    display: flex;
}

/* Landing Page */
#landing-screen {
    position: relative;
    justify-content: center;
    align-items: center;
}

.landing-content {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    padding: 3rem;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    text-align: center;
    max-width: 500px;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
}
.logo span, .logo-small span {
    color: var(--brand-color);
}
.logo { color: #ffffff; font-family: 'Cinzel', serif; }

.landing-content h1 {
    font-size: 2.2rem;
    margin: 0 0 1rem 0;
}

.landing-content p {
    color: var(--text-secondary);
    margin-bottom: 2rem;
    line-height: 1.5;
}

.login-box {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.login-box h3 { margin: 0; font-size: 1.1rem; }
.login-box input {
    padding: 14px;
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    color: white;
    border-radius: 8px;
    font-family: 'Outfit';
}
.login-box input:focus { outline: none; border-color: var(--brand-color); }

.btn-primary {
    background: var(--gold-accent);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.btn-primary:hover { background: #E5C158; }

.signup-link { font-size: 0.9rem; margin-top: 1rem; }
.signup-link a { color: var(--brand-color); text-decoration: none; }

.landing-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    z-index: 1;
}

/* Dashboard */
.saas-sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    z-index: 10;
}

.logo-small {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 3rem;
    color: #ffffff;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
}

.nav-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: #71717a;
    letter-spacing: 0.15em;
    padding: 0 16px;
    margin-bottom: 0.8rem;
    font-family: 'Outfit', sans-serif;
    text-transform: uppercase;
}

.nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.nav-links li {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
}
.nav-links li:hover:not(.active) { 
    background: rgba(255, 255, 255, 0.05); 
    color: #fff;
    transform: translateX(4px);
}
.nav-links li.active { 
    background: linear-gradient(90deg, rgba(178, 0, 0, 0.15) 0%, rgba(178, 0, 0, 0) 100%);
    color: #fff; 
    font-weight: 500; 
    border-left: 3px solid var(--brand-color); 
    box-shadow: inset 2px 0 0px var(--brand-color);
}

/* Capitular Icons */
.icon {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--brand-color);
    font-size: 1.2rem;
    width: 20px;
    text-align: center;
}

.badge {
    background: var(--brand-color);
    color: #000;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 700;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}
.avatar {
    width: 40px; height: 40px;
    background: var(--card-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
}
.user-info strong { display: block; font-size: 0.95rem; }
.user-info span { color: var(--text-secondary); font-size: 0.8rem; }

.btn-upgrade {
    background: transparent;
    border: 1px solid var(--brand-color);
    color: var(--brand-color);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}
.btn-upgrade:hover { background: rgba(245, 158, 11, 0.1); }

/* Main Hub */
.saas-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: transparent; /* lets body gradient show through */
}

.saas-header {
    height: 80px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(9, 9, 11, 0.4);
    backdrop-filter: blur(10px);
    z-index: 5;
}
.saas-header h2 { margin: 0; font-weight: 500; font-size: 1.3rem; font-family: 'Outfit', sans-serif;}

.btn-outline {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif;
}
.btn-outline:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.config-panel {
    width: 380px;
    border-right: 1px solid var(--border-color);
    padding: 2rem;
    overflow-y: auto;
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
}

.config-panel h3 { margin: 0 0 0.5rem 0; font-weight: 600; font-size: 1.25rem; font-family: 'Outfit', sans-serif; color: #fff; }
.subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
.subtitle a { color: var(--gold-accent); text-decoration: none; font-weight: 500; }

.form-grid { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;}

.input-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.input-group select, .input-group input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    color: #fff;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
}
.input-group select:focus, .input-group input:focus {
    border-color: var(--gold-accent);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    background: rgba(0, 0, 0, 0.4);
}

.cantos-section h4 { margin: 0; font-weight: 500;}
.canto-item { margin-bottom: 1rem; border: 1px solid var(--border-color); }
.canto-item input {
    width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'Outfit', sans-serif; margin-bottom: 8px;
}
.canto-item input:focus { border-color: var(--gold-accent); }

.btn-generate {
    width: 100%; 
    background: linear-gradient(135deg, var(--brand-color), #8B0000); 
    color: #fff; 
    font-weight: 600;
    padding: 14px; 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 8px; 
    cursor: pointer; 
    margin-top: 1rem; 
    transition: all 0.3s ease;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 4px 15px rgba(178, 0, 0, 0.3);
}
.btn-generate:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(178, 0, 0, 0.5);
    background: linear-gradient(135deg, #cc0000, #a00000);
}

.preview-panel {
    flex: 1;
    background: transparent;
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.pdf-container {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.4;
    color: #111;
    background: #fff;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
    text-align: justify;
    /* NLM Master Printer Rules */
    column-count: 2;
    column-gap: 8mm;
    column-fill: balance;
    column-rule: 1px solid rgba(153, 0, 0, 0.1); 
    hyphens: auto;
}

/* Configuración de Página para Impresión Doble Cara */
@page {
    size: 8.5in 11in;
    margin-top: 20mm;
    margin-bottom: 20mm;
    bleed: 3mm;
    marks: crop;
}

@page :left {
    margin-left: 22mm; /* Lomo */
    margin-right: 15mm;
}

@page :right {
    margin-left: 15mm;
    margin-right: 22mm; /* Lomo */
}



.empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    text-align: center;
    font-family: 'Cinzel', serif;
    opacity: 0.6;
}

/* --- SUBSIDIO LITÚRGICO STYLES --- */
.pdf-container strong.rubric, .pdf-container .rubrica-sacerdote, .missal-rubric {
    color: var(--brand-color); /* Liturgical red */
    font-style: italic;
    font-weight: normal;
    display: block;
    margin: 4px 0;
    font-size: 0.85em; /* 2pt menor que el texto principal */
}

.pdf-container h2, .pdf-container h3, .pdf-container .titulo-rito, .missal-super-heading, .missal-heading {
    color: var(--brand-color);
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    text-transform: uppercase;
    column-span: all; /* Detiene las columnas para anclar la sección */
    break-after: avoid; /* Previene títulos huerfanos al final de página */
    page-break-after: avoid;
}

.pdf-container .titulo-rito {
    border-bottom: 1px solid var(--brand-color);
    padding-bottom: 8px;
    margin-bottom: 15px;
}

.pdf-container .monicion {
    text-align: justify;
    font-size: 0.95em;
    margin-top: 15px;
    margin-bottom: 15px;
}

.pdf-container .monicion strong {
    font-family: 'Outfit', sans-serif;
    color: #333;
    font-size: 1.1em;
}

.pdf-container .oracion-capitular::first-letter {
    font-family: 'Cinzel', serif;
    font-size: 2.5em;
    float: left;
    line-height: 0.8;
    margin-right: 5px;
    color: var(--brand-color);
}

.pdf-container .asamblea {
    font-weight: bold;
    display: block;
    margin-top: 5px;
    margin-bottom: 10px;
}

.pdf-container .asamblea-rojo {
    color: var(--brand-color);
    font-weight: bold;

.pdf-container blockquote {
    font-style: italic; color: #444; border-left: 3px solid #c90000; padding-left: 15px; margin-left: 20px;
}

/* Modals */
.modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center;
}
.modal.visible { display: flex; }

.modal-content {
    background: var(--card-bg); padding: 3rem; border-radius: 16px; width: 100%; max-width: 500px;
    border: 1px solid var(--border-color); text-align: center; position: relative;
}

.close-btn {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white;
    font-size: 1.5rem; cursor: pointer;
}

.pricing-card {
    background: var(--bg-dark); border: 2px solid var(--brand-color); border-radius: 12px;
    padding: 2rem; margin-top: 2rem;
}
.pricing-card h3 { margin: 0; color: var(--brand-color); }
.price { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
.price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }

.pricing-card ul { text-align: left; margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.95rem;}
.btn-checkout {
    width: 100%; background: #6366f1; color: white; padding: 14px; border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer;
}

/* --- BOLETIN PRO STYLES --- */
.bulletin-wrapper {
    background: white;
    color: #111;
    width: 100%;
    max-width: 210mm;
    min-height: 297mm;
    height: max-content;
    padding: 15mm;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: 'Merriweather', serif;
    position: relative;
    margin: 0 auto;
}

.bul-top-motto {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95; /* Teal color */
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 0;
}

.bul-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 2px solid #333;
    font-family: 'Outfit', sans-serif;
}

.bul-info-col {
    padding: 15px;
    font-size: 0.75rem;
    border-right: 1px solid #999;
}
.bul-info-col:last-child { border-right: none; text-align: center; }

.bul-date h4 {
    color: #6122d6; /* Purple */
    margin: 0 0 5px 0;
    font-size: 1rem;
    text-transform: uppercase;
}
.bul-date p { color: #d97706; font-weight: 600; margin: 0;}

.bul-title-main {
    font-size: 5.5rem;
    font-weight: 900;
    text-align: center;
    margin: 10px 0;
    letter-spacing: -3px;
    line-height: 1;
}

.bul-subtitle {
    font-family: 'Outfit', sans-serif;
    color: #0b7a95;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

.bul-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    height: 350px;
}

.bul-grid-box {
    background: #333;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}
.bul-grid-box.purple { background: #875c8a; color: white; font-family: 'Merriweather'; font-size: 1.1rem; line-height: 1.2; font-weight: 700;}
.bul-bg-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
}

.bul-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    padding-top: 20px;
}

.bul-clergy h3 {
    font-family: 'Style Script', 'Merriweather', cursive; /* Elegant Script fallback */
    font-size: 2.5rem;
    font-style: italic;
    margin: 0 0 10px 0;
}
.bul-clergy p {
    font-family: 'Merriweather'; font-size: 0.8rem; margin: 2px 0; font-weight: 700;
}
.bul-qr {
    width: 100px; height: 100px; background: #eee;
}

/* Gospel Page 2 */
.bul-page-2 {
    margin-top: 15mm;
    border-top: 2px dashed #ccc;
    padding-top: 15mm;
}
.bul-page-2 h2 { text-transform: uppercase; font-size: 1.2rem; color: #c90000; text-align: center; }

/* Premium Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
}
.modal.visible {
    display: flex;
}
.modal-content {
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}
.close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
}
.pricing-card {
    background: var(--card-bg);
    border: 1px solid var(--brand-color);
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
}
.pricing-card .price {
    font-size: 2.5rem;
    color: var(--brand-color);
    font-weight: 700;
    margin: 10px 0;
}
.pricing-card .price span {
    font-size: 1rem; color: var(--text-secondary);
}
.pricing-card ul {
    text-align: left;
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
}
.pricing-card ul li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.pricing-card ul li::before {
    content: '✓ ';
    color: var(--brand-color);
    font-weight: bold;
}
.btn-checkout {
    background: var(--brand-color);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
    font-size: 1rem;
}

/* --- EDITORIAL MISSAL STYLES --- */


.pdf-container h2, .pdf-container h3, .pdf-container hr {
    column-span: all;
}

/* Evitar que se partan los bloques feo pero si permitir partir parrafos para no dejar hojas vacias */
.missal-block {
    margin-bottom: 1.5rem;
}

.missal-super-heading {
    text-transform: uppercase;
    color: var(--brand-color);
    font-size: calc(var(--base-size) * 1.5); /* 18pt basado en raiz 12pt */
    font-weight: 700;
    text-align: center;
    margin: 0 0 1.5cm 0; /* Blueprint param */
    letter-spacing: 1.5px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-heading {
    text-transform: uppercase;
    color: var(--brand-color); /* Carmesi */
    font-size: calc(var(--base-size) * 1.35); /* 14.4pt */
    font-weight: 700; /* Super Bold */
    margin: 0 0 0.5cm 0;
    letter-spacing: 1px;
    break-after: avoid;
    page-break-after: avoid;
}

.missal-citation {
    margin: 0 0 12px 0;
    font-size: calc(var(--base-size) * 1.0);
    font-weight: normal;
}

/* Texto Ordinario (Lecturas/Salmos) */
.missal-paragraph, .proclamacion {
    margin: 0;
    margin-bottom: 0.5rem;
    text-align: justify;
    line-height: 1.2;
    font-size: 10.5pt;
    position: relative;
    orphans: 3;
    widows: 3;
}

.missal-paragraph:not(.first-par) {
    text-indent: 1.2em;
}

.punctuation-hang, .smart-punctuation, .puntuacion-inicial {
    float: left;
    font-size: 2em; 
    line-height: 0.8;
    padding-top: 5px;
    margin-right: 2px;
    color: var(--brand-color);
    font-family: 'EB Garamond', serif;
}

.drop-cap {
    float: left;
    font-size: 3.2em; /* Calculado aprox ~3 lineas completas a line-height 1.2 */
    line-height: 0.85;
    padding-top: 5px;
    padding-right: 6px;
    padding-left: 2px;
    font-family: 'Cinzel', 'EB Garamond', serif;
    color: var(--brand-color);
}

/* Voz del Celebrante */
.oracion-presidencial, 
.proclamacion.presidencial {
    line-height: 1.8 !important;
    font-size: 11.5pt !important;
    font-style: italic; /* Opcional: para mayor distinción */
    padding-left: 0;
}
#ritos_iniciales {
    page-break-before: avoid;
    break-before: avoid;
}
/* Columnas para diálogos (Grid) */
.bloque-dialogo.dialogo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

window.linkCanto = function(nombre) {
    let html = `<strong>${nombre}</strong>`;
    if (window.cantosDB && window.cantosDB[nombre]) {
        const letraFormat = window.cantosDB[nombre].letra.replace(/\n/g, '<br/>');
        html += `<div style="margin-top: 10px; margin-bottom: 5px; line-height: 1.4; font-size: 0.95em; font-style: italic; color: #444; border-left: 3px solid #ddd; padding-left: 12px;">${letraFormat}</div>`;
    }
    return html;
};

window.obtenerCantosPorTiempo = function(tiempoStr, isEn) {
    if (isEn) {
        return {
            entrada: window.linkCanto('Here I Am Lord'),
            ofertorio: window.linkCanto('Saber que vendrás'),
            comunion: window.linkCanto('On Eagles Wings'),
            salida: window.linkCanto('Demos Gracias al Señor') 
        };
    }
    const t = tiempoStr ? tiempoStr.toLowerCase() : "";
    if (t.includes('cuaresma')) {
        return {
            entrada: window.linkCanto('Hacia ti morada santa'),
            ofertorio: window.linkCanto('Te ofrecemos Señor nuestra juventud'),
            comunion: window.linkCanto('Pequeñas aclaraciones'),
            salida: window.linkCanto('Silencio')
        };
    } else if (t.includes('pascua')) {

        };

    return {

        ofertorio: window.linkCanto('Saber que vendrás'),
        comunion: window.linkCanto('Pescador de Hombres'),
        salida: window.linkCanto('Demos Gracias al Señor')
    };
};

    <script>
    window.liturgiaDB = {"2026-05-04": {"fecha": "2026-05-04", "liturgia_palabra": {"primera_lectura": {"cita": "De la primera carta del apóstol san Pablo a los Corintios 1 Corintios 15, 1-8", "cita_formula": "De la primera carta del apóstol san Pablo a los Corintios", "cita_versiculos": "1 Corintios 15, 1-8", "texto": "Hermanos: Les recuerdo el Evangelio que yo les prediqué y que ustedes aceptaron y en el cual están firmes.  Este Evangelio los salvará, si lo cumplen tal y como yo lo prediqué. De otro modo, habrán creído en vano.\n\nLes transmití, ante todo, lo que yo mismo recibí: Que Cristo murió por nuestros pecados, como dicen las Escrituras; que fue sepultado y que resucitó al tercer día, según estaba escrito; que se le apareció a Pedro y luego a los Doce; después se apareció a más de quinientos hermanos reunidos, la mayoría de los cuales vive aún y otros ya murieron.  Más tarde se le apareció a Santiago y luego a todos los apóstoles.  Finalmente, se me apareció también a mí.", "cita_en": "Acts 14:5-18", "texto_en": "There was an attempt in Iconium\n\nby both the Gentiles and the Jews,\n\ntogether with their leaders,\n\nto attack and stone Paul and Barnabas.\n\nThey realized it,\n\nand fled to the Lycaonian cities of Lystra and Derbe\n\nand to the surrounding countryside,\n\nwhere they continued to proclaim the Good News.\n\n\n\nAt Lystra there was a crippled man, lame from birth,\n\nwho had never walked.\n\nHe listened to Paul speaking, who looked intently at him,\n\nsaw that he had the faith to be healed,\n\nand called out in a loud voice, “Stand up straight on your feet.”\n\nHe jumped up and began to walk about.\n\nWhen the crowds saw what Paul had done,\n\nthey cried out in Lycaonian,\n\n“The gods have come down to us in human form.”\n\nThey called Barnabas “Zeus” and Paul “Hermes,”\n\nbecause he was the chief speaker.\n\nAnd the priest of Zeus, whose temple was at the entrance to the city,\n\nbrought oxen and garlands to the gates,\n\nfor he together with the people intended to offer sacrifice.\n\n\n\nThe Apostles Barnabas and Paul tore their garments\n\nwhen they heard this and rushed out into the crowd, shouting,\n\n“Men, why are you doing this?\n\nWe are of the same nature as you, human beings.\n\nWe proclaim to you good news\n\nthat you should turn from these idols to the living God,\n\n\nwho made heaven and earth and sea and all that is in them.\n\nIn past generations he allowed all Gentiles to go their own ways;\n\nyet, in bestowing his goodness,\n\nhe did not leave himself without witness,\n\nfor he gave you rains from heaven and fruitful seasons,\n\nand filled you with nourishment and gladness for your hearts.”\n\nEven with these words, they scarcely restrained the crowds\n\nfrom offering sacrifice to them."}, "salmo_responsorial": {"cita": "Salmo 125", "respuesta": "R.", "texto": "Entre gritos de júbilo cosecharán aquellos que siembran con dolor.\nCuando el Señor nos hizo volver del cautiverio,\ncreíamos soñar,\nentonces no cesaba de reir nuestra boca,\nni se cansaba entonces la lengua de cantar.\nAun los mismos paganos con asombro decían:\n\"Grandes cosas ha hecho por ellos el Señor!\"\nY estábamos alegres,\npues ha hecho grandes cosas por su pueblo del Señor.\nComo cambian los rios la suerte del desierto,\ncambia también ahora nuestra suerte, Señor,\ny entre gritos de júbilo\ncosecharán aquellos que siembran con dolor.\nAl ir, iban llorando, cargando la semilla;\nal regresar, cantando vendrán con sus gavillas.", "cita_en": "Psalm 115:1-2, 3-4, 15-16", "respuesta_en": "(1ab)", "texto_en": "Not to us, O Lord, but to your name give the glory.\nor:\nR.        \nAlleluia.\nNot to us, O LORD, not to us\n            but to your name give glory\n            because of your mercy, because of your truth.\nWhy should the pagans say,\n            “Where is their God?”\nR.        \nNot to us, O Lord, but to your name give the glory.\nor:\nR.        \nAlleluia.\nOur God is in heaven;\n            whatever he wills, he does.\nTheir idols are silver and gold,\n            the handiwork of men.\nR.        \nNot to us, O Lord, but to your name give the glory.\nor:\nR.        \nAlleluia.\nMay you be blessed by the LORD,\n            who made heaven and earth.\nHeaven is the heaven of the LORD,\n            but the earth he has given to the children of men.\nR.        \nNot to us, O Lord, but to your name give the glory.\nor:\nR.        \nAlleluia."}, "segunda_lectura": {"cita": "Lectura del libro de Juan Juan 14, 6-14", "cita_formula": "Lectura del libro de Juan", "cita_versiculos": "Juan 14, 6-14", "texto": "En aquel tiempo, Jesús dijo a Tomás: \"Yo soy el camino, la verdad y la vida. Nadie va al Padre si no es por mí. Si ustedes me conocen a mí, conocen también a mi Padre. Ya desde ahora lo conocen y lo han visto\".\nLe dijo Felipe: \"Señor, muéstranos el Padre, y eso nos basta\". Jesús le replicó: \"Felipe, tanto tiempo hace que estoy con ustedes, ¿y todavía no me conoces? Quién me ha visto a mí, ha visto al Padre. ¿Entonces por qué dices: 'Muéstranos al Padre'? ¿O no crees que yo estoy en el Padre y que el Padre está en mí? Las palabras que yo les digo, no las digo de mí propia cuenta. Es el Padre, que permanece en mi, quien hace las obras. Créanme: yo estoy en el Padre y el Padre está en mí. Si no me dan fe a mí, créanlo por las obras.\nYo les aseguro: el que crea en mí, hará las obras que hago yo y las hará aún mayores, porque yo me voy al Padre; y cualquier cosa que pidan en mi nombre, yo la haré para que el Padre sea glorificado en el Hijo. Yo haré cualquier cosa que me pidan en mi nombre\"."}, "secuencia": {}, "evangelio": {"cita": "Del santo Evangelio según San Juan Juan 14, 6-14", "cita_formula": "Del santo Evangelio según San Juan", "cita_versiculos": "Juan 14, 6-14", "texto": "En aquel tiempo, Jesús dijo a Tomás: \"Yo soy el camino, la verdad y la vida. Nadie va al Padre si no es por mí. Si ustedes me conocen a mí, conocen también a mi Padre. Ya desde ahora lo conocen y lo han visto\".\nLe dijo Felipe: \"Señor, muéstranos el Padre, y eso nos basta\". Jesús le replicó: \"Felipe, tanto tiempo hace que estoy con ustedes, ¿y todavía no me conoces? Quién me ha visto a mí, ha visto al Padre. ¿Entonces por qué dices: 'Muéstranos al Padre'? ¿O no crees que yo estoy en el Padre y que el Padre está en mí? Las palabras que yo les digo, no las digo de mí propia cuenta. Es el Padre, que permanece en mi, quien hace las obras. Créanme: yo estoy en el Padre y el Padre está en mí. Si no me dan fe a mí, créanlo por las obras.\nYo les aseguro: el que crea en mí, hará las obras que hago yo y las hará aún mayores, porque yo me voy al Padre; y cualquier cosa que pidan en mi nombre, yo la haré para que el Padre sea glorificado en el Hijo. Yo haré cualquier cosa que me pidan en mi nombre\".", "cita_en": "John 14:21-26", "texto_en": "Jesus said to his disciples:\n“Whoever has my commandments and observes them\nis the one who loves me.\nWhoever loves me will be loved by my Father,\nand I will love him and reveal myself to him.”\nJudas, not the Iscariot, said to him,\n“Master, then what happened that you will reveal yourself to us\nand not to the world?”\nJesus answered and said to him,\n“Whoever loves me will keep my word,\nand my Father will love him,\nand we will come to him and make our dwelling with him.\nWhoever does not love me does not keep my words;\nyet the word you hear is not mine\nbut that of the Father who sent me.\n“I have told you this while I am with you.\nThe Advocate, the Holy Spirit\nwhom the Father will send in my name --\nhe will teach you everything\nand remind you of all that I told you.”"}}, "liturgia_eucaristica": {}, "laudes": {"salmo1": {"antifona": "A ti te suplico, Señor; por la mañana escucharás mi voz.", "texto": "Salmo 5, 2-10. 12-13\n\nORACIÓN DE LA MAÑANA DE UN JUSTO PERSEGUIDO\n\nSeñor, escucha mis palabras,\n\natiende a mis gemidos,\n\nhaz caso de mis gritos de auxilio,\n\nRey mío y Dios mío.\n\nA ti te suplico, Señor;\n\npor la mañana escucharás mi voz,\n\npor la mañana te expongo mi causa,\n\ny me quedo aguardando.\n\nTú no eres un Dios que ame la maldad,\n\nni el malvado es tu huésped,\n\nni el arrogante se mantiene en tu presencia.\n\nDetestas a los malhechores,\n\ndestruyes a los mentirosos;\n\nal hombre sanguinario y traicionero\n\nlo aborrece el Señor.\n\nPero yo, por tu gran bondad,\n\nentraré en tu casa,\n\nme postraré ante tu templo santo\n\ncon toda reverencia.\n\nSeñor, guíame con tu justicia,\n\nporque tengo enemigos;\n\nalláname tu camino.\n\nEn su boca no hay sinceridad,\n\nsu corazón es perverso;\n\nsu garganta es un sepulcro abierto,\n\nmientras halagan con la lengua.\n\nQue se alegren los que se acogen a ti,\n\ncon júbilo eterno;\n\nprotégelos, para que se llenen de gozo\n\nlos que aman tu nombre.\n\nPorque tú, Señor, bendices al justo,\n\ny como un escudo lo rodea tu favor.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nA ti te suplico, Señor; por la mañana escucharás mi voz."}, "cantico_at": {"antifona": "Alabamos, Dios nuestro, tu nombre glorioso.", "texto": "Cántico\n\n1 Cro 29, 10-13\n\nSOLO A DIOS HONOR Y GLORIA\n\nBendito eres, Señor,\n\nDios de nuestro padre Israel,\n\npor los siglos de los siglos.\n\nTuyos son, Señor, la grandeza y el poder,\n\nla gloria, el esplendor, la majestad,\n\nporque tuyo es cuanto hay en cielo y tierra,\n\ntú eres rey y soberano de todo.\n\nDe ti viene la riqueza y la gloria,\n\ntú eres Señor del universo,\n\nen tu mano está el poder y la fuerza,\n\ntú engrandeces y confortas a todos.\n\nPor eso, Dios nuestro,\n\nnosotros te damos gracias,\n\nalabando tu nombre glorioso.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nAlabamos, Dios nuestro, tu nombre glorioso."}, "salmo2": {"antifona": "Postraos ante el Señor en el atrio sagrado.", "texto": "Salmo 28\n\nMANIFESTACIÓN DE DIOS EN LA TEMPESTAD\n\nHijos de Dios, aclamad al Señor,\n\naclamad la gloria y el poder del Señor,\n\naclamad la gloria del nombre del Señor,\n\npostraos ante el Señor en el atrio sagrado.\n\nLa voz del Señor sobre las aguas,\n\nel Dios de la gloria hace oír su trueno,\n\nel Señor sobre las aguas torrenciales.\n\nLa voz del Señor es potente,\n\nla voz del Señor es magnífica,\n\nla voz del Señor descuaja los cedros,\n\nel Señor descuaja los cedros del Líbano.\n\nHace brincar al Líbano como a un novillo,\n\nal Sarión como a una cría de búfalo.\n\nLa voz del Señor lanza llamas de fuego,\n\nla voz de Señor sacude el desierto,\n\nel Señor sacude el desierto de Cadés.\n\nLa voz del Señor retuerce los robles,\n\nel Señor descorteza las selvas.\n\nEn su templo un grito unánime: ¡Gloria!\n\nEl trono del Señor está encima de la tempestad,\n\nel Señor se sienta como rey eterno.\n\nEl Señor da fuerza a su pueblo,\n\nel Señor bendice a su pueblo con la paz.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nPostraos ante el Señor en el atrio sagrado."}, "lectura_breve": {"cita": "Juan 14, 6-14", "texto": "En aquel tiempo, Jesús dijo a Tomás: \"Yo soy el camino, la verdad y la vida. Nadie va al Padre si no es por mí. Si ustedes me conocen a mí, conocen también a mi Padre. Ya desde ahora lo conocen y lo han visto\".\n\nLe dijo Felipe: \"Señor, muéstranos el Padre, y eso nos basta\". Jesús le replicó: \"Felipe, tanto tiempo hace que estoy con ustedes, ¿y todavía no me conoces? Quién me ha visto a mí, ha visto al Padre. ¿Entonces por qué dices: 'Muéstranos al Padre'? ¿O no crees que yo estoy en el Padre y que el Padre está en mí? Las palabras que yo les digo, no las digo de mí propia cuenta. Es el Padre, que permanece en mi, quien hace las obras. Créanme: yo estoy en el Padre y el Padre está en mí. Si no me dan fe a mí, créanlo por las obras.\n\nYo les aseguro: el que crea en mí, hará las obras que hago yo y las hará aún mayores, porque yo me voy al Padre; y cualquier cosa que pidan en mi nombre, yo la haré para que el Padre sea glorificado en el Hijo. Yo haré cualquier cosa que me pidan en mi nombre\"."}, "responsorio_breve": "V. Bendito el Señor ahora y por siempre.\nR. Bendito el Señor ahora y por siempre.\nV. Solo él hizo maravillas.\nR. Ahora y por siempre.\nV. Gloria al Padre, y al Hijo, y al Espíritu Santo.\nR. Bendito el Señor ahora y por siempre.", "cantico_evangelico": {"antifona": "Bendito sea el Señor, Dios nuestro.", "texto": "Bendito sea el Señor, Dios de Israel,\n\nporque ha visitado y redimido a su pueblo,\n\nsuscitándonos una fuerza de salvación\n\nen la casa de David, su siervo,\n\nsegún lo había predicho desde antiguo\n\npor boca de sus santos profetas.\n\nEs la salvación que nos libra de nuestros enemigos\n\ny de la mano de todos los que nos odian;\n\nha realizado así la misericordia que tuvo con\n\nnuestros padres,\n\nrecordando su santa alianza\n\ny el juramento que juró a nuestro padre Abraham.\n\nPara concedernos que, libres de temor,\n\narrancados de la mano de los enemigos,\n\nle sirvamos con santidad y justicia,\n\nen su presencia, todos nuestros días.\n\nY a ti, niño, te llamarán profeta del Altísimo,\n\nporque irás delante del Señor\n\na preparar sus caminos,\n\nanunciando a su pueblo la salvación,\n\nel perdón de sus pecados.\n\nPor la entrañable misericordia de nuestro Dios,\n\nnos visitará el sol que nace de lo alto,\n\npara iluminar a los que viven en tiniebla\n\ny en sombra de muerte,\n\npara guiar nuestros pasos\n\npor el camino de la paz.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nBendito sea el Señor, Dios nuestro."}, "preces": "Proclamemos la grandeza de Cristo, lleno de gracia y del Espíritu Santo, y acudamos a él diciendo:\nR.\nConcédenos, Señor, tu Espíritu.\nConcédenos, Señor, un día lleno de paz, de alegría y de inocencia\nR.\npara  que, al llegar a la noche, podamos alabarte con gozo y limpios de  pecado.\nQue baje hoy a nosotros tu bondad\nR.\ny haga prósperas las obras de nuestras manos.\nMuéstranos tu rostro propicio y danos tu paz,\nR.\npara que durante todo el día sintamos cómo tu mano nos protege.\nMira con bondad a cuantos se han encomendado a nuestras oraciones\nR.\ny enriquécelos con clase de bienes.\nSe pueden añadir algunas intenciones libres\nTerminemos nuestra oración con la plegaria que Cristo nos enseñó:\nPadre nuestro..."}, "visperas": {"salmo1": {"antifona": "El Señor se complace en los justos.", "texto": "Salmo 10\n\nEL SEÑOR, ESPERANZA DEL JUSTO\n\nAl Señor me acojo, ¿por qué me decís:\n\n«Escapa como un pájaro al monte,\n\nporque los malvados tensan el arco,\n\najustan las saetas a la cuerda,\n\npara disparar en la sombra contra los buenos?\n\nCuando fallan los cimientos,\n\n¿qué podrá hacer el justo?»\n\nPero el Señor está en su templo santo,\n\nel Señor tiene su trono en el cielo;\n\nsus ojos están observando,\n\nsus pupilas examinan a los hombres.\n\nEl Señor examina a inocentes y culpables,\n\ny al que ama la violencia, él lo detesta.\n\nHará llover sobre los malvados ascuas y azufre,\n\nles tocará en suerte un viento huracanado.\n\nPorque el Señor es justo y ama la justicia:\n\nlos buenos verán su rostro.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nEl Señor se complace en los justos."}, "salmo2": {"antifona": "Dichosos los limpios de corazón, porque ellos verán a Dios.", "texto": "Salmo 14\n\n¿QUIÉN ES JUSTO ANTE EL SEÑOR?\n\nSeñor, ¿quién puede hospedarse en tu tienda\n\ny habitar en tu monte santo?\n\nEl que procede honradamente\n\ny practica la justicia,\n\nel que tiene intenciones leales\n\ny no calumnia con su lengua,\n\nel que no hace mal a su prójimo\n\nni difama al vecino,\n\nel que considera despreciable al impío\n\ny honra a los que temen al Señor,\n\nel que no retracta lo que juró\n\naun en daño propio,\n\nel que no presta dinero a usura\n\nni acepta soborno contra el inocente.\n\nEl que así obra nunca fallará.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nDichosos los limpios de corazón, porque ellos verán a Dios."}, "cantico_nt": {"antifona": "Dios nos ha destinado en la persona de Cristo a ser sus hijos.", "texto": "Cántico\n\nEf 1, 3-10\n\nEL PLAN DIVINO DE LA SALVACIÓN\n\nBendito sea Dios,\n\nPadre de nuestro Señor Jesucristo,\n\nque nos ha bendecido en la persona de Cristo\n\ncon toda clase de bienes espirituales y celestiales.\n\nÉl nos eligió en la persona de Cristo,\n\nantes de crear el mundo,\n\npara que fuésemos consagrados\n\ne irreprochables ante él por el amor.\n\nÉl nos ha destinado en la persona de Cristo,\n\npor pura iniciativa suya,\n\na ser sus hijos,\n\npara que la gloria de su gracia,\n\nque tan generosamente nos ha concedido\n\nen su querido Hijo,\n\nredunde en alabanza suya.\n\nPor este Hijo, por su sangre,\n\nhemos recibido la redención,\n\nel perdón de los pecados.\n\nEl tesoro de su gracia, sabiduría y prudencia\n\nha sido un derroche para con nosotros,\n\ndándonos a conocer el misterio de su voluntad.\n\nÉste es el plan\n\nque había proyectado realizar por Cristo\n\ncuando llegase el momento culminante:\n\nhacer que todas las cosas\n\ntuviesen a Cristo por cabeza,\n\nlas del cielo y las de la tierra.\n\nSe dice:\n\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\n\nSe puede repetir la antífona:\n\nDios nos ha destinado en la persona de Cristo a ser sus hijos."}, "lectura_breve": {"cita": "Juan 14, 6-14", "texto": "En aquel tiempo, Jesús dijo a Tomás: \"Yo soy el camino, la verdad y la vida. Nadie va al Padre si no es por mí. Si ustedes me conocen a mí, conocen también a mi Padre. Ya desde ahora lo conocen y lo han visto\".\n\nLe dijo Felipe: \"Señor, muéstranos el Padre, y eso nos basta\". Jesús le replicó: \"Felipe, tanto tiempo hace que estoy con ustedes, ¿y todavía no me conoces? Quién me ha visto a mí, ha visto al Padre. ¿Entonces por qué dices: 'Muéstranos al Padre'? ¿O no crees que yo estoy en el Padre y que el Padre está en mí? Las palabras que yo les digo, no las digo de mí propia cuenta. Es el Padre, que permanece en mi, quien hace las obras. Créanme: yo estoy en el Padre y el Padre está en mí. Si no me dan fe a mí, créanlo por las obras.\n\nYo les aseguro: el que crea en mí, hará las obras que hago yo y las hará aún mayores, porque yo me voy al Padre; y cualquier cosa que pidan en mi nombre, yo la haré para que el Padre sea glorificado en el Hijo. Yo haré cualquier cosa que me pidan en mi nombre\"."}, "responsorio_breve": "V. Los discípulos se llenaron de alegría. Aleluya, aleluya.\nR. Los discípulos se llenaron de alegría. Aleluya, aleluya.\nV. Al ver al Señor.\nR. Aleluya, aleluya.\nV. Gloria al Padre, y al Hijo, y al Espíritu Santo.\nR. Los discípulos se llenaron de alegría. Aleluya, aleluya.", "cantico_evangelico": {"antifona": "Proclama mi alma la grandeza del Señor, porque Dios ha mirado mi humillación.\nProclama mi alma la grandeza del Señor,\nse alegra mi espíritu en Dios mi salvador;\nporque ha mirado la humillación de su esclava.\nDesde ahora me felicitarán todas las generaciones,\nporque el Poderoso ha hecho obras grandes por mí:\nsu nombre es santo\ny su misericordia llega a sus fieles\nde generación en generación.\nÉl hace proezas con su brazo:\ndispersa a los soberbios de corazón,\nderriba del trono a los poderosos\ny enaltece a los humildes,\na los hambrientos los colma de bienes\ny a los ricos los despide vacíos.\nAuxilia a Israel, su siervo,\nacordándose de su misericordia\n—como lo había prometido a nuestros padres—\nen favor de Abraham y su descendencia por siempre.\nSe dice:\nGloria al Padre al Hijo y al Espíritu Santo, como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.\nSe puede repetir la antífona:\nProclama mi alma la grandeza del Señor, porque Dios ha mirado mi humillación.\nDemos gracias a Dios, nuestro Padre, que recordando siempre su santa  alianza, no cesa de bendecirnos, y digámosle con ánimo confiado:\nR.\nFavorece a tu pueblo Señor.\nSalva a tu pueblo, Señor,\nR.\ny bendice a tu heredad.\nCongrega en la unidad a todos los cristianos:\nR.\npara que el mundo crea  en Cristo, tu enviado.\nDerrama tu gracia sobre nuestros familiares y  amigos\nR.\nque encuentren en ti, Señor, su verdadera felicidad.\nMuestra tu amor a los agonizantes:\nR.\nque puedan contemplar tu salvación.\nSe pueden añadir algunas intenciones libres\nTen piedad de los que han muerto\nR.\ny acógelos en el descanso de Cristo.\nTerminemos nuestra oración con las palabras que nos enseñó Cristo:\nPadre nuestro...", "texto": ""}}}};
    </script>
    <script>
// ANTIGRAVITY - CEREBRO LITÚRGICO UNIFICADO (NODOS)

function generarDocumentoNodosLegacy(data, hora, options = {}) {
    if (!data) return '';
    let isEn = options.isEn === true;
    let showMoniciones = options.showMoniciones !== false;
    let showHomilia = options.showHomilia !== false;

    let SECUENCIA_LITURGICA = [];
    
    // VARIABLES
    const fechaElegida = document.getElementById('date-select') ? document.getElementById('date-select').value : null;
    const calDay = (fechaElegida && window.calendarioDB) ? window.calendarioDB[fechaElegida] : null;

    const DIA_TRIDUO = calDay ? (calDay.dia_triduo || null) : null;
    const TIEMPO_LIT = data.tiempo_liturgico || "Ordinario";
    let rawGrado = "";
    if (document.getElementById('grado-liturgico')) {
        rawGrado = document.getElementById('grado-liturgico').value;
    }
    if (!rawGrado) rawGrado = data.grado || data.dia_semana || "Feria";
    
    const GRADO = String(rawGrado).toLowerCase();
    let OFICIO = null;
    if (hora) {
        if (hora.includes("laudes")) OFICIO = "Laudes";
        else if (hora.includes("visperas")) OFICIO = "Visperas";
        else if (hora.includes("oficio")) OFICIO = "Oficio";
        else if (hora.includes("intermedia")) OFICIO = "Intermedia";
        else if (hora.includes("completas")) OFICIO = "Completas";
    }
    const IS_MISA = (hora === "misa" || hora === "misa_laudes" || !hora);

    const upperTiempo = TIEMPO_LIT.toUpperCase();
    const isCuaresma = upperTiempo.includes("CUARESMA");
    const isAdviento = upperTiempo.includes("ADVIENTO");
    const ES_PASCUA_PENTECOSTES = upperTiempo.includes("PASCUA") || upperTiempo.includes("PENTECOSTÉS");
    const ES_OCTAVA_PASCUA = upperTiempo.includes("PASCUA") && calDay && calDay.titulo && calDay.titulo.toLowerCase().includes("octava");

    // COMPUERTA DE ABORTO
    if (DIA_TRIDUO) {
        if (DIA_TRIDUO === "Jueves_Santo" && OFICIO === "Visperas") {
            return RENDERIZAR_BLOQUE(new BloqueLiturgico('abort').addSuperTitulo("Misa de la Cena del Señor.").addRubrica("Unión con Vísperas = Bloqueado."));
        }
        if (DIA_TRIDUO === "Viernes_Santo") {
            return RENDERIZAR_BLOQUE(new BloqueLiturgico('abort').addSuperTitulo("Viernes Santo.").addRubrica("Prohibido celebrar Misa. Solo liturgia de la Pasión."));
        }
        if (DIA_TRIDUO === "Sabado_Santo") {
            return RENDERIZAR_BLOQUE(new BloqueLiturgico('abort').addSuperTitulo("Sábado Santo.").addRubrica("Prohibido celebrar Misa diurna. Esperar a Vigilia Pascual."));
        }
    }

    // BANDERAS LOGICAS
    let Flag_Gloria = (GRADO.includes("solemnidad") || GRADO.includes("fiesta") || (GRADO.includes("domingo") && !isAdviento && !isCuaresma));
    if (data.gloria !== undefined) Flag_Gloria = data.gloria; 
    let Flag_Credo = (GRADO.includes("domingo") || GRADO.includes("solemnidad"));
    let Flag_Aleluya = !isCuaresma;
    let Flag_DobleAleluya_Despedida = (ES_PASCUA_PENTECOSTES || ES_OCTAVA_PASCUA);
    let Flag_Oracion_Pueblo = isCuaresma;

    const cantos = window.obtenerCantosPorTiempo ? window.obtenerCantosPorTiempo(TIEMPO_LIT, isEn) : { entrada: "", ofertorio: "", comunion: "", salida: "" };

    // BLOQUE A: RITOS INICIALES
    let bInicial = new BloqueLiturgico("ritos_iniciales");

    if (showMoniciones) {
        bInicial.addTitulo(isEn ? "Entrance Monition" : "Monición de Entrada");
        if (data.monicion_entrada) {
            bInicial.addMonicion(data.monicion_entrada);
        } else {
            bInicial.addMonicion(isEn ? "A brief introduction to the day's liturgy." : "Breve introducción a la liturgia del día.");
        }
    }

    bInicial.addSuperTitulo(isEn ? "INTRODUCTORY RITES" : "RITOS INICIALES");
    
    bInicial.addTitulo(isEn ? "Entrance Chant" : "Canto de Entrada");
    bInicial.addRubrica(cantos.entrada);

    let antEnt = data.antifona_entrada || (isEn ? "Entrance Antiphon details..." : "Antífona según calendario...");
    bInicial.addTitulo(isEn ? "Entrance Antiphon" : "Antífona de Entrada");
    bInicial.addSacerdote(antEnt);

    bInicial.addTitulo(isEn ? "Greeting" : "Saludo Inicial");
    bInicial.addDialogo(isEn ? "In the name of the Father, and of the Son, and of the Holy Spirit." : "En el nombre del Padre, y del Hijo, y del Espíritu Santo.", isEn ? "Amen." : "Amén.");
    bInicial.addDialogo(isEn ? "The grace of our Lord Jesus Christ, and the communion of the Holy Spirit be with you all." : "La gracia de nuestro Señor Jesucristo, el amor del Padre, y la comunión del Espíritu Santo estén con todos ustedes.", isEn ? "And with your spirit." : "Y con tu espíritu.");

    
    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let officeData = data[hora];
        // OGLH 94: La salmodia incluye salmos y el cantico del testamento respectivo
        let salmosNombres = OFICIO === "Laudes" ? ["salmo1", "cantico_at", "salmo2"] : ["salmo1", "salmo2", "cantico_nt"];
        let titulosArray = OFICIO === "Laudes" ? ["Salmo 1", "Cántico del Antiguo Testamento", "Salmo 2"] : ["Salmo 1", "Salmo 2", "Cántico del Nuevo Testamento"];

        if (officeData && officeData[salmosNombres[0]]) {
            bInicial.addSuperTitulo(isEn ? ("INTEGRATED PSALMODY (" + OFICIO + ")") : ("SALMODIA INTEGRADA (" + OFICIO.toUpperCase() + ")"));
            
            salmosNombres.forEach((nombre, index) => {
                let s = officeData[nombre];
                if (s) {
                    bInicial.addTitulo(isEn ? ("Psalmody: " + nombre) : titulosArray[index]);
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                    
                    let lines = s.texto.split("\n\n");
                    lines.forEach((line, idx) => {
                        if (idx % 2 === 0) bInicial.addSacerdote(line, 'Normal');
                        else bInicial.addAsamblea(line);
                    });
                    
                    bInicial.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
                    bInicial.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                }
            });
        } else {
            bInicial.addRubrica("[Error: No se encontró la salmodia del Oficio para " + OFICIO + "]");
        }
    } else {
        if (ES_PASCUA_PENTECOSTES && (GRADO.toLowerCase().includes("domingo") || ES_OCTAVA_PASCUA)) {
            bInicial.addTitulo(isEn ? "Rite of Blessing and Sprinkling Holy Water" : "Rito de Aspersión (Agua Bendita)");
            bInicial.addMonicion(isEn ? "The penitential act is omitted. The priest blesses the water and sprinkles the faithful." : "Se omite el Acto Penitencial rutinario. El Sacerdote bendice el agua y la rocía sobre el pueblo como memorial del bautismo.");
            bInicial.addSacerdote(isEn ? "Dear brethren (brothers and sisters), let us humbly beseech the Lord our God to bless this water he has created..." : "Hermanos: invoquemos a Dios, nuestro Señor, para que se digne bendecir este agua creada por Él, que va a ser rociada sobre nosotros como recuerdo de nuestro bautismo...");
            bInicial.addAsamblea("Amén.");
            bInicial.addRubrica(isEn ? "The priest sprinkles the congregation while an appropriate chant is sung." : "El sacerdote recorre la nave aspergando a la asamblea mientras se canta un canto bautismal (Ej. 'Vi el agua salir').");
            bInicial.addSacerdote(isEn ? "May almighty God cleanse us of our sins, and through the celebration of this Eucharist make us worthy to share at the table of his Kingdom." : "Que Dios todopoderoso nos purifique de nuestros pecados y, por la celebración de esta Eucaristía, nos haga dignos de participar de la mesa de su reino.");
            bInicial.addAsamblea("Amén.");
        } else {
            bInicial.addTitulo(isEn ? "Penitential Act" : "Rito Penitencial");
            bInicial.addSacerdote(isEn ? "Brethren (brothers and sisters), let us acknowledge our sins..." : "Hermanos: reconozcamos nuestros pecados para celebrar dignamente estos sagrados misterios.");
            bInicial.addAsamblea(data.rito_penitencial || "Yo confieso ante Dios todopoderoso...");
            bInicial.addSacerdote(isEn ? "May almighty God have mercy on us..." : "Dios todopoderoso tenga misericordia de nosotros, perdone nuestros pecados y nos lleve a la vida eterna.");
            bInicial.addAsamblea("Amén.");
            bInicial.addDialogo(isEn ? "Lord, have mercy." : "Señor, ten piedad.", isEn ? "Lord, have mercy." : "Señor, ten piedad.");
            bInicial.addDialogo(isEn ? "Christ, have mercy." : "Cristo, ten piedad.", isEn ? "Christ, have mercy." : "Cristo, ten piedad.");
            bInicial.addDialogo(isEn ? "Lord, have mercy." : "Señor, ten piedad.", isEn ? "Lord, have mercy." : "Señor, ten piedad.");
        }
    }

    SECUENCIA_LITURGICA.push(bInicial);

    let bGloriaColecta = new BloqueLiturgico("gloria");
    bGloriaColecta.addTitulo("Gloria");
    if (Flag_Gloria) {
        bGloriaColecta.addAsamblea(isEn ? "Glory to God in the highest..." : "Gloria a Dios en el cielo, y en la tierra paz a los hombres que ama el Señor. Por tu inmensa gloria te alabamos, te bendecimos, te adoramos, te glorificamos, te damos gracias, Señor Dios, Rey celestial, Dios Padre todopoderoso. Señor, Hijo único, Jesucristo. Señor Dios, Cordero de Dios, Hijo del Padre; tú que quitas el pecado del mundo, ten piedad de nosotros; tú que quitas el pecado del mundo, atiende nuestra súplica; tú que estás sentado a la derecha del Padre, ten piedad de nosotros; porque sólo tú eres Santo, sólo tú Señor, sólo tú Altísimo, Jesucristo, con el Espíritu Santo en la gloria de Dios Padre. Amén.");
    } else {
        bGloriaColecta.addRubrica(isEn ? "[The Gloria is omitted today]" : "[Hoy se omite el Gloria]");
    }
    
    bGloriaColecta.addTitulo(isEn ? "Collect" : "Oración Colecta");
    bGloriaColecta.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + (data.oracion_colecta || "Dios todopoderoso y eterno..."));
    bGloriaColecta.addAsamblea("Amén.");
    SECUENCIA_LITURGICA.push(bGloriaColecta);

    // BLOQUE B: LITURGIA DE LA PALABRA
    let bPalabra = new BloqueLiturgico("liturgia_palabra");
    bPalabra.addSuperTitulo(isEn ? "LITURGY OF THE WORD" : "LITURGIA DE LA PALABRA");
    
    if (showMoniciones) {
        bPalabra.addTitulo(isEn ? "Monition" : "Monición a las Lecturas");
        if (data.monicion_lecturas) {
            bPalabra.addMonicion(data.monicion_lecturas);
        } else {
            bPalabra.addMonicion(isEn ? "Introduction to the Liturgy of the Word." : "Introducción a la Liturgia de la Palabra.");
        }
    }

    let lp = data.liturgia_palabra || {};
    let r1 = lp.primera_lectura || { cita: "Primera Lectura", texto: "[No disponible]" };
    bPalabra.addTitulo(isEn ? "First Reading" : "Primera Lectura");
    bPalabra.addRubrica(r1.cita);
    bPalabra.addSacerdote(r1.texto);
    bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");

    let sr = lp.salmo_responsorial || { cita: "Salmo", respuesta: "R.", texto: "..." };
    bPalabra.addTitulo(isEn ? "Responsorial Psalm" : "Salmo Responsorial");
    bPalabra.addRubrica(sr.cita);
    bPalabra.addAsamblea("R. " + sr.respuesta);
    bPalabra.addSacerdote(sr.texto);

    if (lp.segunda_lectura) {
        let r2 = lp.segunda_lectura;
        bPalabra.addTitulo(isEn ? "Second Reading" : "Segunda Lectura");
        bPalabra.addRubrica(r2.cita);
        bPalabra.addSacerdote(r2.texto);
        bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");
    }

    if (lp.secuencia) {
        bPalabra.addTitulo("Secuencia");
        bPalabra.addSacerdote(lp.secuencia);
    }

    bPalabra.addTitulo(isEn ? "Gospel Acclamation" : "Aclamación antes del Evangelio");
    if (Flag_Aleluya) {
        bPalabra.addAsamblea(lp.aclamacion_evangelio || "Aleluya, aleluya.");
    } else {
        let aclv = lp.aclamacion_evangelio || "Honor y gloria a ti, Señor Jesús.";
        bPalabra.addAsamblea(aclv.replace(/Aleluya/ig, "Honor y gloria a ti, Señor Jesús"));
    }

    let ev = lp.evangelio || { cita: "Evangelio", texto: "[Evangelio no disponible]" };
    bPalabra.addTitulo(isEn ? "Gospel" : "Evangelio");
    bPalabra.addRubrica("<span class=\"cross-mark\">☩</span> " + ev.cita);
    bPalabra.addSacerdote(ev.texto);
    bPalabra.addDialogo(isEn ? "The Gospel of the Lord." : "Palabra del Señor.", isEn ? "Praise to you, Lord Jesus Christ." : "Gloria a ti, Señor Jesús.");
    
    bPalabra.addTitulo(isEn ? "Homily" : "Homilía");
    if (showHomilia) {
        bPalabra.addGuia(data.guia_reflexion || (isEn ? "[Homily Reflection Guide]" : "[Guía de Reflexión Sacerdotal]"));
    } else {
        bPalabra.addRubrica(isEn ? "The priest or deacon delivers the homily." : "El sacerdote o diácono pronuncia la homilía.");
    }
    SECUENCIA_LITURGICA.push(bPalabra);

    if (Flag_Credo) {
        let bCredo = new BloqueLiturgico("credo");
        bCredo.addTitulo(isEn ? "Profession of Faith" : "Profesión de Fe");
        bCredo.addAsamblea(isEn ? "I believe in God, the Father almighty..." : "Creo en Dios, Padre todopoderoso, Creador del cielo y de la tierra. Creo en Jesucristo, su único Hijo, nuestro Señor, que fue concebido por obra y gracia del Espíritu Santo, nació de santa María Virgen, padeció bajo el poder de Poncio Pilato, fue crucificado, muerto y sepultado, descendió a los infiernos, al tercer día resucitó de entre los muertos, subió a los cielos y está sentado a la derecha de Dios, Padre todopoderoso. Desde allí ha de venir a juzgar a vivos y muertos. Creo en el Espíritu Santo, la santa Iglesia católica, la comunión de los santos, el perdón de los pecados, la resurrección de la carne y la vida eterna. Amén.");
        SECUENCIA_LITURGICA.push(bCredo);
    }

    
    let bPreces = new BloqueLiturgico("preces");
    
    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let title = (OFICIO === "Laudes") ? "CÁNTICO EVANGÉLICO (Benedictus)" : "CÁNTICO EVANGÉLICO (Magnificat)";
        let officeData = data[hora];
        if (officeData && officeData.cantico_evangelico) {
            let ce = officeData.cantico_evangelico;
            bPreces.addTitulo(title);
            bPreces.addRubrica("Antífona: " + ce.antifona);
            
            if (ce.texto) {
                let lines = [];
                if (Array.isArray(ce.texto)) {
                    lines = ce.texto;
                } else if (typeof ce.texto === 'string') {
                    lines = ce.texto.split(/\n+/).filter(l => l.trim().length > 1);
                }
                
                lines.forEach((line, idx) => {
                    if (idx % 2 === 0) bPreces.addSacerdote(line, 'Normal');
                    else bPreces.addAsamblea(line);
                });
            }
            
            bPreces.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
            bPreces.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
            bPreces.addRubrica("Antífona: " + ce.antifona);
        }
    }

    bPreces.addTitulo(isEn ? "Universal Prayer" : "Oración de los Fieles");
    
    let precesText = "[Oración de los Fieles Omitida / No Definida]";
    if ((OFICIO === "Laudes" || OFICIO === "Visperas") && data[hora] && data[hora].preces) {
        precesText = data[hora].preces;
        bPreces.addRubrica(isEn ? "Intercessions from the Divine Office." : "Preces propias del Oficio Divino.");
    } else if (Flag_Oracion_Pueblo) {
        precesText = data.liturgia_palabra ? data.liturgia_palabra.preces : "P. Fieles extraídas del tiempo...";
    } else {
        precesText = isEn ? "Hear us, O Lord, and grant your Church peace and unity." : "Te pedimos, Señor, escucha nuestra oración, y concede a tu Iglesia la paz y la unidad que te suplica.";
    }
    
    let precesLines = precesText.split('\n');
    precesLines.forEach(line => {
        if(line.trim()) bPreces.addMonicion(line.replace(/•/g, '').trim());
    });
    
    SECUENCIA_LITURGICA.push(bPreces);


    // BLOQUE C Y D
    let bEuca = new BloqueLiturgico("liturgia_eucaristica");
    bEuca.addSuperTitulo(isEn ? "LITURGY OF THE Eucharist" : "LITURGIA EUCARÍSTICA");
    bEuca.addTitulo(isEn ? "Offertory Chant" : "Canto de Ofertorio");
    bEuca.addRubrica(cantos.ofertorio);

    let ofrendas = data.liturgia_eucaristica ? data.liturgia_eucaristica.oracion_ofrendas : (isEn ? "Receive, O Lord, the offerings..." : "Recibe, Señor, las ofrendas de tu pueblo...");
    bEuca.addTitulo(isEn ? "Prayer over the Offerings" : "Oración sobre las Ofrendas");
    bEuca.addSacerdote(ofrendas);
    bEuca.addAsamblea("Amén.");
    
    bEuca.addTitulo(isEn ? "Preface Dialogue" : "Diálogo del Prefacio");
    bEuca.addDialogo(isEn ? "The Lord be with you." : "El Señor esté con ustedes.", isEn ? "And with your spirit." : "Y con tu espíritu.");
    bEuca.addDialogo(isEn ? "Lift up your hearts." : "Levantemos el corazón.", isEn ? "We lift them up to the Lord." : "Lo tenemos levantado hacia el Señor.");
    bEuca.addDialogo(isEn ? "Let us give thanks to the Lord our God." : "Demos gracias al Señor, nuestro Dios.", isEn ? "It is right and just." : "Es justo y necesario.");

    bEuca.addTitulo(isEn ? "Sanctus" : "Santo");
    bEuca.addAsamblea(isEn ? "Holy, Holy, Holy Lord God of hosts..." : "Santo, Santo, Santo es el Señor, Dios del Universo. Llenos están el cielo y la tierra de tu gloria. Hosanna en el cielo. Bendito el que viene en nombre del Señor. Hosanna en el cielo.");

    bEuca.addTitulo(isEn ? "Eucharistic Prayer" : "Plegaria Eucarística");
    bEuca.addRubrica(isEn ? "The priest prays the Eucharistic Prayer. After the consecration:" : "El sacerdote pronuncia la Plegaria Eucarística. Tras la consagración:");
    bEuca.addDialogo(isEn ? "The mystery of faith." : "Éste es el Sacramento de nuestra fe.", isEn ? "We proclaim your Death, O Lord, and profess your Resurrection until you come again." : "Anunciamos tu muerte, proclamamos tu resurrección. ¡Ven, Señor Jesús!");
    SECUENCIA_LITURGICA.push(bEuca);

    // COMUNION
    let bComunion = new BloqueLiturgico("rito_comunion");
    bComunion.addSuperTitulo(isEn ? "Communion Rite" : "RITO DE LA COMUNIÓN");
    bComunion.addAsamblea(isEn ? "Our Father, who art in heaven..." : "Padre nuestro, que estás en el cielo, santificado sea tu Nombre; venga a nosotros tu reino; hágase tu voluntad en la tierra como en el cielo. Danos hoy nuestro pan de cada día; perdona nuestras ofensas, como también nosotros perdonamos a los que nos ofenden; no nos dejes caer en la tentación, y líbranos del mal.");
    
    bComunion.addTitulo(isEn ? "Agnus Dei" : "Cordero de Dios");
    bComunion.addAsamblea(isEn ? "Lamb of God, you take away the sins of the world..." : "Cordero de Dios, que quitas el pecado del mundo, ten piedad de nosotros. Cordero de Dios, que quitas el pecado del mundo, ten piedad de nosotros. Cordero de Dios, que quitas el pecado del mundo, danos la paz.");

    bComunion.addTitulo(isEn ? "Invitation to Communion" : "Invitación a la Comunión");
    bComunion.addDialogo(isEn ? "Behold the Lamb of God..." : "Este es el Cordero de Dios, que quita el pecado del mundo. Dichosos los invitados a la cena del Señor.", isEn ? "Lord, I am not worthy..." : "Señor, no soy digno de que entres en mi casa, pero una palabra tuya bastará para sanarme.");

    let antc = (data.liturgia_eucaristica && data.liturgia_eucaristica.antifona_comunion) ? data.liturgia_eucaristica.antifona_comunion : "Acerca tu mano, trae tu dedo y explora mis llagas...";
    bComunion.addTitulo(isEn ? "Communion Antiphon" : "Antífona de la Comunión");
    bComunion.addSacerdote(antc);
    
    bComunion.addTitulo(isEn ? "Communion Chant" : "Canto de Comunión");
    bComunion.addRubrica(cantos.comunion);



    let despues = (data.liturgia_eucaristica && data.liturgia_eucaristica.oracion_despues_comunion) ? data.liturgia_eucaristica.oracion_despues_comunion : (isEn ? "Grant, we pray, almighty God..." : "Concédenos, Dios todopoderoso, que la eficacia de este sacramento...");
    bComunion.addTitulo(isEn ? "Prayer after Communion" : "Oración después de la Comunión");
    bComunion.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + despues);
    bComunion.addAsamblea("Amén.");
    
    
    
    SECUENCIA_LITURGICA.push(bComunion);

    // BLOQUE E: CONCLUSIÓN
    let bConclusion = new BloqueLiturgico("conclusion");
    bConclusion.addSuperTitulo(isEn ? "CONCLUDING RITES" : "RITO DE CONCLUSIÓN");

    if (Flag_Oracion_Pueblo && data.oracion_sobre_el_pueblo) {
        bConclusion.addTitulo("Oración sobre el Pueblo");
        bConclusion.addRubrica("Sacerdote: Iniclinen la cabeza para recibir la bendición.");
        bConclusion.addSacerdote(data.oracion_sobre_el_pueblo);
        bConclusion.addAsamblea("Amén.");
    }

    bConclusion.addTitulo(isEn ? "Final Blessing" : "Bendición Final");
    bConclusion.addDialogo(isEn ? "The Lord be with you." : "El Señor esté con ustedes.", isEn ? "And with your spirit." : "Y con tu espíritu.");
    bConclusion.addDialogo(isEn ? "May almighty God bless you, the Father, and the Son, and the Holy Spirit." : "La bendición de Dios todopoderoso, Padre, Hijo y Espíritu Santo, descienda sobre ustedes.", "Amén.");

    if (Flag_DobleAleluya_Despedida) {
        bConclusion.addDialogo(isEn ? "Go in peace, Alleluia, alleluia." : "Pueden ir en paz, Aleluya, aleluya.", isEn ? "Thanks be to God, Alleluia, alleluia." : "Demos gracias a Dios, Aleluya, aleluya.");
    } else {
        bConclusion.addDialogo(isEn ? "Go in peace." : "Pueden ir en paz.", isEn ? "Thanks be to God." : "Demos gracias a Dios.");
    }

    bConclusion.addTitulo(isEn ? "Recessional Chant" : "Canto de Salida");
    bConclusion.addRubrica(cantos.salida);
    SECUENCIA_LITURGICA.push(bConclusion);

    } // END ELSE FOR MISA/LAUDES
    
    // Lectio Divina (Auto-generador si estamos en jornada diaria y es la ultima llamada)
    if (hora === "lectio") {
        let bLectio = new BloqueLiturgico("lectio");
        bLectio.addSuperTitulo("LECTIO DIVINA");
        bLectio.addTitulo("I. LECTIO");
        bLectio.addRubrica("Lectura pausada del Evangelio dominical o del día.");
        bLectio.addSacerdote((data.liturgia_palabra && data.liturgia_palabra.evangelio) ? data.liturgia_palabra.evangelio.texto : "[Texto del Evangelio]");
        bLectio.addTitulo("II. MEDITATIO");
        bLectio.addRubrica("¿Qué me dice a mí el texto?");
        bLectio.addTitulo("III. ORATIO");
        bLectio.addRubrica("¿Qué le digo yo al Señor que me acaba de hablar?");
        bLectio.addTitulo("IV. CONTEMPLATIO");
        bLectio.addRubrica("¿A qué me invita en mi vida concreta como resolución?");
        SECUENCIA_LITURGICA.push(bLectio);
    }

    // EJECUCION MOTOR DE RENDERING
    let htmlOut = '';
    SECUENCIA_LITURGICA.forEach(bloque => htmlOut += RENDERIZAR_BLOQUE(bloque));
    return htmlOut;
}

// -----------------------------------------------------
// NUEVO MOTOR AST (FASE 5)
// -----------------------------------------------------
function generarDocumentoNodos(data, hora, options = {}) {
    if (!data) return '';
    // Híbrido: Si no hay esqueleto canónico del nuevo motor, usamos el sistema viejo procedural 
    if (!data.esqueleto_ordinario || !window.DbOrdinario) {
        return generarDocumentoNodosLegacy(data, hora, options);
    }
    
    let isEn = options.isEn === true;
    let showMoniciones = options.showMoniciones !== false;
    let showHomilia = options.showHomilia !== false;
    let OFICIO = null;
    if (hora) {
        if (hora.includes("laudes")) OFICIO = "Laudes";
        else if (hora.includes("visperas")) OFICIO = "Visperas";
        else if (hora.includes("oficio")) OFICIO = "Oficio";
        else if (hora.includes("intermedia")) OFICIO = "Intermedia";
        else if (hora.includes("completas")) OFICIO = "Completas";
    }
    const IS_MISA = (hora === "misa" || hora === "misa_laudes" || !hora);
    
    let SECUENCIA_LITURGICA = [];
    const cantos = window.obtenerCantosPorTiempo ? window.obtenerCantosPorTiempo(data.tiempo_liturgico || "Ordinario", isEn) : { entrada: "", ofertorio: "", comunion: "", salida: "" };
    const ord = window.DbOrdinario.ordinario;

    const checkAccion = (bloque_id) => {
        let f = data.esqueleto_ordinario.find(x => x.id_bloque === bloque_id);
        return f && f.accion === "incluir";
    };

    // ==========================================
    // BLOQUE A: RITOS INICIALES
    // ==========================================
    let bInicial = new BloqueLiturgico("ritos_iniciales");
    bInicial.addSuperTitulo(isEn ? "INTRODUCTORY RITES" : "RITOS INICIALES");

    if (showMoniciones) {
        bInicial.addTitulo(isEn ? "Entrance Monition" : "Monición de Entrada");
        bInicial.addMonicion(data.monicion_entrada || "Breve introducción a la liturgia del día.");
    }
    
    bInicial.addTitulo(isEn ? "Entrance Chant" : "Canto de Entrada");
    bInicial.addRubrica(cantos.entrada);

    bInicial.addTitulo(isEn ? "Entrance Antiphon" : "Antífona de Entrada");
    bInicial.addSacerdote(data.antifona_entrada || "Antífona según calendario...");

    if (checkAccion("saludo_inicial")) {
        bInicial.addTitulo(isEn ? "Greeting" : "Saludo Inicial");
        let nd = ord.ritos_iniciales.saludo;
        bInicial.addRubrica(nd.rubrica_previa);
        bInicial.addDialogo(nd.formula_principal.celebrante, nd.formula_principal.asamblea);
        bInicial.addDialogo(nd.opciones_saludo[2].celebrante, nd.opciones_saludo[2].asamblea); // Opción C
    }

    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let officeData = data[hora];
        let salmosNombres = OFICIO === "Laudes" ? ["salmo1", "cantico_at", "salmo2"] : ["salmo1", "salmo2", "cantico_nt"];
        let titulosArray = OFICIO === "Laudes" ? ["Salmo 1", "Cántico del Antiguo Testamento", "Salmo 2"] : ["Salmo 1", "Salmo 2", "Cántico del Nuevo Testamento"];

        if (officeData && officeData[salmosNombres[0]]) {
            bInicial.addSuperTitulo(isEn ? ("INTEGRATED PSALMODY (" + OFICIO + ")") : ("SALMODIA INTEGRADA (" + OFICIO.toUpperCase() + ")"));
            
            salmosNombres.forEach((nombre, index) => {
                let s = officeData[nombre];
                if (s) {
                    bInicial.addTitulo(isEn ? ("Psalmody: " + nombre) : titulosArray[index]);
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                    let lines = s.texto.split("\n\n");
                    lines.forEach((line, idx) => {
                        if (idx % 2 === 0) bInicial.addSacerdote(line, 'Normal');
                        else bInicial.addAsamblea(line);
                    });
                    bInicial.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
                    bInicial.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
                    bInicial.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + s.antifona);
                }
            });
        }
    } else {
        if (checkAccion("acto_penitencial")) {
            bInicial.addTitulo(isEn ? "Penitential Act" : "Acto Penitencial");
            let nd = ord.ritos_iniciales.acto_penitencial;
            bInicial.addRubrica(nd.rubrica_previa);
            bInicial.addMonicion(nd.monicion_invitatoria);
            bInicial.addRubrica(nd.rubrica_silencio);
            
            let opt = nd.opciones_formula.find(x => x.id === "confiteor");
            if(opt) {
                bInicial.addAsamblea(opt.texto_conjunto);
                bInicial.addSacerdote(opt.absolucion_celebrante);
                bInicial.addAsamblea(opt.respuesta_absolucion);
            }
        }

        if (checkAccion("kyrie")) {
            let nd = ord.ritos_iniciales.kyrie;
            bInicial.addRubrica(nd.rubrica_previa);
            nd.invocaciones.forEach(i => bInicial.addDialogo(i.invocacion, i.respuesta));
        }
    }

    if (checkAccion("gloria")) {
        let nd = ord.ritos_iniciales.gloria;
        bInicial.addTitulo("Gloria");
        bInicial.addRubrica(nd.rubrica_previa);
        bInicial.addAsamblea(nd.texto);
    }

    bInicial.addTitulo(isEn ? "Collect" : "Oración Colecta");
    bInicial.addCapitular((isEn ? "Let us pray. " : "Oremos. ") + (data.oracion_colecta || ""));
    bInicial.addAsamblea("Amén.");
    SECUENCIA_LITURGICA.push(bInicial);


    // ==========================================
    // BLOQUE B: LITURGIA DE LA PALABRA

    bPalabra.addSuperTitulo(isEn ? "LITURGY OF THE WORD" : "LITURGIA DE LA PALABRA");
    
    let lp = data.liturgia_palabra || {};

    if (lp.primera_lectura) {
        bPalabra.addTitulo(isEn ? "First Reading" : "Primera Lectura");
        bPalabra.addRubrica(lp.primera_lectura.cita || "");
        bPalabra.addLectura(lp.primera_lectura.texto || "");
        bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");
    }

    if (lp.salmo_responsorial) {
        bPalabra.addTitulo(isEn ? "Responsorial Psalm" : "Salmo Responsorial");
        bPalabra.addRubrica(lp.salmo_responsorial.cita || "");
        bPalabra.addAsamblea("R. " + (lp.salmo_responsorial.respuesta || ""));
        bPalabra.addSacerdote(lp.salmo_responsorial.texto || "");
    }

    if (lp.segunda_lectura) {
        bPalabra.addTitulo(isEn ? "Second Reading" : "Segunda Lectura");
        bPalabra.addRubrica(lp.segunda_lectura.cita || "");
        bPalabra.addLectura(lp.segunda_lectura.texto || "");
        bPalabra.addDialogo(isEn ? "The word of the Lord." : "Palabra de Dios.", isEn ? "Thanks be to God." : "Te alabamos, Señor.");
    }

    if (lp.secuencia) {
        bPalabra.addTitulo(isEn ? "Sequence" : "Secuencia");
        if (lp.secuencia.nodos) {
            // Placeholder for native AST appending
        } else if (lp.secuencia.texto) {
            bPalabra.addLectura(lp.secuencia.texto);
        }
    }

    bPalabra.addTitulo(isEn ? "Gospel Acclamation" : "Aclamación antes del Evangelio");
    bPalabra.addAsamblea(lp.aclamacion_evangelio || "Aleluya, aleluya.");

    if (lp.evangelio) {
        bPalabra.addTitulo(isEn ? "Gospel" : "Evangelio");
        bPalabra.addRubrica("<span class='cross-mark'>✠</span> " + (lp.evangelio.cita || ""));
        bPalabra.addLectura(lp.evangelio.texto || "");
        bPalabra.addDialogo(isEn ? "The Gospel of the Lord." : "Palabra del Señor.", isEn ? "Praise to you, Lord Jesus Christ." : "Gloria a ti, Señor Jesús.");
    }

    bPalabra.addTitulo(isEn ? "Homily" : "Homilía");
    if (showHomilia && data.guia_reflexion) bPalabra.addGuia(data.guia_reflexion);
    else bPalabra.addRubrica(isEn ? "The priest or deacon delivers the homily." : "El sacerdote o diácono pronuncia la homilía.");
    SECUENCIA_LITURGICA.push(bPalabra);

    if (checkAccion("credo")) {
        let bCredo = new BloqueLiturgico("credo");
        bCredo.addTitulo(isEn ? "Profession of Faith" : "Profesión de Fe");
        bCredo.addAsamblea("Creo en un solo Dios, Padre todopoderoso, Creador del cielo y de la tierra, de todo lo visible y lo invisible...\n\nCreo en un solo Señor, Jesucristo, Hijo único de Dios, nacido del Padre antes de todos los siglos...\n\nCreo en el Espíritu Santo, Señor y dador de vida..."); 
        SECUENCIA_LITURGICA.push(bCredo);
    }
    
    let bPreces = new BloqueLiturgico("preces");
    
    if (OFICIO === "Laudes" || OFICIO === "Visperas") {
        let officeData = data[hora];
        if (officeData && officeData.cantico_evangelico) {
            let canticoName = OFICIO === "Laudes" ? "Cántico de Zacarías (Benedictus)" : "Cántico de María (Magnificat)";
            bPreces.addSuperTitulo(isEn ? "GOSPEL CANTICLE" : "CÁNTICO EVANGÉLICO (" + OFICIO.toUpperCase() + ")");
            bPreces.addTitulo(isEn ? "Gospel Canticle" : canticoName);
            bPreces.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + officeData.cantico_evangelico.antifona);
            
            let lines = [];
            if (Array.isArray(officeData.cantico_evangelico.texto)) {
                lines = officeData.cantico_evangelico.texto;
            } else if (typeof officeData.cantico_evangelico.texto === 'string') {
                lines = officeData.cantico_evangelico.texto.split(/\n+/).filter(l => l.trim().length > 1);
            }
            
            lines.forEach((line, idx) => {
                if (idx % 2 === 0) bPreces.addSacerdote(line, 'Normal');
                else bPreces.addAsamblea(line);
            });
            
            bPreces.addSacerdote(isEn ? "Glory to the Father, and to the Son, and to the Holy Spirit." : "Gloria al Padre, y al Hijo, y al Espíritu Santo.", 'Normal');
            bPreces.addAsamblea(isEn ? "As it was in the beginning, is now, and will be forever. Amen." : "Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.");
            bPreces.addRubrica((isEn ? "Antiphon: " : "Antífona: ") + officeData.cantico_evangelico.antifona);
        }
    }
    if ((OFICIO === "Laudes" || OFICIO === "Visperas") && data[hora] && data[hora].preces) {
        bPreces.addTitulo(isEn ? "Prayers / Intercessions (" + OFICIO + ")" : "Preces (" + OFICIO + ")");
        bPreces.addRubrica(isEn ? "The Universal Prayer is substituted by the Intercessions of the Liturgy of the Hours." : "Se sustituye la Oración de los Fieles por las preces del Oficio divino.");
        let ptxt = data[hora].preces;
        ptxt.split('\n').filter(x=>x.trim()).forEach(l => {
            if(l.startsWith("-") || l.startsWith("—")) bPreces.addMonicion(l);
            else if(l.includes("Te rogamos") || l.includes("Escúchanos")) bPreces.addAsamblea("R. " + l);
            else bPreces.addSacerdote(l, 'Normal');
        });
    } else {
        bPreces.addTitulo(isEn ? "Universal Prayer" : "Oración de los Fieles");
        let ptxt = lp.preces || "Lector: Te rogamos, óyenos.";
        ptxt.split('\n').filter(x=>x.trim()).forEach(l => bPreces.addMonicion(l.replace(/•/g, '').trim()));
    }
    SECUENCIA_LITURGICA.push(bPreces);

    // ==========================================
    // BLOQUE C: LITURGIA EUCARÍSTICA
    // ==========================================
    let bEuca = new BloqueLiturgico("liturgia_eucaristica");
    bEuca.addSuperTitulo(isEn ? "LITURGY OF THE EUCHARIST" : "LITURGIA EUCARÍSTICA");
    bEuca.addTitulo(isEn ? "Offertory Chant" : "Canto de Ofertorio");
    bEuca.addRubrica(cantos.ofertorio);

    if (checkAccion("preparacion_dones")) {

        bEuca.addDialogo(nd.bendicion_vino.celebrante, nd.bendicion_vino.asamblea);
        bEuca.addRubrica(nd.orate_fratres.rubrica_previa);
        bEuca.addDialogo(nd.orate_fratres.celebrante, nd.orate_fratres.asamblea);
    }

    bEuca.addTitulo(isEn ? "Prayer over the Offerings" : "Oración sobre las Ofrendas");
    bEuca.addCapitular(data.liturgia_eucaristica ? data.liturgia_eucaristica.oracion_ofrendas : "");
    bEuca.addAsamblea("Amén.");
    
    if (checkAccion("plegaria_eucaristica_II")) {

        bEuca.addTitulo(isEn ? "Preface Dialogue" : "Diálogo del Prefacio");

        bEuca.addDialogo(nd.dialogo_prefacio.v2, nd.dialogo_prefacio.r2);
        bEuca.addDialogo(nd.dialogo_prefacio.v3, nd.dialogo_prefacio.r3);
        
        bEuca.addTitulo(isEn ? "Sanctus" : "Santo");
        bEuca.addAsamblea(nd.santo.texto);

        bEuca.addTitulo(isEn ? "Eucharistic Prayer" : "Plegaria Eucarística");
        bEuca.addRubrica("El sacerdote pronuncia la Plegaria Eucarística elegida.");
        bEuca.addSacerdote(nd.consagracion.pan);

        bEuca.addDialogo(nd.aclamacion_misterio.celebrante, nd.aclamacion_misterio.asamblea);

    SECUENCIA_LITURGICA.push(bEuca);

    // ==========================================

        bComunion.addAsamblea(nd.oracion);
        bComunion.addDialogo(nd.embolismo_y_doxologia.celebrante, nd.embolismo_y_doxologia.asamblea);

    if (checkAccion("rito_paz")) {

        bComunion.addTitulo("Rito de la Paz");
        bComunion.addDialogo(nd.oracion_paz.celebrante, nd.oracion_paz.asamblea);

    bComunion.addSacerdote(data.liturgia_eucaristica ? data.liturgia_eucaristica.antifona_comunion : "");
