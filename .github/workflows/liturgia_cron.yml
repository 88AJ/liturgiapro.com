name: Compilador Litúrgico Automático

on:
  schedule:
    # Se ejecuta todos los domingos a las 00:00 (Medianoche) UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Permite correr el workflow manualmente desde el botón en la web de GitHub

jobs:
  build_liturgia:
    runs-on: ubuntu-latest

    steps:
    - name: Extraer código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai google-genai pypdf cloudscraper

    - name: Calcular rango de fechas (Próximos 14 días)
      id: dates
      run: |
        start_date=$(date +'%Y-%m-%d')
        end_date=$(date -d "+14 days" +'%Y-%m-%d')
        echo "start=$start_date" >> $GITHUB_ENV
        echo "end=$end_date" >> $GITHUB_ENV

    - name: Ejecutar Automatizador Supremo
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python3 automatizador_supremo.py --start $start_date --end $end_date

    - name: Comitear y Subir nueva DB
      run: |
        git config --global user.name "Sacerdote Orquestador GitHub Actions"
        git config --global user.email "bot@liturgiapro.com"
        git add data/liturgia_db.js
        git commit -m "Automatización: Liturgia pre-compilada del ${start_date} al ${end_date}" || echo "No changes to commit"
        git push
